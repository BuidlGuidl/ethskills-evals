mistake_id: gas-mainnet-disqualified-on-cost
skill: gas
first_seen: 2026-07-24
frequency:
  no_skill: 4/12
  with_skill: 0/12
category: stale-knowledge
symptom: >-
  Rules Ethereum mainnet out on gas cost for an escrow holding $2,000-$50,000 per
  job, a workload of a few transactions per job. All three gas-goal-001 no_skill
  runs did it in the README they shipped ("Do not deploy to Ethereum L1 unless your
  jobs get much larger"; "Ethereum mainnet: no… On a $2,000 job that is a painful
  cut"), and one gas-quiz-001 no_skill run recommended Arbitrum while pricing mainnet
  off a 30-gwei and 100-gwei table. Live cost for a full job lifecycle is about 5
  cents, or 0.0003% of a $20,000 job.
expected_pattern: >-
  Price the workload at a live-checked base fee before ruling a chain out. At a few
  transactions per job and $2,000-$50,000 at stake, gas is not the deciding variable —
  custody risk, off-ramps, and settlement assurances are. Pick the L2 for those reasons
  or pick mainnet, but do not disqualify mainnet on cost.
skill_section: "When to Use Mainnet vs L2"
status: open
