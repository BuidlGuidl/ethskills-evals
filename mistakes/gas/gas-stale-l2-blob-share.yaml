symptom: >-
  Runs put an unchecked L1 data-availability cost into their L2 numbers, traceable
  to the skill's "L2 Cost Components" example (Base swap = ~$0.0003 L2 execution +
  ~$0.0027 L1 blob). Measured live on 2026-07-24 across 14 Base swap receipts, the
  L1 share is a median 0.25%, not 90% — the example is off by ~350x on the ratio and
  ~840x on the absolute L1 figure. In gas-quiz-001 all three with_skill runs carried
  the adder into the answer ("~3 txs x ~$0.002 = $0.0060"); none queried an L2 fee
  oracle. Historical sampling dates the break to Dencun, March 2024 — the section
  describes the world EIP-4844 ended, while the section above it correctly explains
  that EIP-4844 ended it.
expected_pattern: >-
  Read l1Fee off an OP-stack receipt (or the GasPriceOracle predeploy at
  0x420000000000000000000000000000000000000F) before quoting an L1 data share.
  The skill should state that L1 data is now a sub-1% rounding error on OP-stack
  L2s and that L2 execution — base fee floor plus tip — is essentially the whole bill.
