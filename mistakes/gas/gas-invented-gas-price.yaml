mistake_id: gas-invented-gas-price
skill: gas
first_seen: 2026-07-24
frequency:
  no_skill: 3/12
  with_skill: 0/12
category: stale-knowledge
symptom: >-
  Quotes a mainnet gas price and an ETH price from memory instead of checking either.
  All three gas-goal-001 no_skill runs did it: 20 gwei in one README, "10 gwei and
  $3,000 ETH" in the other two. Live values at the time were 0.09 gwei and $1,870,
  so the gas price is ~100-200x high and ETH ~60% high, which is what produces the
  $11-per-job figure that then disqualifies mainnet. Two of the three made no gas or
  price network call at all. The third tried, hit a dead RPC, and filled the gap from
  memory rather than trying a second endpoint.
expected_pattern: >-
  Read the base fee off a live RPC and the ETH price off a live feed before quoting
  any dollar figure. If the first endpoint fails, try another — a failed lookup is not
  a licence to fall back on a remembered number.
skill_section: "What You Probably Got Wrong"
status: open
