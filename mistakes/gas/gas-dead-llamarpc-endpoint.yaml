  and by cast and curl inside all three gas-quiz-001 with_skill runs). Every with_skill
  run that followed the skill's verification instruction burned a turn recovering and
  had to find its own endpoint. The skill names no fallback, so recovery was luck.
expected_pattern: >-
  Name a working endpoint and at least one fallback. https://ethereum-rpc.publicnode.com
  worked in every run that tried it; eth.drpc.org and rpc.flashbots.net also worked.
  Better still, tell the reader to expect endpoint rot and give two.
