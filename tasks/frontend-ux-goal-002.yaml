skill: skills/frontend-ux
input: |
  Start from an empty workspace — there is no scaffold here.

  Build a small dApp with a /pay page: a user connects a wallet, enters a
  recipient and an amount, and sends USDC to them. The page also shows the
  user's own USDC balance and their ETH balance (they need it for gas).
  USDC is the real token on Ethereum mainnet,
  0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48 — treat it faithfully.

  Pick whatever frontend stack you consider production-standard for an
  Ethereum dApp and set it up yourself. Treat this as a real product that
  ships in front of real users at the end of the week: finished, committed
  code is the deliverable. You do not need to deploy anywhere or run it.
expect:
  - "The recipient field is not a raw hex-only text input: it accepts and resolves ENS names (e.g. vitalik.eth) to an address, validates input, and normalizes a paste — a bare /^0x[a-fA-F0-9]{40}$/ gate that silently rejects a name is a fail."
  - "USDC amounts convert at 6 decimals end to end — parseUnits/formatUnits at 6 (or the token's onchain decimals()), never parseEther/formatEther — and no raw base units are rendered to the user."
  - "The ETH gas balance is shown with a USD value from a real price source, not raw ETH units alone and not a 1:1 shortcut; amounts shown to the user carry USD context where it matters."
  - "The send button has its own pending state, disabled from click through onchain confirmation, and a wallet rejection releases it (cleanup in finally or equivalent) instead of locking it — wagmi isPending alone is a fail."
  - "A failed or rejected transfer surfaces a human-readable message in the UI near the send action; raw error objects, revert selectors, or silent failure are a fail."
  - "The app ships its own identity rather than framework defaults: the tab title and favicon reflect the payments app (not 'Create Next App' or similar), and OG/social title, description, and image are set for it."
runs: 3
notes: |
  Second goal for skills/frontend-ux (skill vendored at 191dcc1, source
  ethskills.com/frontend-ux/SKILL.md), drafted 2026-07-17 per issue #1 and
  the PR #3 review. Companion to frontend-ux-goal-001, deliberately run on
  a BARE workspace (no template:) instead of the SE-2 scaffold. goal-001 is
  the SE-2 build; this one strips the scaffold so SE-2's own AGENTS.md and
  bundled skills cannot supply the habits — it isolates whether the model
  brings them itself (the review flagged that a no_skill run can pass much
  of goal-001 by just following SE-2's built-in guidance). The prompt never
  names a rule; each expect must surface on the way to a working /pay page.
  A plain ERC-20 transfer (no custom contract, no approve) keeps the focus
  on the frontend: the recipient field forces Rule 3 (address UX —
  ENS/validation/paste, the gap goal-001 skips and only quiz-005 covers),
  the ETH gas balance forces Rule 4 (a real ETH->USD lookup, not the ~1:1
  USDC shortcut), "faithful" USDC forces Rule 9 (6 decimals), and "real
  product / real users" licenses Rules 1, 7, 8 (per-button pending, error
  translation, metadata) without naming them. Two things to read off the
  transcript beyond pass/fail: (1) which frontend stack the model picks
  with no scaffold given — does it reach for viem/wagmi and a sane project
  structure unprompted; (2) whether the UX habits survive without SE-2
  leading it — compare the pass rate here against goal-001 on the shared
  rules (1, 4, 7, 8, 9) to estimate how much of goal-001's score was the
  template versus the model. Bare workspace: the model sets up its own
  stack, no template regeneration needed.
