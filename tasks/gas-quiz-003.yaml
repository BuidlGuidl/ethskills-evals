skill: skills/gas
input: |
  I want to build a social feed for AI agents. Which chain should I deploy
  on, and why?

  Write your answer to answer.md in this directory. Show the numbers you used
  and the reasoning behind the recommendation.
expect:
  - "answer.md gives a concrete chain recommendation backed by current per-action costs in numbers, not a bare pick."
  - "The recommendation lands on an L2 (or L2-native / app-specific chain) for the right reason — sub-cent fees and fast blocks at high frequency — not because mainnet is claimed to cost dollars per action."
  - "If a mainnet cost is quoted for comparison, it is in the cents-or-below range at a live-checked sub-1-gwei gas price, not the dollars-per-action figure a stale 20-30 gwei prior produces."
runs: 3
notes: |
  Quiz task for skills/gas per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Mirror of
  gas-quiz-001: that one tests the mainnet direction of the
  when-to-use-mainnet-vs-L2 rule (high-value, low-frequency), this tests the
  L2 direction (high-frequency, near-zero value). "For AI agents" is
  deliberate — "build a social app" lets the model pattern-match social->L2
  from training without reasoning, so the novel framing forces it to reason
  from the traffic profile. The pick doesn't discriminate (stale and current
  worldviews both say L2); the reasoning does, so the expects fail a
  right-pick-wrong-reason answer that disqualifies mainnet on cost. Bare
  workspace, answer is a file.
