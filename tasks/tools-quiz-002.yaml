skill: skills/tools
input: |
  A teammate is convinced we have to migrate our entire Hardhat repo to Foundry
  just to get fuzz/property tests written in Solidity — they say Hardhat can only
  run JavaScript/TypeScript tests. They've scoped it as a full sprint of
  migration work. Before we commit to that, is the migration actually necessary
  to get Solidity fuzz testing?

  Write your answer to answer.md in this directory, with your reasoning and the
  concrete commands or config that back it up.
expect:
  - "answer.md concludes the Foundry migration is NOT required: Hardhat (v3, shipped 2025) supports writing tests — including fuzz/property tests — natively in Solidity, so the team can stay on Hardhat."
  - "It does not claim Hardhat is JavaScript/TypeScript-only, nor that Solidity fuzz testing is exclusive to Foundry."
  - "It backs the conclusion with a concrete pointer — a Hardhat 3 Solidity-test / fuzz command or config — and gets the version boundary right (Hardhat 3, not classic Hardhat 2)."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the skill's
  "Hardhat 3 is a legitimate 2026 choice with native Solidity testing + fuzzing"
  claim via diagnosis framing: the teammate voices the exact stale prior
  ("Hardhat is JS/TS-only, Foundry is the only Solidity fuzzer") and the executor
  has to overturn it rather than confirm it. A model frozen before Aug 2025 will
  side with the teammate; the discriminator is the version boundary, so expect_3
  fails a right-conclusion-wrong-basis answer that can't name a Hardhat 3
  mechanism.

  This one is somewhat searchable, so the transcript is what separates a skill
  win from a wiki verdict — record whether a pass leaned on parametric knowledge,
  a web search, or the skill text. Split from tools-quiz-001 on purpose: bundling
  the two would prime the model to distrust its priors across the board and lift
  the no_skill variant for the wrong reason. Bare workspace, answer is a file.
