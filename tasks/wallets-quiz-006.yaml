skill: skills/wallets
input: |
  I'm building a trading agent that will hold and move about $400k of treasury
  funds on Ethereum mainnet.

  The draft custody design in our PR: a Safe with two owners — the agent's hot key
  and my hardware wallet — with the threshold set to 1, so the agent can execute
  on its own. The PR argues: "the agent is the whole point; if it has to wait on a
  human co-signer it can't do its job, and my hardware wallet is there as a backup
  owner in case the agent's key is ever lost."

  Review this design. Is threshold 1 acceptable for an agent custodying this much?
  If not, give the owner set and threshold you would use instead, say which key
  lives where and how (hot vs cold), and explain what your design buys us if the
  agent's key is stolen. Be explicit about what the agent can and cannot do on its
  own under the design you recommend.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md rejects threshold 1 and does not endorse a design in which the agent's key alone can move funds; it states that at threshold 1 a stolen agent key drains the treasury with no second approval standing in the way."
  - "It prescribes a 2-of-3 Safe whose three owners are the agent's hot key, the human's hot wallet, and the human's cold/hardware wallet kept separately for recovery — not a 2-of-2, and not a design in which the human is merely a backup owner."
  - "It makes the compromise story concrete: at threshold 2 a stolen agent key cannot move funds by itself, and the human's two remaining keys can evict the compromised owner and keep control of the funds."
  - "It states the resulting tradeoff plainly — the agent can propose/queue transactions but needs the human's second signature to execute (or vice versa) — rather than claiming the agent still executes unilaterally under the recommended design."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's "Safe for AI Agents" section (SKILL.md L48-56) — the 2-of-3
  topology (agent hot / human hot / human cold, threshold 2) and its rationale:
  a compromised agent key cannot move funds alone, and the human can remove it.
  Framed as a PR review that plants threshold 1 as the trap, matching the
  quiz-003 / quiz-004 pattern, so the task is a decision rather than a recital.

  Distinct from wallets-quiz-002, which tests only that an audited multisig beats
  a lone hardware wallet and that one person can run a multisig alone. This tests
  the agent-specific topology: who holds which key, what the threshold is, and
  what it buys under compromise. The stale prior is agent-unilateral custody — a
  1-of-N Safe, or the agent's own EOA simply holding the funds — rationalized by
  "the agent has to run unattended". The PR states that rationalization out loud
  so the model has to reject it rather than quietly absorb it.

  Deliberate framing decision: unattended execution is the PR author's ARGUMENT,
  not a constraint of the task. The skill's own answer puts the human in the
  execution path (agent queues, human executes), so a task that demanded true
  unattended operation would make the expected answer unreachable and the task
  unfair. This is why quiz-002's "operates unattended for weeks" premise is not
  reused here. The fourth expect exists to force the model to own that tradeoff
  instead of dodging it — recommending 2-of-3 while implying the agent still acts
  alone is not a pass.

  Alongside quiz-002 this is the least web-searchable of the wallets quizzes: it
  is a design judgement rather than a lookup, so it should discriminate on
  reasoning. Skill vendored at skills/wallets (source ethskills.com/wallets/
  SKILL.md, skill source @ 191dcc1). Bare workspace, answer is a file.
