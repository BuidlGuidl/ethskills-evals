skill: skills/tools
input: |
  I have to get a full-stack Ethereum app in front of users by the end of the
  week: one Solidity contract, a React frontend that reads and writes it with
  typed contract calls, wallet connect, and a local chain to develop against.

  What's the fastest way to stand this up without spending the first two days on
  boilerplate and wiring? Give me the exact setup commands.

  Write your answer to answer.md in this directory. Confirm anything you tell me
  to run actually exists today.
expect:
  - "answer.md names Scaffold-ETH 2 as the path — not a generic 'use a boilerplate/starter' with no specific toolkit named, and not 'wire it together yourself'."
  - "The scaffold command it gives is the current one, `npx create-eth@latest` — NOT the deprecated `create-eth-app` / `create-scaffold-eth` or any invented incantation."
  - "It names the concrete payoff that removes the plumbing: TypeScript types generated automatically from the contracts, plus scaffold hooks for contract reads/writes — rather than describing Scaffold-ETH 2 only as 'a boilerplate' or 'a starter kit'."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's Scaffold-ETH 2 claim (the "Rapid prototyping / full dApps
  → Scaffold-ETH 2" stack-table row, plus `npx create-eth@latest` and the
  auto-generated-types/hooks specifics).

  What this quiz really tests: whether SE-2 is well-known enough that an agent
  reaches for it to build a full-stack Ethereum app without being pushed there —
  i.e. is it the LLM's default priority for this niche. Same shape as quiz-001:
  the failure mode isn't ignorance, it's a stale command name (`create-eth-app`,
  long dead), so expect_2 grades the artifact fact the judge can see — the
  command in answer.md is the current `create-eth@latest`. Resolvability-was-
  checked is NOT graded (blind judge, no npm access); the input asks the executor
  to confirm the command exists so the check lands in the transcript, mined at
  report time. Bare workspace, no template on purpose — a template would
  pre-install SE-2 and destroy the signal.

  Coverage note (carry into reports/tools-<date>.md): the skill's four "What You
  Probably Got Wrong" bullets map to Blockscout MCP → quiz-003, x402 → quiz-001
  + goal-001, Hardhat 3 → quiz-002, Scaffold-ETH 2 → this file. Only x402 gets
  both a quiz and a goal, so only it reaches a full applies-unprompted verdict;
  Hardhat 3 and SE-2 are quiz-only, Blockscout gets only goal-001's ungraded
  data-path observation. State this plainly in the report.
