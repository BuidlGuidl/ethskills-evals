skill: skills/tools
input: |
  I have to get a full-stack Ethereum app in front of users by the end of the
  week: one Solidity contract, a React frontend that reads and writes it with
  typed contract calls, wallet connect, and a local chain to develop against.

  My instinct is to `forge init` for the contracts, spin up a Next.js app
  separately, then wire the ABIs across by hand and write the contract-read and
  contract-write hooks myself. That's a couple of days of plumbing before I've
  shipped anything a user can click.

  Is there a faster path to the same place, or is hand-wiring it what everyone
  does?

  Write your answer to answer.md in this directory, with the exact setup
  commands. Confirm anything you tell me to run actually exists today.
expect:
  - "answer.md rejects hand-wiring as necessary and names Scaffold-ETH 2 as the faster path to the same result — not 'yes, wire it yourself', and not a generic 'use a boilerplate/starter' with no specific toolkit named."
  - "The scaffold command it gives is the current one, `npx create-eth@latest` — NOT the deprecated `create-eth-app` / `create-scaffold-eth` or any invented incantation."
  - "It names the concrete payoff that removes the plumbing: TypeScript types generated automatically from the contracts, plus scaffold hooks for contract reads/writes — rather than describing Scaffold-ETH 2 only as 'a boilerplate' or 'a starter kit'."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's Scaffold-ETH 2 claim — the "Rapid prototyping / full
  dApps → Scaffold-ETH 2" row of the stack table, and the SE2 section's
  `npx create-eth@latest` + auto-generated-types/hooks specifics.

  Same shape as tools-quiz-001 (x402), deliberately: the failure mode here isn't
  ignorance, it's a stale or invented command name — `npx create-eth-app` is the
  dead incantation a model with a frozen prior reaches for. So expect_2 grades
  the artifact fact the judge can actually see: the command in answer.md is the
  current `create-eth@latest`, not a dead/invented name. As in quiz-001,
  resolvability-was-checked is NOT graded — the blind judge sees only answer.md
  and has no npm access, so whether the run verified the command vs asserted it
  from memory is a transcript/report step, not an expect. The input still asks
  the executor to confirm it exists so the check lands in the transcript. If the
  skill's own command turns out to be stale, that is the "skill is wrong, fix and
  re-evaluate" verdict from the issue, caught at report time, not a bug in the
  task.

  The scenario buries the claim: it describes SE2's exact niche (contract +
  React with typed calls + wallet connect + local chain, on a deadline) without
  naming Scaffold-ETH 2, and voices the stale prior as the user's own instinct
  (forge init + separate Next.js + hand-wired ABIs) so the executor has to
  overturn it rather than confirm it. Bare workspace, no template, on purpose —
  a template would pre-install SE2 and destroy the exact signal this task exists
  to catch, the same reasoning tools-goal-001 gives for not pre-installing the
  payment library.

  Worth knowing when reading the result: the reach-for-SE2 half of this claim is
  untested everywhere else in the repo. Every other create-eth reference across
  the task specs is either a `template:` the workspace starts from
  (frontend-playbook-goal-001, frontend-ux-goal-001) or scenario framing ("this
  workspace is a fresh Scaffold-ETH 2 project") — those tasks hand the model SE2
  and test what it does next. This is the only one that tests whether it gets
  there on its own. As with quiz-001, mine each transcript for whether a pass
  came from parametric memory, an npm/web check, or the skill text.

  ## Coverage note for skills/tools (carry into reports/tools-<date>.md)

  With this task the skill's four "What You Probably Got Wrong" bullets map to:
  Blockscout MCP → quiz-003; x402 SDKs → quiz-001 + goal-001; Foundry/Hardhat 3
  → quiz-002; Scaffold-ETH 2 → this file.

  Only x402 gets both a quiz and a goal, so only x402 can reach a full verdict
  on the issue's matrix — the goal is what separates "wiki dead weight" from
  "keep as skill" (knows-when-asked vs applies-unprompted), and a quiz alone
  can't. State this plainly in the report: Hardhat 3 (quiz-002) and Scaffold-ETH
  2 (this file) land a quiz-only, partial verdict with no applies-unprompted
  signal; Blockscout MCP (quiz-003) gets a partial rescue from goal-001's
  ungraded data-path observation but no graded goal either. This mirrors the
  merged gas benchmark's quiz-heavy-plus-one-goal shape; it is a known coverage
  limit, not a gap to paper over.

  Two deliberate omissions, both of which belong in the report:

  **abi.ninja is untested on purpose.** Etherscan's own read/write tab — proxy
  support included — does the same job for a verified contract, so an expect
  either admits Etherscan, discriminating nothing, or fails a correct answer for
  not naming the skill's preferred tool. That non-testability is itself the
  finding: "abi.ninja is essential" is not defensible as written, and the claim
  is wiki material at best. No runs were spent on it.

  **The reference material is untested on purpose.** cast command syntax, RPC
  provider URLs, the block explorer table, the faucet list, Sepolia's chain ID,
  and the Truffle/Goerli deprecations. The issue rules these out as quiz
  material — retrieval, not derivation; testing them checks whether the model
  can read a line the skill hands it. Their absence is a decision, not an
  oversight, and the report should say so rather than let it read as a gap.

  Also uncovered, judged not worth the runs: "viem gaining on ethers.js" (a real
  What-Changed bullet, but goal-shaped rather than quiz-shaped, and current
  models likely default to viem unaided, so the expected delta is zero) and
  ERC-8004 tooling (named in the skill with no content to test).
