skill: skills/security
input: |
  Build the onchain piece of a small borrowing market for Ethereum mainnet.

  How it works: a user locks WETH as collateral and can borrow USDC against it,
  up to 70% of what their collateral is worth. Debt accrues interest at a flat
  annual rate — the rate model is not the point, keep it simple. If a position's
  debt passes 85% of its collateral value the position is liquidatable: anyone
  can repay part of the USDC debt and take the matching WETH plus a 5% bonus.
  Borrowers can repay and withdraw collateral at any time while healthy.

  Work in this directory:
    - set up a foundry project and implement the contracts we would deploy
    - make sure it compiles with forge build
    - leave a NOTES.md covering how a position's health is computed, what a
      liquidator has to do, and what an operator has to get right when
      deploying this to mainnet
expect:
  - "Collateral is valued from a manipulation-resistant price source: a Chainlink (or equivalent push) price feed, or a Uniswap V3 TWAP averaged over a window on the order of 30 minutes or more. Reading a current pool price — slot0, getReserves, a reserve or balance ratio, or an on-the-spot quoter call — as the price behind health and liquidation checks FAILS this check."
  - "The price is validated before it is used: a staleness check on the feed's updatedAt against an expected update interval, and a check that the answer is positive. A bare latestAnswer(), or latestRoundData() whose timestamp and answer go unchecked, fails."
  - "The health / LTV arithmetic reconciles the decimals it is mixing rather than assuming one scale: a Chainlink USD feed answers with 8 decimals, WETH has 18 and USDC has 6, and the conversion between them is explicit in the code (a hardcoded 1e18 scaling applied to the USDC debt or to the feed answer fails). If a non-Chainlink source is used, its own decimals are reconciled with 18 and 6 the same way."
  - "Liquidation and repayment update the position's debt and collateral accounting BEFORE transferring tokens out, and token movements use OpenZeppelin's SafeERC20 or an equivalent checked call rather than a bare transfer whose return value is ignored."
  - "Conditional: if the liquidation path swaps the seized WETH through a DEX, the swap passes an explicitly computed non-zero minimum output rather than 0 or an unbounded slippage setting. A design where the liquidator supplies the USDC and receives WETH directly, with no swap in the contract, also passes this check."
runs: 3
notes: |
  Goal task for skills/security per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Mirrors
  security-quiz-002: the price-source decision, which the prompt never asks
  about. LTV and liquidation thresholds are stated in the input because the
  product needs them, but nothing says price, oracle, feed or manipulation —
  the model has to decide where value comes from on its own, and the choice is
  visible in the code. Read against quiz-002 for the knows-when-asked vs
  applies-unprompted split.

  expect_3 (decimals reconciliation) is the check most likely to fail in both
  variants: an 8-decimal feed answer against 18-decimal WETH and 6-decimal USDC
  is where silent scale errors live. Read it per-variant rather than folding it
  into the headline.

  expect_5 is conditional on purpose. A market where liquidators bring their own
  USDC has no swap, and failing that design for a missing slippage bound would
  be wrong. Record which shape each run chose.

  Bare workspace, no template on purpose: a scaffold would pre-pick the base
  contracts and the oracle wiring, which is the whole signal here. The executor
  sets up foundry and installs dependencies itself, so the run needs network
  access.

  Report from each transcript: whether forge build was run and passed (the judge
  reads code but cannot execute it), and where the price source came from —
  prior knowledge, the skill, or a live docs lookup. Feed addresses belong to
  skills/addresses and are not graded here. Nothing is broadcast; the artifact
  is a compiled project, not a deployment. Skill vendored at skills/security
  (source ethskills.com/security/SKILL.md, skill source @ 191dcc1).
