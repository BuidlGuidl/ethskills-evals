skill: skills/frontend-ux
input: |
  An Ethereum React dApp with wagmi v2 and viem configured. A user filed
  a bug: "I pasted my friend's name
  vitalik.eth into the transfer form and the Send button just stays greyed
  out. No error, nothing." The recipient field is wired like this:

      const isValid = /^0x[a-fA-F0-9]{40}$/.test(input.trim());
      ...
      <input value={input} onChange={e => setInput(e.target.value)} />
      <button disabled={!isValid} onClick={send}>Send</button>

  Explain exactly why the user is stuck, describe step by step what a
  production recipient field should have done with that paste (the
  mechanism — the resolved hex itself is not the point), and say what you
  would replace this input with in this codebase. Write your answer to
  answer.md in this directory.
expect:
  - "answer.md reasons from the given regex: an ENS name has no 0x-hex form, so isValid stays false and the button silently stays disabled with no feedback to the user."
  - "The production behavior described is ENS resolution: detect a name, resolve it onchain to an address, validate and use the resolved address while showing the user what it resolved to — plus an inline reason whenever input is rejected."
  - "The replacement is a dedicated address input component with built-in ENS handling (an AddressInput-style component, own or from a library), not a raw text field guarded by a regex."
runs: 3
notes: |
  Quiz task for skills/frontend-ux per issue #1 (skill vendored at 191dcc1,
  verified byte-identical to live ethskills.com/frontend-ux/SKILL.md on
  2026-07-15). One claim per quiz; this one targets Rule 3 — the skill's
  headline "Addresses are just strings" prior. Models know ENS exists; the
  prone part is the reflex of validating addresses as hex strings, so the
  bug-report framing tests whether the model connects the symptom to the
  missing resolution path and reaches for a dedicated address component.
  The exact resolved hex is explicitly not asked for — that would be
  retrieval. Regex-only checksum nuances are deliberately out of scope
  (library detail, not the skill's claim). Rule 3 was cut from
  frontend-ux-goal-001 as low-signal there (SE-2's Address component comes
  with the template); frontend-ux-goal-002 expect 1 is the applied mirror.
  After runs, mine transcript.md for whether a dedicated address component
  was reached for unprompted and whether the skill was opened. Bare
  workspace, answer is a file.
