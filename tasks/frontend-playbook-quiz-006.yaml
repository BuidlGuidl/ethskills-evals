skill: skills/frontend-playbook
input: |
  We fixed a UI bug in our Scaffold-ETH 2 app, rebuilt, and re-uploaded
  to IPFS — but users still see the bug. The upload tool printed the
  same CID as the previous deploy, and a teammate says that settles it:
  the gateway is caching the old version, we just have to wait it out.

  Is the teammate right? State precisely what an unchanged CID proves,
  where in the pipeline things must have gone wrong, and the build
  discipline (commands included) that prevents a repeat — including how
  to prove locally that the new build really contains the fix before
  uploading anything. Write your answer to answer.md in this directory.
expect:
  - "answer.md refutes the caching theory from content addressing: a CID is a hash of the content, so an identical CID proves byte-identical content was uploaded — the old build shipped again, and no amount of waiting will surface the fix."
  - "The failure is located in the build pipeline: stale artifacts (.next / out) meant the rebuilt output never included the change."
  - "The discipline is concrete: delete .next and out before every rebuild, prove the fix is present locally before uploading (grep for a changed string in out/_next chunks and/or compare source-vs-out timestamps), and treat a changed CID as the proof that new content actually shipped."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the stale-build claim — the skill calls it the
  number-one IPFS footgun, with the CID as proof of content. Models
  know IPFS is content-addressed in the abstract; the quiz tests whether
  they apply it to refute a plausible alternative explanation (gateway
  cache) and land on the clean-rebuild discipline. Expect no_skill to do
  relatively well here — that outcome feeds the wiki-vs-skill verdict,
  so record it rather than dropping the task. Mirror pair with
  frontend-playbook-goal-001 expect 4 (same verification discipline,
  applied unprompted in DEPLOY.md). After runs, mine transcript.md for
  whether the rebuild commands came from the skill or general knowledge.
  Bare workspace, answer is a file.
