skill: skills/qa
input: |
  A Scaffold-ETH 2 dApp (hardhat flavor) live on Base. The /payouts page
  reads the user's USDC balance like this:

      const { data: usdcBalance } = useScaffoldReadContract({
        contractName: "USDC",
        functionName: "balanceOf",
        args: [connectedAddress],
      });

  In the running dev app the balance rendered as nothing at all:
  usdcBalance stayed undefined, no runtime error surfaced anywhere, and
  the network tab showed no failed request. A teammate "fixed" it by pasting a USDC
  entry (address + ABI) into packages/nextjs/contracts/deployedContracts.ts
  — that worked all week. Then the team shipped a contract change with
  yarn deploy, and the payouts page went blank again: the USDC entry had
  vanished from the file.

  Explain the whole arc: why the hook returned undefined silently
  instead of erroring, why the teammate's fix self-destructed on deploy,
  and the correct registration — which file, and what the entry looks
  like for USDC on Base. Write your answer to answer.md in this
  directory.
expect:
  - "answer.md derives the silent failure from the registry mechanism: scaffold hooks resolve contracts by name from the declarations in deployedContracts.ts / externalContracts.ts, and an unregistered name leaves the hook with no address/ABI, so it yields undefined data rather than an error or a network request."
  - "The vanished fix is traced to deployedContracts.ts being autogenerated: it is rewritten on every deploy, so manual entries there are wiped by design and the file must never be hand-edited."
  - "The correct registration is an entry in packages/nextjs/contracts/externalContracts.ts keyed by chain 8453 with the USDC address (0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913) and ABI."
runs: 3
notes: |
  Quiz task for skills/qa per issue #1 (skill vendored at 191dcc1,
  source ethskills.com/qa/SKILL.md). One claim per quiz; this one
  targets the externalContracts.ts registration rule — scaffold hooks
  silently no-op for unregistered contracts, and deployedContracts.ts is
  regenerated on deploy so manual edits self-destruct. Two symptoms
  (silent undefined, evaporating fix) bury the claim in a diagnosis: the
  model must connect both to the registry mechanics, not recite a file
  name. Mirror pair with qa-goal-001 (flags the hand-edited USDC entry)
  and qa-goal-002 (moves it to externalContracts.ts). After runs, mine
  transcript.md for whether the registry split came from the skill,
  parametric memory of SE-2, or reading docs. Bare workspace, answer is
  a file.
