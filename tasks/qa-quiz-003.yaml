skill: skills/qa
input: |
  A Scaffold-ETH 2 dApp. Every text field, select, and textarea in the
  app renders pill-shaped — fully rounded ends — and multi-line
  textareas clip their content at the corners. A teammate patched the
  two worst inputs with rounded-lg utility classes, but every new form
  field the team adds comes out pill-shaped again, and the patched ones
  drift out of style with the rest.

  The project's packages/nextjs/styles/globals.css contains, among the
  theme definitions:

      @plugin "daisyui/theme" {
        name: "light";
        ...
        --radius-field: 9999rem;
        ...
      }

  Explain the mechanism — what consumes that variable and why it
  reshapes every field in the app — why the per-component rounded-*
  patching keeps losing, and the correct fix: the value you would set
  and every place in this file it has to be applied. Write your answer
  to answer.md in this directory.
expect:
  - "answer.md traces the pills to the DaisyUI theme variable --radius-field: 9999rem, which field-type components (input, select, textarea) consume for their border radius — so every field in the app inherits the pill shape from one theme line."
  - "Per-component rounded-* patching is rejected with a reason: new fields keep inheriting the theme value, so the patches are whack-a-mole and drift; the fix belongs at theme level, once."
  - "The fix sets --radius-field to a sane value (~0.5rem or similar) in BOTH @plugin \"daisyui/theme\" blocks — light and dark — not just the one shown."
runs: 3
notes: |
  Quiz task for skills/qa per issue #1 (skill vendored at 191dcc1,
  source ethskills.com/qa/SKILL.md). One claim per quiz; this one
  targets the --radius-field pill-input claim and its fix-at-theme-level
  rule (both theme blocks, never per-component utilities). The quiz
  shows the variable in the snippet rather than asserting whose default
  it is — current create-eth ships 0rem, so the skill's "SE2 defaults to
  9999rem" line is stale against the latest template; the mechanism and
  fix level are what get graded. That staleness is itself worth
  watching: a with_skill run that asserts "this is the SE-2 default" is
  reciting, not reading. Mirror pair with qa-goal-001/002 (the same
  value is seeded into the goal template's globals.css). Bare workspace,
  answer is a file.
