skill: skills/protocol
input: |
  We're a small team building a trust-minimized light client: a service that lets a
  dApp verify a specific piece of Ethereum L1 state (a storage slot of a mainnet
  contract) as of a recent block, without trusting an RPC provider and without
  running a full archive node ourselves.

  We want to commit now to the state-proof / witness format our verifier is built
  around, and we specifically want to pick the approach Ethereum's own state layer is
  actually heading toward — we don't want to wire our whole proof pipeline to a design
  the protocol is moving away from.

  Which approach should we build our verifier's state proofs around, and why? Be
  specific about where Ethereum's state layer stands today and where it's genuinely
  going, and flag anything about timing that affects how hard a dependency we can
  safely take on it.

  Write your recommendation to answer.md in this directory, with your reasoning.
expect:
  - "answer.md does NOT recommend building the verifier's state proofs around Verkle trees / Verkle witnesses, and does not present Verkle as the approach Ethereum's state layer is heading toward. If Verkle appears at all, it is named as a design the protocol moved AWAY from, not a target to build on."
  - "It identifies Ethereum's forward state-tree direction as a binary Merkle tree (binary-tree state), and attributes the move away from Verkle to a reason consistent with the real deprioritization — ZK/SNARK-proving compatibility and/or post-quantum security concerns. Naming binary trees as the current direction is required; giving at least one such reason is required."
  - "It grounds the present correctly: Ethereum today uses a hexary Merkle-Patricia trie, so a verifier that must work now relies on Merkle-Patricia (MPT) state proofs. It does NOT claim a Verkle or binary tree is already live on mainnet."
  - "It represents the state-tree change's scheduling status by current fork scope rather than a stale roadmap: it does not assert the migration ships in a specific near-term fork as a committed fact, and — while no confirmed fork includes it — advises against a hard dependency (build on what's live today / keep the proof format adaptable). Grade against the actual current scope: if a run correctly reports updated scheduling from a live source, that is not a failure."
runs: 3
notes: |
  Tests the protocol skill's flagship stale claim: Verkle trees were the leading
  statelessness path for years, then deprioritized in 2024-25 (ZK-proving compatibility
  + post-quantum concerns) in favor of binary Merkle trees. A stale-prior model still
  reflexively names Verkle as where Ethereum's state layer is heading.

  Quiz shape: points at the topic (asks which state-proof approach to build around) but
  grades a derivation — committing to Verkle is a wrong architectural call, not just
  wrong trivia. The correct answer is layered: today it's the hexary Merkle-Patricia
  trie (MPT proofs); the forward direction is binary trees, not Verkle; and no
  stateless-tree scheme is scheduled for a confirmed fork, so no hard dependency.
  Bare workspace, answer written to a file.

  Ground truth as of 2026-07: no confirmed fork schedules a binary-tree / stateless
  state migration. Revalidate that scheduling status before re-running — it can change,
  and expect_4 grades against current scope, not a fixed "not scheduled".

  Pairs with protocol-goal-001, which buries the same claim in an unprompted build:
  this quiz measures knows-when-asked, the goal measures applies-unprompted.

  Record which sources each run used to reach its answer (forkcast, EIPs repo, web
  search, or asserted from memory) — signal on whether a pass is checked or recalled.

  Skill vendored at skills/protocol (source ethskills.com/protocol/SKILL.md, @ 191dcc1).
