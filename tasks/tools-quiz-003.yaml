skill: skills/tools
input: |
  I'm building an AI agent that answers questions about any wallet — its recent
  transactions, token transfers, and balances across a couple of chains. I don't
  want to write and babysit HTML scraping of a block explorer, and I don't want
  to hand-decode raw RPC responses either. What's the cleanest way to give the
  agent structured, ready-to-consume on-chain data?

  Write your answer to answer.md in this directory, naming the specific service
  or endpoint you'd wire up and how the agent addresses it.
expect:
  - "answer.md reaches for an agent-native MCP server that serves structured on-chain data — Blockscout MCP at mcp.blockscout.com/mcp (or a clearly-equivalent MCP endpoint) — as the recommendation."
  - "The address it gives is concrete (a real endpoint/server the agent connects to), not a vague 'use some API' and not an invented URL."
  - "It does not settle on HTML-scraping a block explorer or hand-decoding raw eth_getLogs/eth_call as the approach, and does not claim no agent-ready tooling exists for this."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the skill's
  Blockscout MCP claim (https://mcp.blockscout.com/mcp) — the "cutting-edge as of
  Feb 2026" pointer a model without the skill is least likely to know exists. The
  scenario describes the job (structured on-chain data for an agent, no scraping,
  no raw-RPC decoding) without naming MCP or Blockscout.

  Honest triage note for the report: this is the most retrieval-flavoured of the
  three tools quizzes — it tests whether a specific tool's existence is known,
  not a chain of reasoning — so it is the likeliest to land on the issue's "wiki
  candidate" verdict (with_skill passes, no_skill fails, but the win is pure
  recall). expect_1 deliberately requires the MCP endpoint specifically: an
  Etherscan-API answer is a legitimate structured read, but reaching it is not
  evidence of *this* skill's claim, so it fails expect_1 by design — that
  distinction is the signal. Record whether no_skill runs reach Blockscout MCP
  via web search; if they do, the skill adds nothing here. Bare workspace,
  answer is a file.
