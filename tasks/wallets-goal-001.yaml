skill: skills/wallets
input: |
  Build a small tool that gives a user "one-click" entry into a DeFi position.

  The user: someone holds USDC in the MetaMask wallet they have used for two
  years — a normal externally-owned account with an ENS name and on-chain
  history they want to keep. They will NOT create a new smart wallet, deploy
  anything they would call "an account," or move their funds to a fresh address.
  In a single confirmation they want to:
    (a) approve Aave V3's Pool to spend 5,000 USDC, and
    (b) supply that 5,000 USDC to Aave V3,
  as ONE atomic on-chain action on Ethereum mainnet — so a half-done state where
  the approval lands but the supply does not is impossible.

  Work in this directory. Deliver:
    - entry.ts — a viem-based implementation a developer could run against
      mainnet with a funded account (real code, not pseudocode); include the
      addresses and contract calls you rely on.
    - NOTES.md — explain the approach and why it meets the user's constraints
      (same address, no new wallet, single atomic action), what the developer
      must get right for it to be safe to run, and anything that must never end
      up committed to the repository.

  Assume Ethereum mainnet as it exists today.
expect:
  - "entry.ts performs the approve + supply as a SINGLE atomic transaction from the user's existing EOA using EIP-7702 — an authorization the EOA signs (viem signAuthorization / an authorizationList on the transaction) delegating it to batch-executor contract code — and the mechanism is an actual decision that got made, not left open or hand-waved."
  - "It is not done by deploying a new smart-contract / ERC-4337 / Safe account and not as two sequential transactions; the user's original EOA address is preserved (no migration of funds, no new counterfactual account address)."
  - "Key handling shows no stale-unsafe tell: entry.ts loads the signing key from an env var or keystore rather than hardcoding it, and NOTES.md warns that keys/secrets (e.g. .env) must never be committed to git."
  - "NOTES.md treats the batching mechanism as live on Ethereum mainnet today (enabled by the Pectra upgrade, May 2025), not as experimental, testnet-only, or a future proposal."
runs: 3
notes: |
  Goal task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Deliberate mirror of
  wallets-quiz-001: same Aave approve+supply scenario and the same "keep the
  same EOA, no new wallet, one atomic action" constraints, but the mechanism is
  never named and never asked about — the prompt avoids EIP-7702, Pectra,
  set-code, authorization, and batching. The decision has to surface unprompted
  on the way to runnable code. Read the two together: quiz-001 measures
  knows-when-asked, this measures applies-unprompted, and only the split (quiz
  passes both variants, goal no_skill fails / with_skill passes) reaches the
  issue's "keep the skill" verdict — no quiz alone can.

  The constraints force EIP-7702 specifically: a Safe or 4337 account is a new
  smart-contract account at a new address holding the funds, which the user
  rules out, and two sequential txs break atomicity. Secondary buried claim:
  never-commit-secrets key handling, surfaced by "must never end up committed to
  the repository." Record which approach each run reaches for. Nothing is
  broadcast — the artifact is runnable code, not a live tx. Bare workspace, no
  template on purpose: handing a template would pre-pick the mechanism and
  framework and kill the signal. Skill vendored at skills/wallets (source
  ethskills.com/wallets/SKILL.md, skill source @ 191dcc1).
