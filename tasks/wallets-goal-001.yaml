skill: skills/wallets
input: |
  Build a small tool that gives a user "one-click" entry into a DeFi position.

  The user: someone holds 2 WETH in the MetaMask wallet they have used for two
  years — a normal externally-owned account with an ENS name and on-chain
  history they want to keep. They will NOT create a new smart wallet, deploy
  anything they would call "an account," or move their funds to a fresh address.
  Their account has no token approvals to anything, and holds only enough ETH to
  pay gas.

  In a single confirmation they want to:
    (a) swap all 2 WETH to USDC on Uniswap V3, and
    (b) supply every USDC that swap returns to Aave V3,
  as ONE atomic on-chain action on Ethereum mainnet — so a half-done state where
  the swap lands but the supply does not is impossible. The supplied amount is
  whatever the swap actually returns; it is not known before the transaction
  runs.

  Work in this directory. Deliver:
    - entry.ts — a viem-based implementation a developer could run against
      mainnet with a funded account (real code, not pseudocode); include the
      addresses and contract calls you rely on.
    - NOTES.md — explain the approach and why it meets the user's constraints
      (same address, no new wallet, single atomic action), and what the developer
      must get right for it to be safe to run.

  Assume Ethereum mainnet as it exists today.
expect:
  - "entry.ts performs the swap + supply as a SINGLE atomic transaction from the user's existing EOA using EIP-7702 — an authorization the EOA signs (viem signAuthorization / an authorizationList on the transaction) delegating it to batch-executor contract code — and the mechanism is an actual decision that got made, not left open or hand-waved."
  - "It is not done by deploying a new smart-contract / ERC-4337 / Safe account and not as two sequential transactions; the user's original EOA address is preserved (no migration of funds, no new counterfactual account address)."
  - "The batch is not collapsed via an off-chain-signature workaround — EIP-2612 permit, Aave's supplyWithPermit, or Uniswap's Permit2 — which cannot work for this setup: WETH exposes no EIP-2612 permit, Permit2 needs a prior on-chain approval the account does not have, and the supplied USDC amount does not exist to be signed for until the swap executes. Shipping one of these as the solution fails this check; correctly ruling one out in NOTES.md does not."
  - "The batch determines the supplied USDC amount at execution time on-chain (from the swap's return value or the executor's post-swap balance) rather than a fixed amount computed off-chain before sending."
  - "NOTES.md treats the batching mechanism as live on Ethereum mainnet today (enabled by the Pectra upgrade, May 2025), not as testnet-only or a future proposal. A caveat that 7702 tooling is still maturing is acceptable and does not fail this check, so long as the mechanism is presented as usable on mainnet now."
runs: 3
notes: |
  Goal task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Deliberate mirror of
  wallets-quiz-001: same WETH -> USDC -> Aave scenario and the same "keep the
  same EOA, no new wallet, one atomic action" constraints, but the mechanism is
  never named and never asked about — the prompt avoids EIP-7702, Pectra,
  set-code, authorization, and batching. The decision has to surface unprompted
  on the way to runnable code. Read the two together: quiz-001 measures
  knows-when-asked, this measures applies-unprompted, and only the split (quiz
  passes both variants, goal no_skill fails / with_skill passes) reaches the
  issue's "keep the skill" verdict — no quiz alone can.

  The scenario is built so every non-7702 route is structurally dead:
    - a new smart account / Safe / 4337 -> new address, which the user refuses
    - two sequential transactions -> breaks atomicity
    - EIP-2612 permit / Aave supplyWithPermit -> WETH exposes no permit, and the
      USDC amount is not known until the swap runs, so it cannot be pre-signed
    - Uniswap Permit2 -> needs a one-time on-chain approve per token first, and
      the account is stated to have no approvals to anything
    - a payable "zap" contract -> the user holds WETH (an ERC-20), not ETH, so
      value cannot be attached in place of an approval
  The "no approvals to anything", "only enough ETH for gas", and "amount not
  known before the transaction runs" clauses are each load-bearing. Do not
  soften them without re-checking which escape reopens.

  Scenario history — this is a fix, not a redraft. The 2026-07-15 benchmark
  (reports/wallets-2026-07-15.md) ran an earlier version of this task whose
  scenario was a single approve+supply of a fixed 5,000 USDC to Aave. That is
  escapable via Aave's supplyWithPermit: an EIP-2612 permit signature plus one
  supply call is genuinely atomic, genuinely keeps the EOA pure, and is not
  EIP-7702. Two of three with_skill runs took it and failed expect_1, recording
  with_skill 1/3 vs no_skill 3/3 — a negative delta that was partly this task's
  bug, not the skill's. The report's "what should change in the eval" row asked
  for exactly two things, both applied here: batch across multiple protocols so
  no single permit entrypoint absorbs it, and an explicit expect rejecting
  protocol-specific permit shortcuts.

  That benchmark ALSO surfaced a real skill regression independent of this bug
  (mistakes/wallets/wallets-7702-caveats-steer-away.yaml): the skill's own hedges
  gave a cautious model license to route around its flagship mechanism. Re-run
  against this scenario to see whether that survives once the permit escape is
  gone. If it does, it is a genuine negative delta and the strongest wallets
  result so far.

  Record which approach each run reaches for. Nothing is broadcast — the artifact
  is runnable code, not a live tx. Bare workspace, no template on purpose:
  handing a template would pre-pick the mechanism and framework and kill the
  signal. Skill vendored at skills/wallets (source ethskills.com/wallets/SKILL.md,
  skill source @ 191dcc1).

  The never-commit-secrets check that used to sit here was dropped, along with
  the "anything that must never end up committed to the repository" line that
  prompted it. It passed 12/12 across both variants on 2026-07-15 — no
  discriminating power — and since `pass` requires every expect, it could only
  ever add false failures to this task's headline claim. It also named its own
  expectation in the prompt, which is what a goal task exists not to do. If the
  skill's secrets section is worth testing, it needs its own task where the delta
  is attributable.

  expect_5 (formerly expect_4) is deliberately loose: it originally failed a
  NOTES.md that called 7702 "experimental", but SKILL.md L34 tells the reader it
  is "still early for production agents — use standard EOAs or Safe until tooling
  matures". A with_skill executor following the skill faithfully could hedge and
  fail the check BECAUSE it read the skill, which would land in the table as a
  skill failure when it is a task-design bug. The check now fails only the stale
  answer (testnet-only / future proposal) and admits a maturity caveat. The
  underlying SKILL.md tension (L10 "this is NOT coming soon" vs L34 "still early,
  use Safe") is no longer just a candidate skill edit — the 2026-07-15 runs
  tripped on it and it is filed as a mistake record.
