skill: skills/wallets
input: |
  Build a small tool that gives a user "one-click" entry into a DeFi position.

  The user story: someone holds USDC in their existing MetaMask wallet — a
  normal externally-owned account they have used for two years, with an ENS
  name and on-chain history they want to keep. They are NOT willing to create a
  new smart wallet, deploy anything they would call "an account," or move their
  funds to a fresh address. In a single confirmation they want to:
    (a) approve Aave V3's Pool to spend 5,000 USDC, and
    (b) supply that 5,000 USDC to Aave V3,
  as one atomic on-chain action on Ethereum mainnet — so it either all happens
  or none of it does. Two separate wallet confirmations is not acceptable to
  them; a half-done state where the approval lands but the supply does not is
  exactly what they want to rule out.

  Deliver in this directory:
    - entry.ts — a viem-based implementation of the flow. Real code a developer
      could run against mainnet with a funded account, not pseudocode. Include
      the addresses and contract interactions you rely on.
    - NOTES.md — explain the approach you chose and why it satisfies the user's
      constraints (same address, no new wallet, single atomic action). Call out
      anything the developer must get right for this to be safe to run, and
      anything that must never end up committed to the repository.

  Assume Ethereum mainnet as it exists today.
expect:
  - "entry.ts performs the approve + supply as a SINGLE atomic transaction from the user's existing EOA using EIP-7702 — i.e. an authorization the EOA signs (viem signAuthorization / an authorizationList on the transaction) that delegates it to batch-executor contract code — not by deploying a new smart-contract or ERC-4337 account, and not as two sequential transactions."
  - "The solution keeps the user's original EOA address: no migration of funds to a new address and no counterfactual smart-account address is introduced, consistent with EIP-7702 delegation."
  - "entry.ts loads the signing private key from an environment variable or a keystore rather than hardcoding it in source, and NOTES.md explicitly warns that keys/secrets (e.g. .env) must never be committed to git."
  - "NOTES.md identifies the batching mechanism as live on Ethereum mainnet today (enabled by the Pectra upgrade, May 2025), not as experimental, testnet-only, or a future proposal."
runs: 3
notes: |
  Goal-shaped task for the wallets skill (vendored at skills/wallets, fetched
  from ethskills.com/wallets/SKILL.md; skill source @ 191dcc1). Bare workspace,
  no template: the deliverables (entry.ts + NOTES.md) are written from scratch.

  The buried claim is the skill's flagship: EIP-7702 lets an existing EOA
  execute batched contract logic atomically without becoming a smart-contract
  wallet. The prompt never names EIP-7702, Pectra, batching, set-code, or
  delegation — the user's hard constraints (keep the same address, no new
  wallet, one atomic action) force that decision, and a stale-prior model
  either declares it impossible from an EOA and reaches for a deployed 4337/Safe
  account, or falls back to two sequential txs (breaking atomicity). Secondary
  buried claim: never-commit-secrets key handling, surfaced by "must never end
  up committed to the repository."
  Awaiting human sanity-check before the first recorded benchmark.
