skill: skills/frontend-playbook
input: |
  A Scaffold-ETH 2 project (foundry flavor) with a vault contract,
  developed against a fork of Base: `yarn fork --network base` is
  running, and `yarn deploy` reports the vault deployed successfully.
  Since we are forking Base, a teammate set:

      // scaffold.config.ts
      targetNetworks: [chains.base],

  Now the app shows the contract as not deployed, reads return nothing,
  and when we force a write the wallet prompts for a transaction on Base
  mainnet with real gas. Work out which network the frontend is actually
  talking to versus where the vault actually lives (name the chain IDs),
  why the teammate's line looked logical but breaks everything, the
  one-line fix, and the moment in the project's life when chains.base
  becomes the right value. Write your answer to answer.md in this
  directory.
expect:
  - "answer.md names both chain IDs: the fork is a local anvil chain with chain ID 31337 where the vault lives, while targetNetworks: [chains.base] points the frontend at real Base (8453), where the vault does not exist — hence not-deployed, empty reads, and real-gas wallet prompts."
  - "The fix is targetNetworks: [chains.foundry] (31337) whenever developing against the fork, even though the fork mirrors Base state — forking Base does not mean targeting Base."
  - "chains.base becomes correct only when the contracts are deployed to the real network."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the chain-ID gotcha — the skill's most
  counterintuitive line: when forking Base the frontend target must be
  chains.foundry (31337), not chains.base. The teammate's reasoning in
  the scenario is exactly the intuition the skill corrects, so the model
  has to argue against the plausible-looking config from the symptoms.
  After runs, mine transcript.md for whether 31337 was derived from
  anvil behavior, recalled, or lifted from the skill. Mirror pair with
  frontend-playbook-goal-001 expect 2 (same decision, applied
  unprompted). Bare workspace, answer is a file.
