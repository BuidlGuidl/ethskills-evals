skill: skills/security
input: |
  Design review on our lending market. Positions are up to $2M of WETH
  collateral backing USDC debt, liquidated at 85% LTV, on Ethereum mainnet.

  A teammate has written up how we should price the collateral:

    "Read it straight from the Uniswap V3 WETH/USDC 0.05% pool with slot0. That
    pool holds around $200M of liquidity. To move its price 10% an attacker
    would have to push tens of millions of dollars through it, and arbitrage
    bots would drag it back within the same block, so they would eat the loss
    for nothing. Chainlink is an extra external call, its answer can be stale
    between updates, and it puts a third party between us and our own
    liquidations. Our own on-chain reserve of truth is strictly better."

  Work the numbers rather than trading opinions: what does it actually cost an
  attacker to make our contract read a price 10% away from the market price at
  the moment our contract reads it, and what do they get for it? Then tell me
  what we should price collateral with, and what has to be checked around that
  price before we use it in a health calculation.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md rejects the teammate's cost argument with the atomicity reasoning: the capital needed to move the pool is borrowed and repaid inside the SAME transaction (a flash loan), so the tens of millions is never at risk and the attacker's true cost is only pool fees plus slippage on the round trip — and arbitrage cannot help because the manipulated read, the borrow or liquidation it enables, and the unwind all complete before any other transaction can run."
  - "It concludes that a Uniswap V3 slot0 spot read (or any single-block spot price: getReserves, a balance ratio, an on-the-spot quoter call) must NOT be the price source for these health calculations, regardless of how deep the pool is."
  - "It prescribes a manipulation-resistant source instead: a Chainlink (or equivalent push) price feed, or a Uniswap V3 TWAP averaged over a meaningful window on the order of 30 minutes or more, and if a TWAP is offered it is presented as the weaker on-chain fallback rather than as good as the feed for liquidation-grade decisions."
  - "It states what must be validated on the price before it is used: a staleness check on the feed's updatedAt timestamp against the feed's update interval, plus a sanity check that the answer is positive (a bare latestAnswer() or an unchecked latestRoundData() is called out as insufficient)."
  - "It does NOT settle for keeping the spot read plus a patch — a deviation threshold or circuit breaker on the spot price, a median across several pools' spot prices, or moving to a bigger pool — as the primary fix."
runs: 3
notes: |
  Quiz task for skills/security per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  DEX spot prices are never oracles, and a real feed needs staleness plus
  sanity validation (SKILL.md "Never Use DEX Spot Prices as Oracles").

  Derivation rather than retrieval: the teammate's proposal states a plausible
  cost model (deep pool, arbitrage snaps it back) and the model has to overturn
  it by reasoning about atomicity, not by reciting the rule. The $200M pool
  depth is deliberately large so that the size argument sounds correct — a run
  that answers "use Chainlink because spot is manipulable" without engaging the
  flash-loan atomicity fails expect_1 even though it names the right source.

  Mirrored by security-goal-002, where the same choice has to surface
  unprompted inside a build.

  Report, do not grade: whether the run reaches for a specific feed address, and
  whether it treats the feed's heartbeat as a number to look up per feed or
  hardcodes one hour (SKILL.md's example hardcodes 3600, which is wrong for
  feeds on a 24-hour heartbeat). Feed addresses belong to skills/addresses, so
  they are not graded here. Skill vendored at skills/security (source
  ethskills.com/security/SKILL.md, skill source @ 191dcc1). Bare workspace,
  answer is a file.
