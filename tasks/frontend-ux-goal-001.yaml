skill: skills/frontend-ux
template: templates/se-2
input: |
  This workspace is a fresh Scaffold-ETH 2 project. Build a USDC staking
  dApp on top of it:

  - A Staker contract: users deposit USDC and can withdraw their full
    position at any time. Keep it minimal — no rewards logic needed.
  - A /stake page in the Next.js app where a user can stake, withdraw, and
    see their wallet USDC balance, their ETH balance (they need it for
    gas), and their staked position.

  The app targets Base, where USDC is
  0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913. For local development you may
  deploy a mock token, but keep it faithful to the real one.

  Treat this as a real product: the page goes in front of real users at the
  end of the week. You do not need to deploy anywhere or run the app —
  finished, committed code is the deliverable.
expect:
  - "The stake flow handles the ERC-20 allowance: an approve step gates staking when allowance is insufficient, Approve and Stake are never presented as simultaneously active actions, and the UI resolves to one primary action at a time in the order connect -> wrong network -> approve -> stake."
  - "Every transaction button (approve, stake, withdraw) has its own pending state, disabled from click through onchain confirmation — not wagmi isPending alone and no loading state shared across buttons — and a wallet rejection releases the button (cleanup in finally or equivalent) instead of locking it."
  - "USDC is modeled with 6 decimals end to end: any mock token reports decimals() = 6, and the frontend converts with parseUnits/formatUnits at 6 decimals — no parseEther/formatEther on USDC amounts and no raw base units rendered to the user."
  - "Amounts shown to the user carry USD context alongside the token amount; the ETH gas balance in particular shows a USD value from a real price source (SE-2's native-currency price), not a 1:1 stablecoin shortcut, and bare token units with no USD context anywhere are a fail."
  - "Failed or rejected transactions surface a human-readable message in the UI near the triggering action; raw revert data, raw error objects, or silent failures are a fail."
  - "The shipped page carries the product's own identity: page metadata (tab title, OG/social tags) and visible branding are updated for the staking app, not left as Scaffold-ETH 2 template defaults."
  - "The /stake page uses SE-2's theme tokens and stays coherent under the template's light/dark switcher: page background, surfaces, and text use semantic theme classes (bg-base-*/text-*), with no hardcoded full-page dark wrapper (bg-black, bg-gray-900, or raw dark: overrides). If dark-only was a deliberate choice, the theme control is removed."
  - "The build is actually retargeted at Base in scaffold.config.ts: targetNetworks includes base, not left on the hardhat-only default. Polling is a deliberate decision — either pollingInterval is tuned into the responsive ~2-5s range, or the default stays and freshness after a transaction comes from post-confirmation refetch/invalidation. Doing neither (30s default and no refetch, so the UI goes stale) is a fail, as are runaway request patterns (uncleaned intervals, duplicate watchers, block-watching multiplied by an interval)."
runs: 3
notes: |
  Goal task for skills/frontend-ux (vendored at 191dcc1, source
  ethskills.com/frontend-ux/SKILL.md), drafted 2026-07-15 per issue #1.
  The prompt never names the skill's claims; each is a decision on the way
  to the goal. Staking an ERC-20 forces the approve flow (Rules 1-2:
  per-button pending states through confirmation, one primary action at a
  time). USDC forces the 6-decimals conversion (Rule 9) — "faithful to the
  real one" is the only nudge, so a stale prior ships an 18-decimal mock or
  parseEther. "Real product / real users" licenses Rule 7 (error
  translation) and Rule 8 (metadata/branding) without naming them. Rule 4
  (USD context) is forced through the ETH gas balance rather than USDC —
  a stablecoin's dollar figure is ~1:1 and trivial, so the prompt asks for
  the ETH balance, whose USD value needs a real price lookup (SE-2 ships
  the native-currency price); no_skill runs typically render token units
  alone, which is exactly the habit the rule targets. Rule 6 (theming) is
  the added expect 7 — a visual-only claim with no quiz, so the goal is
  its only coverage. Deliberately left out: Rule 3 (address UX — the SE-2 template's
  Address component makes it low-signal); quiz-005 carries that rule
  instead. Reads together with the quizzes per the issue's verdict table
  (knows-when-asked vs applies-unprompted): expect 1 mirrors quiz-003
  (four-state flow), expect 2 mirrors quiz-001 (button lifecycle), expect
  3 mirrors quiz-002 (USDC decimals). Expects 4-6 (USD context, error
  translation, metadata) have no quiz on purpose — asked directly they
  are pure retrieval — so the goal is their only coverage. Expect 8
  carries Rule 5, which no quiz covers: targeting Base forces a real
  scaffold.config.ts edit (the template ships targetNetworks:
  [chains.hardhat] and pollingInterval: 30000), making the chain retarget
  and polling posture observable build decisions. Either polling path
  passes — responsive ~2-5s interval, or default kept with
  post-confirmation refetch — since the skill's own healthy baseline is
  low, steady request volume; only stale-and-no-refetch or runaway
  patterns fail.
