skill: skills/wallets
input: |
  Last Tuesday we sent an EIP-7702 transaction from our treasury EOA on Ethereum
  mainnet. The account signed an authorization naming our BatchExecutor contract,
  the transaction carried that authorization and then called into the batch. The
  transaction was mined, but the batch call itself reverted — one of the inner
  approvals failed — so we wrote the whole thing off as a no-op and moved on.

  We have since found a critical bug in BatchExecutor and are decommissioning it.
  Nothing else has been sent from that EOA since: no further 7702 transactions,
  no authorizations of any kind. Our security reviewer wants two questions
  answered before sign-off:

    1. As of right now, days later, is that EOA still delegated to BatchExecutor?
    2. If it is, what exactly do we have to do to get rid of the delegation?

  Answer both. Write your answer to answer.md in this directory, showing your
  reasoning.
expect:
  - "answer.md says the EOA IS still delegated to BatchExecutor: the delegation persists after the transaction that set it and stays in effect until it is replaced or explicitly cleared — it is not scoped to that one transaction and does not lapse or expire on its own."
  - "It says the batch call reverting did NOT undo the delegation: the authorization was applied and the delegation update remained in place even though the inner call failed. It does not treat the mined-but-reverted transaction as a no-op."
  - "For removal it requires an affirmative new action from the account — signing a further EIP-7702 authorization that replaces the delegation or clears it (delegating to the zero address is one accepted form) — and not waiting for it to expire, and not merely decommissioning/abandoning the BatchExecutor contract or 'no longer using it'."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's delegation-lifecycle claim, which SKILL.md states three
  separate times (L18, L24, L25) — a 7702 delegation is not "one and done", it
  stays active until replaced or explicitly cleared, and a transaction that later
  fails can leave the delegation update itself in place. The repetition is the
  tell that the skill author treats this as load-bearing.

  Distinct from wallets-quiz-001, which tests only that 7702 is live and that an
  EOA can batch atomically. This tests what the delegation does AFTER that
  transaction — the two must not be collapsed into one file.

  Two stale priors to beat: (a) the delegation is scoped to the transaction that
  carried it and lapses when that transaction ends, and (b) a reverted batch means
  nothing happened at all. The scenario is built so both are load-bearing: the tx
  was mined with the authorization applied and only the inner call reverted, and
  the delegate contract is now known-bad — so a wrong answer signs off on a live
  delegation to a buggy executor. The two questions state facts only and do not
  telegraph the answer.

  The removal expect deliberately sits at the skill's own altitude — "replaced or
  explicitly cleared" — with the zero-address form accepted but not required. The
  skill does not state the clearing mechanism, so demanding it would test beyond
  the skill.

  Caveat: the lifecycle is documented in the EIP-7702 spec, so a no_skill run with
  live search can pass without the skill. Mine each run's transcript.md for whether
  the answer came from parametric knowledge or a live lookup and report it. Also
  flag any run that gets persistence right but still calls the reverted tx a no-op
  — that is prior (b) surviving alone, and it is a partial pass worth naming rather
  than burying in the aggregate. Skill vendored at skills/wallets (source
  ethskills.com/wallets/SKILL.md, skill source @ 191dcc1). Bare workspace, answer
  is a file.
