skill: skills/ship
input: |
  We minted a 5,000-piece NFT collection on Ethereum mainnet in 2024, and
  holders keep trading it by hand in our Discord — someone posts "selling #3312
  for 0.4 ETH", they DM, they send. We want listing and buying to happen on our
  own site instead: a holder lists a piece at a price, anyone browsing can buy
  it, and the artist takes 2.5% of every resale. Sellers can cancel a listing,
  and nothing sits in escrow while it's listed — owners keep the piece until it
  actually sells.

  We have one Solidity dev, four weeks, and budget for exactly one audit pass at
  the end. I need to know what we're sending to the auditor and whether four
  weeks is realistic.

  Write your answer to plan.md in this directory, covering the build plan and
  what goes into the audit scope.
expect:
  - "plan.md names the exact set of custom Solidity contracts that will be written and audited, as a concrete list or a count — not 'TBD' or 'whatever the marketplace ends up needing'."
  - "The custom Solidity surface is at most one contract; zero custom contracts passes. A plan that writes its own order-book, matching, or settlement contract fails, as does one that adds separate escrow, fee-splitter, or listing-registry contracts."
  - "Listing and settlement rest on infrastructure that already exists and is already audited — an established order-settlement protocol such as Seaport/OpenSea, Reservoir, Blur or 0x — rather than matching and settlement logic the team writes itself. Naming a specific protocol is not required to pass; what fails is a plan in which the team builds its own order book, matching, or settlement."
  - "The 2.5% artist cut rests on an existing royalty or fee mechanism (ERC-2981 plus marketplace enforcement, or the chosen protocol's own fee recipient), or on the single thin fee-forwarding contract that expect 2 already allows. What fails is a separate fee-splitter or payment-router contract stacked alongside other custom contracts."
runs: 3
notes: |
  Quiz task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets one claim:
  don't over-engineer — an MVP is 0-2 contracts, and a marketplace over an
  existing protocol is 0-1 (SKILL.md "MVP Contract Count" and archetype 3).

  The claim is never asked for. The derivation proxy is audit scope: pricing a
  single audit pass forces the model to enumerate the exact Solidity surface,
  so the contract count surfaces as a byproduct of a budgeting question rather
  than as the question. The one-dev / four-week / one-audit constraint supplies
  the scope pressure.

  Load-bearing clauses in the scenario:
    - the collection is already deployed on mainnet, so chain selection is a
      stated fact and cannot become the answer (that claim belongs to
      tasks/gas-quiz-001.yaml)
    - "nothing sits in escrow while it's listed" is both a real product
      requirement and a nudge toward how approval-based order protocols already
      work, without naming one
    - one collection, one site — a factory has no legitimate reason to appear

  Worth recording per run: which existing protocol each run reaches for, and
  whether the artist cut is routed through ERC-2981 or a contract the team
  would write.

  Bare workspace, answer is a file. Skill vendored at skills/ship (source
  ethskills.com/ship/SKILL.md, skill source @ 191dcc1).
