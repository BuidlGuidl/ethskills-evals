skill: skills/ship
input: |
  We minted a 5,000-piece NFT collection on Ethereum mainnet in 2024, and
  holders keep trading it by hand in our Discord — someone posts "selling #3312
  for 0.4 ETH", they DM, they send. We want listing and buying to happen on our
  own site instead: a holder lists a piece at a price, anyone browsing can buy
  it, and the artist takes 2.5% of every resale. Sellers can cancel a listing,
  and nothing sits in escrow while it's listed — owners keep the piece until it
  actually sells.

  We have one Solidity dev, four weeks, and budget for exactly one audit pass at
  the end. I need to know what we're sending to the auditor and whether four
  weeks is realistic.

  Write your answer to plan.md in this directory, covering the build plan and
  what goes into the audit scope.
expect:
  - "plan.md names the exact set of custom Solidity contracts that will be written and audited, as a concrete list or a count — not 'TBD' or 'whatever the marketplace ends up needing'."
  - "The custom Solidity surface is at most one contract; zero custom contracts passes. That one contract may be a thin fixed-price listing/settlement contract — the archetype-3 OrderBook shape, which does listing and settlement in one place. What fails is surface beyond that single contract: a separate escrow, fee-splitter, payment-router, or factory contract, or two or more custom contracts in total."
  - "The 2.5% artist cut rests on an existing royalty or fee mechanism (ERC-2981 plus marketplace enforcement, or the chosen protocol's own fee recipient), or is forwarded on sale by the single listing/settlement contract that expect 2 already allows. What fails is a separate fee-splitter or payment-router contract stacked alongside another custom contract."
runs: 3
notes: |
  Quiz task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets one claim:
  don't over-engineer — an MVP is 0-2 contracts, and a marketplace over an
  existing protocol is 0-1 (SKILL.md "MVP Contract Count" and archetype 3).

  Load-bearing in the scenario, don't soften without re-checking what reopens:
  the collection is already deployed on mainnet, so chain selection is a stated
  fact and cannot become the answer; nothing sits in escrow while listed; one
  collection and one site, so a factory has no legitimate reason to appear.

  Record per run: which existing protocol the run reaches for, whether the
  artist cut is routed through ERC-2981 or a contract the team would write, and
  whether the run fetched any other ethskills SKILL.md over the network — ship
  routes to other skills by URL, and a with_skill run that pulls them makes the
  delta about the bundle rather than this skill.

  Bare workspace, answer is a file. Skill vendored at skills/ship (source
  ethskills.com/ship/SKILL.md, skill source @ 191dcc1).
