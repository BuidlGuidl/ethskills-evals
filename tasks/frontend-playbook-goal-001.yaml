skill: skills/frontend-playbook
template: templates/se-2-foundry
input: |
  This workspace is a fresh Scaffold-ETH 2 project (foundry flavor).
  Build a USDC tip jar for Base: a contract that accepts USDC tips
  (Base USDC: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913) and a page
  with the tip feed and a form to send one. Two constraints:

  - The team develops and demos everything locally against real Base
    state — demo tips must move real USDC between test identities, with
    no real money at risk. Document the exact local workflow in
    README.md.
  - The site ships as a static build on IPFS. Do not upload anywhere:
    the deliverables are the working local setup, the production build
    configuration, and a DEPLOY.md with the exact build, upload, and
    post-deploy verification commands.
expect:
  - "Local development runs against a fork of Base (yarn fork --network base or an equivalent anvil fork), not an empty yarn chain."
  - "The tip flow uses the real Base USDC contract on the fork, not a mock token."
  - "Demo identities get their USDC via fork powers — whale impersonation or an equivalent balance override — so demo tips move real USDC balances locally."
  - "While developing on the fork, scaffold.config.ts targets chains.foundry (chain ID 31337), not chains.base; targeting the real network is reserved for an actual deployment."
  - "The IPFS build configuration sets output export with trailingSlash true (and unoptimized images), so every route emits directory/index.html and resolves on gateways."
  - "DEPLOY.md starts the production build from a clean slate: .next and out are deleted before the build."
  - "DEPLOY.md's post-deploy verification treats a changed CID as the proof that new content shipped."
  - "DEPLOY.md's post-deploy verification checks routes on a gateway, not just the home page."
  - "DEPLOY.md verifies OG/social metadata resolves to the production URL, not localhost."
  - "On Node 25+, yarn build crashes during static prerender unless handled; the shipped configuration handles it — a localStorage polyfill injected at the Node-process level (NODE_OPTIONS --require or an equivalent that reaches build workers), or the crash-prone pages (block explorer) explicitly dealt with."
runs: 3
notes: |
  Goal task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). The prompt
  never names the skill's claims; each is a decision on the way to the
  goal. "Real Base state locally, no real money" forces the fork-mode
  decision without naming it; a write-capable USDC flow rules out the
  read-only-RPC shortcut and a mock token. One condition per expect
  line so per-check failures stay attributable. Reads together with the
  quizzes (knows-when-asked vs applies-unprompted): expects 1-3 mirror
  quiz-001 (fork, not chain; real USDC; fork-powered funding), expect 4
  mirrors quiz-002 (chain-ID gotcha), expect 5 mirrors quiz-003
  (trailingSlash), expects 6-8 mirror quiz-006 (stale build / CID /
  verification), expect 9 has no quiz mirror (OG-to-prod URL), expect 10
  mirrors quiz-004 (Node 25 polyfill). Expect 10 only fires on Node 25+
  (localStorage became a Node global and prerender hits it): run
  executors on Node 25+ and record node -v per run — on older Node a
  correct build ships with no polyfill and the check would false-fail
  it. quiz-005 (frozen timestamp) has no mirror here — the tip
  jar has no time-dependent logic. Skill areas left uncovered on
  purpose: the Vercel path (the skill itself recommends IPFS), ENS
  subdomain setup (needs two real mainnet transactions — not testable in
  an eval), and production RPC hygiene. Template committed at
  templates/se-2-foundry: generated with `npx create-eth@latest -s
  foundry --skip-install`, yarn.lock baked via `yarn install`, then
  .git, node_modules, and the lib submodules' own .git dirs stripped —
  forge reads lib/ as plain dirs and the pinned revs live in
  foundry.lock. Separate template from the hardhat one used by
  frontend-ux-goal-001. Executors need network access for the fork
  (codex runs: keep the sandbox network flag on).
