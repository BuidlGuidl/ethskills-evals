skill: skills/building-blocks
input: |
  We're building a yield vault on Base that LPs into Aerodrome's USDC/WETH
  pool. Users deposit, the vault provides the liquidity, and a keeper calls
  harvest() periodically to claim and compound the rewards. Let's write
  design.md in this directory covering:

  - the exact harvest() flow: what it claims, and from which contract
  - a realistic breakdown of what the position earns
  - where the pool's swap fees end up in this design
expect:
  - "The design says the LP position earns AERO emissions, not a share of the pool's trading fees."
  - "The design says the pool's trading fees go to veAERO voters/lockers, not to the LP position."
  - "The harvest() flow is designed around claiming and compounding emission rewards, not collecting accrued swap fees from the pool."
runs: 3
notes: |
  The prior under test: the Uniswap mental model where LP positions earn the
  pool's trading fees. On Aerodrome, LPs earn AERO emissions and the trading
  fees go to veAERO voters, so a stale design's harvest() collects fees that
  don't exist. Gauge staking (how emissions are actually claimed) is not
  graded: the skill never mentions gauges. In the report, note from each
  transcript where the run got its fee model: stated from prior knowledge,
  read from the skill, or checked live (Aerodrome docs) — and whether any
  run asserted the Uniswap model without checking anything. Bare workspace,
  the answer is a file, no template. Skill vendored at ethskills 191dcc1.
