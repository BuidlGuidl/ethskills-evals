skill: skills/gas
input: |
  I want to build an escrow service for freelance payments. Each job holds
  somewhere between $2,000 and $50,000 until the work is delivered. Which
  chain should I deploy on, and why?

  Write your answer to answer.md in this directory. Show the numbers you used
  and the reasoning behind the recommendation.
expect:
  - "answer.md gives a concrete chain recommendation with current per-transaction costs in numbers, not a bare pick."
  - "Ethereum mainnet is treated as a viable (or the recommended) home for high-value low-frequency escrow, backed by current per-transaction costs in the cents range — it is not disqualified on gas-cost grounds or quoted at dollars-to-tens-of-dollars per transaction."
  - "Any cost figure uses a live-checked gas price in sub-1-gwei territory and a live-fetched ETH price, not values quoted from memory."
runs: 3
notes: |
  Quiz task for skills/gas per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the
  skill's when-to-use-mainnet-vs-L2 rule — the one claim where the skill
  argues against the ambient default: high-value low-frequency routes to
  mainnet, and only a stale cost worldview disqualifies it. After all runs,
  mine each run's transcript.md for which skill pointers were actually
  exercised (cast base-fee, the llamarpc URL, the Chainlink feed, CoinGecko,
  the 1-2 gwei fee values) and write a per-section triage in the report —
  used / ignored / caused harm — to drive the "what should change in the
  skill" row. Bare workspace, answer is a file.
