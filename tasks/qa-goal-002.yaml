skill: skills/qa
template: templates/qa-target
input: |
  This workspace is our USDC payouts dApp for Base, built on
  Scaffold-ETH 2 (hardhat flavor). A contractor delivered it and has
  left the project; the Payouts contract is deployed, the /payouts page is
  feature-complete, and the app ships to real users at the end of the
  week.

  You own the final pass: get the app ready to ship. Fix whatever needs
  fixing in the code and configuration. Finished, committed code is the
  deliverable — you do not need to deploy anywhere or run the app.
expect:
  - "The disconnected state on /payouts renders a Connect Wallet button (RainbowKitCustomConnectButton or equivalent) as the primary action instead of the instructional paragraph."
  - "The action flow gains a wrong-network branch: on a non-Base chain the primary button slot offers a switch-to-Base action instead of active approve/pay buttons."
  - "Approve and Send Payout resolve to one primary action at a time, gated by the current allowance, instead of two always-active buttons."
  - "Writes go through useScaffoldWriteContract (or gain an equivalent confirmation-aware lock), with per-button pending state — the single shared isPending-only disabled is gone, and a wallet rejection releases the button."
  - "The USDC entry moves out of autogenerated deployedContracts.ts into externalContracts.ts (chain 8453, address, ABI); deployedContracts.ts is no longer hand-edited."
  - "The recipient address field becomes an AddressInput (ENS resolution, validation), not a raw text input."
  - "Addresses render through the Address component rather than the hand-rolled shorten() helper (blockie, ENS, copy, explorer link), and the Payouts contract address is shown on the page."
  - "Failed or rejected transactions surface a human-readable message in the UI near the action (SE-2's notification/getParsedError or equivalent); the console.error-only catches are gone."
  - "The hardcoded bg-black text-white wrapper is replaced with semantic theme classes (bg-base-*/text-base-content) coherent with the header's theme switcher — or the theme is explicitly forced and the switcher removed."
  - "The DaisyUI loading class is removed from the buttons' className; pending renders as an inline loading-spinner span inside the button next to visible text."
  - "--radius-field in globals.css returns to a sane value (~0.5rem or similar) in both theme blocks; inputs stop rendering pill-shaped."
  - "pollingInterval is no longer 30000: tuned into the responsive ~3s range, or kept deliberate with event-driven/post-confirmation refresh in its place."
  - "The app's metadata sheds template identity: the tab title names the payouts app, no Scaffold-ETH 2 title/template left."
  - "README and the visible footer describe this project rather than the Scaffold-ETH 2 template (template README replaced, footer links no longer pure template defaults)."
runs: 3
notes: |
  Second goal for skills/qa per issue #1 (skill vendored at 191dcc1,
  source ethskills.com/qa/SKILL.md). Companion to qa-goal-001 on the
  same templates/qa-target workspace: goal-001 measures whether the
  model sees the issues when asked to review; this one measures whether
  it fixes them unprompted when merely told to "get the app ready to
  ship" — the skill's applies-unprompted form. The prompt never names a
  single check. Graded from the diff, one condition per expect line;
  every expect maps to a seeded violation listed in qa-goal-001's
  notes. Deliberately absent here: the audit-only absences (Phantom,
  mobile deep-linking) — demanding those implementations unprompted
  would grade feature work, not QA discipline — and the RPC posture
  (goal-001 expect 14): a real fix needs a paid RPC key and hosting-side
  env vars that don't exist in the workspace, so any in-repo change
  would be cosmetic. Goal-001 carries all of these as review findings
  instead. Read the two goals together with the
  quizzes: a model that flags an issue in goal-001, fixes it here, and
  derives it in the paired quiz holds the claim end to end; goal-001
  notes list the quiz mirror pairs. Same caveat as goal-001: SE-2's
  bundled AGENTS.md teaches scaffold hooks/AddressInput/notification,
  so part of the no_skill baseline comes from the repo's own guidance —
  compare per-expect deltas, not just totals. Template provenance and
  regeneration: see qa-goal-001 notes.
