skill: skills/standards
input: |
  Build the service side of `forecast.example.com`: it sells weather forecasts to
  autonomous agents for $0.10 a call, settled in USDC on Base. It has to work
  under these constraints:

  - A client agent that has never contacted you before must be able to discover
    the service and judge whether it is worth trusting, without a human reading
    your docs and without relying on a catalog you own or operate.
  - Billing is per call. No accounts, no API keys, no subscriptions, no invoices,
    no pre-funded balances held by you.
  - The calling agent holds USDC but no ETH, and that must not stop it paying.
  - After a call, the caller must be able to leave a rating that other agents can
    act on before choosing you.
  - No step in the flow may require a human.

  Write design.md covering the architecture and every onchain and offchain
  dependency it rests on, and implement the HTTP server in server.ts. Include
  what you have to publish and where, and anything you must register before the
  service can be found.
expect:
  - "Discovery and identity run through the ERC-8004 Identity Registry at address 0x8004A169FB4a3325136EB29fA0ceB6D2e539a432 — the service registers itself there so clients can find it. A self-hosted directory, a DNS/.well-known-only scheme, an ENS-only scheme, or a newly written registry contract all fail this check."
  - "The service publishes a registration JSON at a resolvable agentURI (IPFS or HTTPS) and registers that URI with the Identity Registry. Skipping the hosted registration JSON, or registering an agentURI that does not resolve to it, fails this check."
  - "The agentId is the ERC-721 tokenId the Identity Registry returns from registration. Treating the agentId as a self-assigned UUID, a hash, or anything other than the registry's tokenId fails this check."
  - "Trust before the first call rests on the ERC-8004 Reputation Registry at 0x8004BAa17C55a88189AE136b182e5fdA19dE9b63 — callers post feedback onchain and prospective clients query it. A ratings table in the service's own database, an off-chain review API, or any scheme where the service controls its own reputation fails this check."
  - "Payment uses x402: an unpaid request is answered with HTTP 402 and payment requirements, the client retries carrying a signed payment, and the server verifies and settles it (optionally via a facilitator). An API-key tier, an upfront ERC-20 approve/transferFrom, a custom escrow or streaming-payment contract, or a deposit-and-debit balance all fail this check."
  - "The no-ETH constraint is met with EIP-3009: the caller signs a transferWithAuthorization off-chain and the server or facilitator submits the transaction and pays the gas. An answer resting on ERC-4337 bundlers, a bare 'meta-transaction relayer' with no named standard, or ERC-2612 permit plus a separate transferFrom fails this check."
  - "server.ts enforces x402 payment in code — either x402 middleware applied to the paid route or an explicit 402-then-verify handler; the middleware form counts as implementing it, not describing it. A TODO or an unenforced route in place of the enforcement fails this check."
  - "The paid route prices the call at 100000 base units of USDC (6 decimals) with the token set to the Base USDC address 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913. A price of 0.1, a value in 18-decimal units, or the wrong token address fails this check."
  - "The design says the service must serve a .well-known/agent-registration.json that binds its domain to the agentId, the registry, and the owner address, so clients can verify the domain controls the advertised identity. Omitting this domain-binding file fails this check."
runs: 3
notes: |
  Goal task for the ethskills standards skill (vendored at skills/standards;
  ethskills source commit 191dcc1 — see standards-quiz-001 notes on why
  result.yaml's skill_version records this eval repo's HEAD instead). Pairs with
  standards-quiz-001: same insight cluster (ERC-8004 + x402 + EIP-3009), but
  here nothing is named. Quiz measures awareness, this measures application; the
  gap between them is the read this eval exists to produce.

  Every constraint in the input is a standard in disguise and none are labelled:
  "discover ... without a catalog you own" is the Identity Registry, "rating
  other agents can act on" is the Reputation Registry, "no accounts, no API
  keys, per call" is x402, "holds USDC but no ETH" is EIP-3009. The expected
  failure mode without the skill is a plausible, competent design that reaches
  for the familiar primitives instead — an API key tier, an approve/transferFrom
  charge, a self-hosted reviews table — which is exactly what the negative half
  of each expect line names.

  Why the expect lines are shaped this way:
  - expect_7 accepts the skill's own canonical idiom. The skill teaches the
    x402 server as `app.use(paymentMiddleware(config))` (skill:213-245), where
    the middleware hides the 402 flow. expect_7 grades only that enforcement is
    wired in code (middleware or explicit handler), and expect_8 grades the price
    and token on their own line — not that the flow is spelled out by hand, which
    would fail the skill's recommended pattern and let a hand-rolled no_skill run
    score better.
  - One assertion per expect line — the registry, the hosted registration JSON,
    the agentId/tokenId, the x402 402 flow, the in-code enforcement, and the
    price/token encoding are each graded on their own line, so a fail names which
    piece was missing (AGENTS.md requires reading per-check failures and naming a
    specific symptom in any mistake record).

  Bare workspace, no template: server.ts is written from scratch, and a
  scaffold would smuggle in framework choices the task is not testing. With no
  stack provided, the goal also sees whether the model brings the right habits
  (stack, patterns) independently. The server is not
  executed; the judge grades it as source. That is a deliberate ceiling — an
  unrunnable-but-correct sketch passes. Tighten into a repo-shaped task with a
  real x402 client hitting the endpoint if this proves too easy to bluff.

  After the runs, mine each transcript.md and record in the report: which of the
  three standards a no_skill run reached for unprompted vs which it replaced with
  a familiar primitive (API-key tier, approve/transferFrom charge, self-hosted
  reviews table), and whether any recognition came from a web search rather than
  parametric knowledge. The per-standard substitution pattern is the signal that
  drives the "what should change in the skill" row, not just the pass count.

  Addresses and encodings in the expect lines were verified outside the skill on
  2026-07-16; see standards-quiz-001 notes for what was checked and the two
  caveats (testnet addresses differ; the EIP is still formally Draft).

  Nine expect lines and every one must pass, so the bar is high by
  construction. If both variants come back 0/3, read the per-check failures
  before touching the skill — the fault may be the calibration here, not the
  content there.
