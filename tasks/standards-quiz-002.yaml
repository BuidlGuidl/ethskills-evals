skill: skills/standards
input: |
  A team runs a consumer app whose users each already hold a funded EOA — the
  same address they've used for a year, with an ENS name and onchain history tied
  to it. The team wants each of those existing accounts to be able to:
    - batch an ERC-20 approve and a swap into a single atomic transaction, and
    - run custom auth logic (session keys) from that account,
  while keeping the exact same address and private key. Migrating users to a
  freshly deployed account at a new address is off the table — the address, its
  ENS name, and its history all have to survive.

  It's 2026 and this has to run on Ethereum mainnet today — not a testnet, not a
  future roadmap item. Answer all of the following in answer.md, showing how you
  got each value:

  1. Is this possible on mainnet as of now, and what makes it possible? Name the
     mechanism that lets an already-existing EOA execute contract code without
     becoming a new account type, name the network upgrade that shipped it, and
     give the date it went live.
  2. Concretely, what does the user's account point at after they opt in, and how
     does an approve+swap end up running atomically from their own address?
  3. After the account runs one batched transaction this way, does it
     automatically revert to a plain EOA, or does the new behavior stay in place?
     State exactly what is required to change or remove it.
  4. A teammate proposes instead deploying a fresh ERC-4337 smart-contract wallet
     for each user and having them move their funds and ENS across to it. Explain
     why that does not satisfy the stated constraint.
expect:
  - "answer.md identifies the mechanism as EIP-7702 (an EOA authorizing delegated smart-contract code without migrating to a new account type). Concluding it is impossible without migrating, that a new ERC-4337 / smart-contract wallet must be deployed, or naming only account abstraction with no EIP-7702, all fail this check — recognizing the standard unprompted is the point."
  - "The answer states EIP-7702 is live on mainnet, shipped with the Pectra upgrade, active since May 2025 (May 7, 2025). Calling it 'proposed', 'not yet live', 'testnet only', or a future roadmap item fails, as does attributing it to the wrong upgrade (e.g. Dencun/Cancun) or a wrong year."
  - "The mechanism is described correctly: opting in sets a delegation designator on the EOA that points at a smart-contract implementation address, authorized by a signature from the EOA's own key, after which calls to that same address execute the contract's code — so the approve+swap batch runs atomically from the user's existing address. An answer where the code lives at a different address, or where the EOA's key does not sign the authorization, fails."
  - "The answer states the delegation persists — it does NOT auto-clear after one transaction. The designator stays set until it is replaced by a later authorization or cleared (delegating to the zero address / an authorization to 0x0). Claiming the account reverts to a plain EOA automatically after the transaction, or that the delegation is single-transaction-only by spec, fails this check."
  - "The ERC-4337-migration alternative is rejected for the right reason: a freshly deployed smart-contract wallet lives at a NEW address, so the funds, ENS name, and history do not carry over, violating the same-address/same-key constraint — whereas EIP-7702 upgrades the existing EOA in place. Endorsing the migration, or rejecting it without identifying that the address changes, fails."
runs: 3
notes: |
  Second quiz task for the ethskills standards skill (vendored at
  skills/standards; ethskills source commit 191dcc1 — see standards-quiz-001
  notes on why result.yaml's skill_version records this eval repo's HEAD instead
  of that source commit). standards-quiz-001 and standards-goal-001 cover the
  agent-commerce cluster (ERC-8004 + x402 + EIP-3009); an ERC-8004/x402 scenario
  can never reach EIP-7702, which is a separate headline claim, so it gets its
  own quiz here rather than being bolted onto quiz-001 — one claim per quiz keeps
  the per-claim deltas attributable.

  The prior under attack is the skill's own headline: "EIP-7702 is live ...
  Shipped with Pectra (May 7, 2025) ... Not 'proposed' — deployed on mainnet"
  (skill:12, 372-378), plus the nuance the skill flags explicitly — "Delegation
  is not automatically 'single transaction only' by spec. The delegation
  designator remains until replaced or cleared" (skill:378). A stale-prior model
  from before Pectra believes one of three wrong things this quiz separates:
  (a) EIP-7702 is still proposed / not on mainnet; (b) giving an existing EOA
  contract abilities requires migrating to a new ERC-4337 account at a new
  address; (c) any delegation is one-shot and auto-clears after the transaction.

  The input names no standard under test — the expectation has to surface on the
  way. It describes the need — an existing EOA, same address and
  key, that must batch calls and run custom auth on mainnet today — and EIP-7702
  has to surface as the only thing that fits. The 2026/"mainnet today, not a
  roadmap item" framing is the derivation hook: the liveness claim is inherently
  a fact, so instead of asking "is EIP-7702 live?" the scenario forces the model
  to conclude "yes, keeping the same address" (pass) or reach for a new-account
  migration / "not possible yet" (fail). Q4 names ERC-4337 on purpose — it is the
  wrong alternative, not the thing under test, and naming it does not hand the
  model the right answer; it makes the migration-vs-in-place distinction gradable,
  which is exactly the stale-prior (reach for a new smart-account) this catches.

  Design choices behind the expect lines, one assertion per line so a fail names
  the specific gap the report and any mistake record need:
  - expect_1 grades recognition of the mechanism unprompted; expect_2 grades the
    liveness/upgrade/date fact; kept separate because a model can name EIP-7702
    yet still hedge that it is not live, and vice versa — the two failures mean
    different things (didn't recognize it vs stale on status).
  - expect_3 grades the delegation mechanics (designator -> implementation
    address, EOA's own key signs the authorization, same address executes),
    graded on the description, not on requiring the 0xef0100 designator prefix or
    the "type 4 / SET_CODE" transaction literal — a correct account of the
    behavior passes without the model reciting the wire format.
  - expect_4 grades the persistence nuance directly; it is the claim most likely
    to separate a skill run from a stale-prior run, since a pre-Pectra mental
    model tends to assume per-transaction, auto-clearing delegation.
  - expect_5 grades the ERC-4337 discriminator on the RIGHT REASON (new address ->
    funds/ENS/history don't carry), so a run that rejects the migration by luck
    without naming the address change does not pass.

  Not graded on purpose: the gas-sponsorship angle (flavor in the motivation) is
  left out of the expect lines — 7702 enables it but the actual gasless
  submission overlaps the EIP-3009/x402 cluster that quiz-001 already grades, and
  pulling it in here would muddy which standard a failure belongs to.

  Expect values verified against sources outside the skill on 2026-07-20 (the
  skill is the thing under test, so it is not graded off alone):
  - EIP-7702 ("Set EOA account code") is included in Pectra (Prague/Electra),
    confirmed against the hardfork meta EIP eips.ethereum.org/EIPS/eip-7600.
    Pectra activated on mainnet May 7, 2025. Accept "May 2025" or the exact 7th
    in a run; do not require the day.
  - Confirmed against eips.ethereum.org/EIPS/eip-7702: transaction type 0x04
    (SET_CODE_TX_TYPE); delegation designator is `0xef0100 || address` (23
    bytes); the authorization is signed by the EOA's own key (authority =
    ecrecover over MAGIC || rlp([chain_id, address, nonce])); the delegation
    persists until replaced or cleared, and is cleared by delegating to the zero
    address (which resets the code hash to the empty-code hash). This backs
    expect_3 and expect_4's negative.
  - EIP-7702 supersedes the earlier EIP-3074 approach — EIP-3074 is not in the
    Pectra list (confirmed via EIP-7600). This is historical context, not stated
    in the EIP text itself, and is deliberately not graded.

  Five expect lines, all must pass. If both variants come back 0/3, read the
  per-check failures before touching the skill — most likely culprit is expect_2
  or expect_4 (a stale date or a one-shot-delegation belief), which is a
  knowledge signal, not a calibration fault here.
