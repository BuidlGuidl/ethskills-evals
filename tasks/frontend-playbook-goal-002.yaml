skill: skills/frontend-playbook
input: |
  Build a USDC tip jar for Base from scratch: an onchain contract that
  accepts USDC tips (Base USDC:
  0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913) and a web page with the tip
  feed and a form to send one, plus a connect-wallet flow. Get the whole
  thing running locally and document the setup steps in README.md. Do not
  deploy anywhere — the deliverable is the working local project and its
  README.
expect:
  - "The project is scaffolded with the Scaffold-ETH 2 generator (npx create-eth@latest, foundry flavor), producing the SE2 monorepo — packages/foundry (Foundry contracts) and packages/nextjs (Next.js app) — rather than a hand-rolled stack assembled with forge init and create-next-app / manual Next.js."
  - "Wallet connection and contract reads/writes come from the scaffolded tooling (RainbowKit + wagmi and the scaffold-eth hooks/components the generator wires up), not hand-written wallet-connect and ABI plumbing."
runs: 3
notes: |
  Second goal task for skills/frontend-playbook (skill vendored at
  191dcc1, source ethskills.com/frontend-playbook/SKILL.md), drafted
  2026-07-20 per issue #1. Companion to frontend-playbook-goal-001,
  deliberately started from an EMPTY workspace (no template:). Targets
  the skill's headline "What You Probably Got Wrong" prior — "never set
  up the project manually; npx create-eth@latest, never forge init" —
  which is structurally untestable elsewhere in the set: goal-001 hands
  the executor an already-scaffolded template and every quiz opens
  post-scaffold, so the scaffold decision never fires there. This goal
  is that prior's only coverage. The prompt never names Scaffold-ETH 2,
  create-eth, or forge, so the scaffold path is an inference — a
  stale-prior run reaches for forge init + create-next-app and
  hand-rolled wallet plumbing. Graded from the resulting structure (SE2
  monorepo vs hand-rolled stack), which is why both expects read off the
  tree, not the transcript. Runnability: create-eth is interactive — the
  executor must invoke it with flags or piped answers and may burn time
  here; that friction is part of the signal. After runs, mine
  transcript.md for whether create-eth came from the skill, parametric
  memory, or a web search. Bare workspace, no template.
