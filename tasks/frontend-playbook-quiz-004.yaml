skill: skills/frontend-playbook
input: |
  CI bumped its Node.js version and our Scaffold-ETH 2 static export
  broke. `yarn build` now dies during prerender:

      TypeError: localStorage.getItem is not a function
      Error occurred prerendering page "/_not-found"

  Teammate A says the error is impossible — Node has no localStorage, so
  there is nothing to call getItem on. Teammate B wrote a correct
  localStorage polyfill and registered it in instrumentation.ts, and the
  build still fails identically. Explain what actually changed in recent
  Node versions, why A's mental model is out of date, why B's fix cannot
  work no matter how correct the polyfill is (where does the prerender
  actually run?), and the injection mechanism that does fix it. Write
  your answer to answer.md in this directory.
expect:
  - "answer.md explains that Node 25+ ships a built-in localStorage object that lacks the standard WebStorage methods, so libraries probing for it (next-themes, RainbowKit) find it, call getItem during static prerender, and crash — A's no-localStorage-in-Node model is outdated."
  - "B's fix fails because Next.js prerenders pages in a separate build worker process: instrumentation.ts (like next.config-level polyfills) runs only in the main process and never reaches the worker."
  - "The working fix injects at the Node-process level — NODE_OPTIONS with --require pointing at a localStorage polyfill (.cjs) — so every spawned Node process, build workers included, gets the polyfill before any library loads."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the Node 25 localStorage claim — the most
  staleness-prone item in the skill, since the incomplete built-in
  localStorage postdates most training priors and the intuitive fixes
  (instrumentation.ts, next.config) genuinely do not work. The
  two-teammates framing forces the model to refute both a stale prior
  and a plausible fix with the process model, not just name --require.
  After runs, mine transcript.md for whether the answer came from
  parametric memory, a web search, or the skill — this question is the
  strongest wiki-vs-skill separator in the set. Mirror pair with
  frontend-playbook-goal-001 expect 5 (same prerender-survival decision,
  applied unprompted). Bare workspace, answer is a file.
