skill: skills/ship
input: |
  We're building an onchain version of a savings circle — the thing my family
  calls a susu. Twelve people put in $100 of USDC each month, and each month one
  member takes the whole $1,200 pot; the order is fixed when the circle starts,
  and everyone gets exactly one turn over the year. If someone misses a payment
  they forfeit their turn, and their earlier contributions cover the shortfall
  for that month's recipient.

  There are two of us building this and we're both away for the next six weeks.
  I want to know whether the circles that are already running keep working while
  we're gone — and if not, exactly what breaks and what we'd have to do about
  it.

  Write your answer to plan.md in this directory: the contract design, plus the
  answer to that.
expect:
  - "plan.md states that no state transition happens on its own: whatever moves a circle forward — the monthly payout, plus the missed-payment forfeit and the shortfall coverage where the design makes those separate steps — happens only when someone sends a transaction, and the plan names who sends it. A design that folds forfeit and shortfall into the payout call, or derives them at read time, satisfies this by naming the caller of that one transition."
  - "Each named caller has a reason to pay the gas — the month's recipient claiming their own pot, a member's own deposit, a keeper paid a fee — rather than the contract itself, 'the chain', a block timestamp, or an unfunded assumption that somebody will show up."
  - "State advances through a path any participant can trigger themselves (self-serve claims, permissionless poke, or state derived at read time). A design where the only thing that advances a circle is infrastructure the two-person team operates — a backend cron, an owner-only distribute function — fails; such a job passes only as a convenience layered on top of a path users can trigger without it."
runs: 3
notes: |
  Quiz task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets one claim:
  nothing is automatic — every state transition needs a caller who pays gas and
  has a reason to, and a transition nobody is paid to trigger is a design bug
  (SKILL.md "You forget nothing is automatic", "State Transition Audit", and
  the "Admin crutch" anti-pattern).

  A susu is chosen because every part of it sounds scheduled — monthly payouts
  in a fixed rotation, forfeits on a missed payment — and none of it happens by
  itself.

  The claim is never asked for. The derivation proxy is the team's absence:
  asking whether running circles survive the builders going away forces a
  per-transition caller audit, without ever raising automation as the subject.
  The two-person team size is load-bearing — it makes team-operated
  infrastructure a visible dependency rather than an invisible given. The
  absence is worded as a relative window ("the next six weeks") so the scenario
  does not decay when the task is re-run months later.

  expect_1 grades the transitions the design actually has, not a fixed list of
  three. Collapsing forfeit and shortfall into the payout call, or deriving them
  at read time, is a good answer and must not fail for having fewer callers to
  name.

  expect_3 sets the bar deliberately: a cron or a keeper service is not
  disqualifying by itself, only being the sole way state can advance is. A run
  that ships onlyOwner distribute() fails it; a run that ships a self-serve
  claim plus a convenience bot passes.

  Worth recording per run: whether each run reaches for pull-based claims, a
  permissionless incentivized poke, or read-time derivation — the three are all
  passes but they are not equally good answers.

  Bare workspace, answer is a file. Skill vendored at skills/ship (source
  ethskills.com/ship/SKILL.md, skill source @ 191dcc1).
