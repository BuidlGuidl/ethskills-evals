skill: skills/standards
input: |
  A weather API run by an autonomous agent sells forecasts for $0.35 a call,
  priced in USDC on Base. The agent was set up on Base and assigned id 7311. A
  second agent that has never interacted with it before needs to find it,
  decide whether it is trustworthy enough to pay, make the payment, and
  afterwards leave a rating other agents can rely on. The paying agent holds
  USDC but no ETH. No human is in the loop, and there are no accounts or API
  keys on either side.

  Answer all of the following in answer.md, showing how you got each value:

  1. How does the paying agent discover the weather agent and check its
     standing before paying, when neither runs a directory the other already
     trusts? Name the onchain infrastructure the discovery lookup uses and give
     the exact contract address it calls.
  2. Give the fully-qualified identifier any caller uses to refer to the weather
     agent, whatever chain the caller itself runs on.
  3. After a 30-day engagement the paying agent records 99.4% uptime and a
     quality score of 73 out of 100 for the weather agent. Give the exact field
     values each of those two scores is stored as.
  4. Give the exact amount value that goes on the wire for one $0.35 payment,
     and the token contract it is paid in.
  5. The paying agent has no ETH. Explain what makes the payment possible
     anyway, and name the function that ultimately moves the tokens.
expect:
  - "answer.md identifies the discovery-and-identity infrastructure as the ERC-8004 Identity Registry and gives its address as 0x8004A169FB4a3325136EB29fA0ceB6D2e539a432. Proposing a bespoke per-app registry, a self-hosted directory, a DNS/ENS-only scheme, or concluding there is no standard for agent discovery all fail this check — recognizing the standard unprompted is the point."
  - "The agent identifier is chain-scoped to where the agent is registered — the registry portion is eip155:8453:0x8004A169FB4a3325136EB29fA0ceB6D2e539a432 (Base, chainId 8453) and the agentId is 7311, whether written combined or as separate agentRegistry/agentId fields. Scoping it to the caller's chain instead of Base, a bare address with no eip155/chainId, or an unscoped id all fail."
  - "The 99.4% uptime score is submitted as an ERC-8004 fixed-point pair: an integer `value` plus a `valueDecimals` count such that value / 10**valueDecimals equals 99.4 (the natural pair is value=994, valueDecimals=1). A float like 99.4, a percentage string, or a pair that does not evaluate to 99.4 all fail; any correct integer/decimals pair passes."
  - "The 73/100 quality score is submitted as an ERC-8004 fixed-point pair where value / 10**valueDecimals equals 73 (the natural pair is value=73, valueDecimals=0). A float, a string, or a pair not evaluating to 73 fails; any correct integer/decimals pair passes."
  - "The x402 `amount` for $0.35 USDC is given as 350000, derived from 0.35 x 10**6 (USDC has 6 decimals) and shown as that derivation rather than guessed. A value of 0.35, 350000000000000000 (18 decimals), or an unexplained number fails."
  - "The `token` is the USDC contract on Base, 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913. The Ethereum-mainnet USDC address (0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48) or the bridged USDbC on Base (0xd9aAEc86B65D86f6A7B5B1b0c42FFA531710b6CA) fails this check."
  - "The gasless payment is explained via EIP-3009: the client signs an off-chain authorization and the server or facilitator submits it onchain, calling transferWithAuthorization. An answer resting on ERC-20 approve/transferFrom, ERC-2612 permit alone, or a generic 'relayer' with no named standard fails."
runs: 3
notes: |
  Quiz task for the ethskills standards skill (vendored at skills/standards;
  ethskills source commit 191dcc1, provenance for the source content). Paired
  with standards-goal-001, which targets the same
  insight unprompted; the two together separate "the model knows this" from
  "the model applies this".

  The prior under attack is the skill's own headline: ERC-8004 deployed
  2026-01-29, which sits at or past most training cutoffs, and the
  x402/EIP-3009 pairing that makes agent payments work.

  The input names none of the standards under test. It describes the need —
  discover a stranger agent, judge its standing, pay it with no ETH, rate it —
  and the standards have to surface on the way; naming them outright would make
  it a retrieval test a model passes with zero recognition, the exact "knowledge
  not skill" failure this eval exists to detect. The pointed questions still
  steer the model at discovery / trust / payment (that is what makes it a quiz,
  not a goal), but which standard fills each slot is left for the model to
  recognize.

  Why the expect lines are shaped this way:
  - Reputation is recorded by the PAYING agent after a 30-day interaction, never
    self-reported by the operator. ERC-8004 reputation is client-attested
    (skill:96-97 and 342-344, getSummary's trustedClients filter), so an operator-reports
    premise would contradict standards-goal-001, which fails any scheme where
    the service controls its own reputation.
  - The agent has a concrete id (7311) so expect_2 grades a real identifier, not
    a value the problem withheld.
  - The identifier is scoped to Base (where the agent was set up), not the
    caller's chain, which the input deliberately leaves unnamed.
  - Reputation and amount checks grade the PROPERTY (fixed-point pair evaluating
    to the target; 0.35 x 10**6), so any valid encoding passes, not only the
    skill's example literals.
  - One assertion per expect line, so a fail names the specific gap the report
    and any mistake record need.

  Bare workspace, no template: the answer is a file, not a diff.

  After the runs, mine each transcript.md and record in the report: whether the
  standards surfaced from parametric knowledge or a web search (this cluster is
  somewhat searchable, so the transcript is what separates a knowledge result
  from a real skill win), and whether a no_skill run reached for ERC-8004/x402 at all or
  invented a bespoke registry and payment scheme. Which standard a run failed to
  recognize is the signal, not just the pass count.

  Expect values verified against sources outside the skill on 2026-07-16:
  - Both registry addresses confirmed against github.com/erc-8004/erc-8004-contracts.
  - Base USDC and the two wrong-token addresses in expect_6 confirmed on
    2026-07-22: native USDC on Base 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
    and Ethereum-mainnet USDC 0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48 against
    developers.circle.com/stablecoins/usdc-contract-addresses; bridged USDbC
    0xd9aAEc86B65D86f6A7B5B1b0c42FFA531710b6CA against basescan.org.
  - Feedback fixed-point form (int128 value + uint8 valueDecimals) and the
    {namespace}:{chainId}:{registry} identifier form confirmed against
    eips.ethereum.org/EIPS/eip-8004.
  - Caveat the skill omits: testnet deployments use a different address
    (0x8004A818BFB912233c491871b3d84c89A494BD9e). This scenario is mainnet-only.
  - Caveat worth knowing when reading results: eips.ethereum.org still lists
    ERC-8004 as Draft, while the skill calls it production-ready. Both are
    defensible — the contracts are deployed, the EIP is unmerged. No expect line
    grades on status, deliberately. Do not add one without settling this first.

  EIP-7702 status (live since Pectra, May 2025) is covered by
  standards-quiz-002. Deliberately untested, all secondary to the headline
  stale claims and left out to keep per-claim attribution clean: the ERC-8004
  Validation Registry (the third registry — validator 0-100 scores, trust
  models), the x402 `upto` metered scheme, and the ERC-4626/6551 rows of the
  quick-reference table. Worth another quiz only if this cluster turns out to be
  the only thing the skill is carrying.
