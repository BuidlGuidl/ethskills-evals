skill: skills/testing
input: |
  Representative slice of our vault suite — 40 tests, all green, and `forge coverage`
  reports 100% of lines on the vault:

      function test_DepositUpdatesBalance() public {
          vault.deposit(100e6);
          assertEq(vault.shareBalance(address(this)), 100e18);
      }

      function test_TotalAssetsReturnsStored() public {
          vault.deposit(100e6);
          assertEq(vault.totalAssets(), vault.totalAssetsStored());
      }

      function test_WithdrawReturnsUsdt() public {
          vault.deposit(100e6);
          vault.withdraw(100e18);
          assertEq(usdt.balanceOf(address(this)), 997e5);
      }

      function test_NameIsCorrect() public { assertEq(vault.name(), "Yield Vault"); }
      function test_DecimalsIs6() public { assertEq(vault.decimals(), 6); }

  We shipped it and lost user funds. Over a long run of deposits and withdrawals the
  vault's recorded total drifted away from the tokens it actually held, and the last
  users out could not withdraw. Every individual operation looked correct in isolation
  — and still does; we cannot point at a single call that misbehaves.

  Our lead's position is that the suite was thorough: 100% coverage, every function
  exercised, all green.

  Go through it. For each test above say what it actually establishes and what it only
  appears to establish. Explain how 100% coverage was compatible with this bug — and
  why the "every operation is correct in isolation" observation is the tell rather than
  the alibi. Then give the specific property the suite should have asserted such that
  this drift is caught, and be concrete: state the property and the test shape that
  checks it.

  Write your answer to answer.md in this directory.
expect:
  - "answer.md diagnoses the tests as tautological — they mirror the implementation rather than constrain it: asserting stored state equals what was just written, asserting one getter equals the variable it returns, and asserting name/decimals, which tests OpenZeppelin and the compiler rather than the vault's own logic."
  - "It explains that coverage measures which lines executed, not whether behaviour is correct — a line runs under an assertion that cannot fail, so 100% coverage and a value-losing bug coexist without contradiction."
  - "It explains why per-operation correctness is the tell: the drift is a property of sequences, accumulating across interleaved deposits and withdrawals, so no test that exercises one operation in isolation can observe it however many such tests exist."
  - "The property it names ties the vault's recorded accounting to reality — recorded total assets versus the tokens/aTokens actually held, or the sum of all depositors' claims never exceeding real holdings — asserted as an invariant across arbitrary random sequences (invariant test with a handler), not as another single-path unit test."
runs: 3
notes: |
  Quiz task for skills/testing per issue
  https://github.com/technophile-04/ethskills-evals/issues/1 (skill vendored at
  191dcc1, verified byte-identical to live ethskills.com/testing/SKILL.md on
  2026-07-16).

  One claim per quiz; this one targets the skill's "You test getters and trivial
  functions" and "You write tests that mirror the implementation" bullets plus its
  "What NOT to Test" section — the skill's headline behavioural thesis. Distinct from
  001, which is about an invariant test that exists and is broken; this one is about a
  team that never wrote one and read coverage as evidence instead.

  Derivation is forced by asking for a per-test verdict and a named property rather than
  a critique: "these tests are tautological" alone fails expect 3 and 4. The "correct in
  isolation" line is the load-bearing clue — it points at sequence-dependence, and the
  question deliberately frames it as the lead's alibi so the model has to invert it.

  The tests quoted are real: lightly trimmed from the fixture's own green suite at
  fixtures/testing-vault-001/test/UsdtYieldVault.t.sol, which does hold 100% line and
  function coverage on the vault while missing three live bugs. The drift described is
  the fixture's planted accounting bug (withdrawal fees stranded, stored total diverging
  from real aUSDT held), confirmed by an invariant detector while drafting — it broke
  after two calls, 347.2 recorded against 393.4 actually held.

  Expected to pass both variants. Mirror pair with testing-goal-001 expect 2: same bug,
  but there the model has to decide to look for it with nobody pointing at a drift.
  Bare workspace, answer is a file.
