skill: skills/testing
input: |
  Representative slice of our vault suite — 39 tests, all green, and `forge coverage`
  reports 100% of lines and 100% of functions on the vault:

      function test_DepositMintsShares() public {
          uint256 shares = _deposit(alice, DEPOSIT_AMOUNT);
          assertEq(shares, 999e18);
          assertEq(vault.shareBalance(alice), 999e18);
      }

      function test_DepositUpdatesTotalAssets() public {
          _deposit(alice, DEPOSIT_AMOUNT);
          assertEq(vault.totalAssets(), DEPOSIT_AMOUNT);
          assertEq(vault.totalAssetsStored(), DEPOSIT_AMOUNT);
      }

      function test_WithdrawFeeBps() public view {
          assertEq(vault.WITHDRAW_FEE_BPS(), 30);
      }

      function test_ConstructorSetsUsdt() public view {
          assertEq(address(vault.usdt()), address(usdt));
      }

  The vault takes a fee on withdrawal. That fee is meant to stay in the yield protocol
  and accrue to whoever is still in the vault — it is not swept to the owner.

  We shipped it and it has been quietly losing our users money. Over a long run of
  deposits and withdrawals the vault's recorded total drifted below the tokens it
  actually holds: the fees stopped being counted, so the share price is understated for
  everyone still in, and the uncounted balance — real tokens, sitting in the protocol —
  is now unclaimable by anybody. Nothing is insolvent; the vault holds more than it
  thinks, not less. Every individual operation looks correct in isolation, and still
  does: we cannot point at a single call that misbehaves.

  Our lead's position is that the suite was thorough — 100% coverage, every function
  exercised, all green.

  Go through the tests above. For each, say what it actually establishes and what it
  only appears to establish. Explain how 100% coverage was compatible with this bug, and
  why "every operation is correct in isolation" is the tell rather than the alibi. Then
  give the specific property the suite should have asserted such that this drift is
  caught — state the property precisely and the test shape that checks it.

  Write your answer to answer.md in this directory.
expect:
  - "answer.md diagnoses the tests as tautological — they mirror the implementation rather than constrain it: asserting stored state equals the value just written to it, asserting a getter equals the very variable it returns (totalAssets() against totalAssetsStored()), and asserting a constant and a constructor argument, which check the compiler and the constructor rather than the vault's logic."
  - "It explains that coverage measures which lines executed, not whether behaviour is correct — a line runs under an assertion that cannot fail, so 100% coverage and a value-losing bug coexist without contradiction."
  - "It explains why per-operation correctness is the tell: the drift is a property of sequences, accumulating across interleaved deposits and withdrawals, so no test that exercises a single operation in isolation can observe it, however many such tests exist."
  - "The property it names ties the vault's recorded accounting to what it actually holds — recorded total assets equal to the tokens/aTokens actually held — and is asserted as an invariant over arbitrary random call sequences driven through a handler, not as another single-path unit test. It must be an equality (or an explicit no-drift check): a one-sided solvency bound such as claims <= holdings passes throughout, since this drift leaves a surplus rather than a shortfall."
runs: 3
notes: |
  Quiz task for skills/testing per issue
  https://github.com/technophile-04/ethskills-evals/issues/1 (skill vendored at
  191dcc1, verified byte-identical to live ethskills.com/testing/SKILL.md on
  2026-07-16).

  One claim per quiz; this one targets the skill's "You test getters and trivial
  functions" and "You write tests that mirror the implementation" bullets plus its
  "What NOT to Test" section — the skill's headline behavioural thesis. Distinct from
  001, which is about an invariant test that exists and is broken; this one is about a
  team that never wrote one and read coverage as evidence instead.

  Derivation is forced by asking for a per-test verdict and a named property rather than
  a critique: "these tests are tautological" alone fails expects 3 and 4. The "correct in
  isolation" line is the load-bearing clue — it points at sequence-dependence, and the
  question deliberately frames it as the lead's alibi so the model has to invert it.

  The four tests quoted are verbatim from the fixture's own green suite at
  fixtures/testing-vault-001/test/UsdtYieldVault.t.sol, which does hold 100% line and
  function coverage on the vault while missing three live bugs. The drift described is
  the fixture's planted accounting bug (withdraw subtracts gross from the accounting
  while only net leaves the pool, so each withdrawal strands its fee), confirmed by an
  invariant detector while drafting: it broke after two calls, 347223983 recorded
  against 393375655 actually held.

  Mind the direction, which an earlier draft of this quiz got backwards. Stored
  UNDERSTATES reality: the vault holds a surplus, everyone can always withdraw, and the
  harm is stranded unclaimable value plus an understated share price — not insolvency,
  and not "the last users out cannot withdraw". Expect 4 turns on this: a solvency-style
  bound (claims <= holdings) holds throughout and would never catch it, so only an
  equality between recorded and actual does. The prompt states the no-insolvency fact
  outright to stop the model diagnosing the wrong bug from a misremembered pattern.

  Expected to pass both variants. Mirror pair with testing-goal-001 expect 2: same bug,
  but there the model has to decide to look for it with nobody pointing at a drift.
  Bare workspace, answer is a file.
