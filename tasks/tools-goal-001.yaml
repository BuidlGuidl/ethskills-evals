skill: skills/tools
input: |
  I'm building a paid API for AI agents: an agent pays me a few cents per call,
  settled on-chain (Base is fine), and in return my endpoint returns a short
  summary of a given wallet's recent on-chain activity. The payment should happen
  inline in the HTTP request — no accounts, no API keys, no invoicing.

  Build me the foundation in this directory: the server side that gates the
  endpoint behind payment, and a TypeScript client that pays and retries the call
  automatically. Pick whatever tooling and libraries you'd use. Include a short
  README.md covering how to run it and where the payment settles, so I know what
  to do next.
expect:
  - "The workspace contains a server that gates an endpoint behind on-chain payment plus a TypeScript client that pays and retries — a real setup with named dependencies (package.json / imports), not just prose in the README."
  - "The payment mechanism the code and dependencies actually use is x402 (the HTTP-native pay-per-call standard), reached unprompted — not a bespoke paywall, an API-key/JWT scheme, Stripe, or L402, not left as a TODO, and not a hand-rolled signature/settlement flow substituted on the grounds that no such standard exists."
  - "The x402 dependency appears as a concrete, named package in package.json / imports (a real install line), not a placeholder, a vague 'x402 library', or a hand-rolled shim."
runs: 3
notes: |
  Goal task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Deliberate mirror of
  tools-quiz-001: same paid-API-for-agents scenario, same x402 niche described,
  but here the model has to reach x402 on the way to building a runnable
  foundation, never having been pointed at it. quiz-001 measures
  knows-when-asked; this measures applies-unprompted, and only the split (quiz
  passes both variants, goal no_skill fails / with_skill passes) reaches the
  issue's "keep as skill" verdict for the x402 claim — no quiz alone can.

  Bare workspace, no template, on purpose: a template would pre-install the
  payment library and destroy the exact signal this task exists to catch — does
  the model reach for x402 itself. The artifact is code + package.json + README,
  not a live payment: the x402 dependency showing up in package.json and the
  client's pay-and-retry path is the tell, and it is gradeable without settling a
  real transaction. As in quiz-001, whether the named package actually resolves
  on npm is NOT graded — the blind judge sees only the diff/output files, not the
  transcript, and has no npm access, so it can confirm the dependency is named
  and wired in but not that it resolves today. Record which framework and payment
  library each run reaches for, and whether it verified them, at report time from
  the transcript; a with_skill run that inherits a stale package name from the
  skill is the "skill is wrong, fix and re-evaluate" signal, caught there.

  Record one more thing: how each run gets the wallet-activity data the endpoint
  returns — Blockscout MCP, the Etherscan API, or hand-decoded raw RPC. That is
  the same job tools-quiz-003 tests, but reached unprompted here, so the two read
  together as knows-when-asked vs applies-unprompted for the Blockscout MCP
  claim — the split the issue needs to separate "keep as skill" from "wiki
  candidate", and it costs no extra runs because every run builds the data path
  anyway.

  It stays an observation and does NOT become an expect, deliberately. Grading it
  would make a run that reaches x402 correctly but reads wallet data via the
  Etherscan API record `pass: false`, and this task's headline count would stop
  meaning x402 — which is the only thing it exists to measure. Report the data
  path as a recorded observation next to quiz-003's graded result instead.
