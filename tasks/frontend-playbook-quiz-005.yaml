skill: skills/frontend-playbook
input: |
  Local demo on `yarn fork --network base`: our vesting page shows a
  claimable balance that the contract computes from block.timestamp.
  During the demo the number sits perfectly still for minutes — then
  someone sends any unrelated transaction and it suddenly jumps by the
  whole missing amount at once. Our forge tests for the vesting math
  (they use vm.warp) all pass. Explain the mining behavior that makes
  time stand still on the fork, why one transaction un-freezes it in a
  single jump, why the passing tests never caught this, and both the
  one-off and the permanent fix. Write your answer to answer.md in this
  directory.
expect:
  - "answer.md derives the mechanism: the anvil fork mines a block only when a transaction arrives, so between transactions the latest block and its timestamp are frozen — every read of block.timestamp returns stale time, and the first new transaction mines a block at current wall-clock time, which is why the claimable amount jumps by the whole gap at once."
  - "The tests pass because vm.warp sets timestamps explicitly inside the test VM — they validate the math, not the node's mining behavior, so the freeze is invisible to them."
  - "The one-off fix is enabling interval mining on the running fork (cast rpc anvil_setIntervalMining 1); the permanent fix is baking a block-time flag (--block-time 1) into the fork script, and the answer notes that any time-dependent logic (deadlines, expiry, vesting) silently misbehaves without it."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the frozen-timestamp claim from the fork-mode
  section: anvil's on-demand mining freezes block.timestamp between
  transactions and time-dependent logic breaks silently. The
  jump-after-any-tx symptom is the derivation hook — it only makes sense
  once the mining model is right, and the passing-vm.warp-tests detail
  blocks the lazy "your math is wrong" answer. No goal mirror: the goal
  build (tip jar) has no time-dependent logic, so this quiz is the
  claim's only coverage. After runs, mine transcript.md for whether the
  executor knew anvil mines per-transaction or had to look it up. Bare
  workspace, answer is a file.
