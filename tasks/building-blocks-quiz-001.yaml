skill: skills/building-blocks
input: |
  We're building a small yield vault on Base: users deposit USDC, the vault
  pairs it into DEX liquidity, and a keeper calls harvest() periodically to
  claim and compound the rewards. Before any code, let's write design.md in
  this directory covering:

  - which pool the vault LPs into
  - the exact harvest() flow: what it claims, and from which contract
  - a realistic breakdown of what the position earns
expect:
  - "design.md picks a Base-native DEX chosen for liquidity depth (e.g. Aerodrome/Aero) as the LP venue, rather than defaulting to Uniswap."
runs: 3
notes: |
  The prior under test: models default to Uniswap on every chain, while Base
  liquidity actually lives on the native ve(3,3) DEX (Aerodrome, Aero since
  the Nov 2025 merger). In the report, note from each transcript how the run
  picked its venue: stated from prior knowledge, read from the skill, or
  looked up live (DeFi Llama, protocol docs). building-blocks-quiz-002 pins
  the venue and grades the Aerodrome fee model. Bare workspace, the answer
  is a file, no template.
