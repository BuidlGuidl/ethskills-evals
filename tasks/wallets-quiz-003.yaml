skill: skills/wallets
input: |
  We're shipping a new ERC-4337 paymaster on Ethereum mainnet, and it needs to
  work with the bundlers our users actually use today (Pimlico, Alchemy). A
  draft PR hardcodes the EntryPoint singleton the paymaster deposits to and
  validates against as:

    0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

  Is that the EntryPoint address a brand-new deployment should target today? If
  not, what address and version should it use instead, and why is the one in
  the PR a problem?

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md identifies 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789 as the deprecated EntryPoint v0.6 and says a new paymaster should NOT hardcode it as its sole/primary target."
  - "It gives the current EntryPoint to target instead: v0.7 at 0x0000000071727De22E5E9d8BAf0edAc6f37da032 (a correctly-named later v0.8 EntryPoint is also acceptable)."
  - "The reason given is version/currency — v0.6 is an older EntryPoint that current bundler and account tooling has moved past — not an unrelated issue like a bad checksum, a typo, or the address being fake."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's current-EntryPoint reference (v0.7
  0x0000000071727De22E5E9d8BAf0edAc6f37da032). Framed as a PR review that plants
  the deprecated v0.6 address as the trap, so the task is a decision ("should a
  new deployment target this?") rather than a bare "what's the address" lookup,
  and it lands squarely on the hallucination-prone claim: models confidently
  emit the v0.6 EntryPoint.

  Caveat: this claim is web-searchable, so a no_skill run with live search can
  pass without any skill. Mine each run's transcript.md for whether the pass
  came from parametric knowledge or a live lookup, and report it — a wiki
  verdict weakens the skill-vs-no-skill discrimination and should be called out
  rather than counted as a skill win. Also flag if a run defends v0.6 as still
  valid because some bundlers keep supporting it; the expect wants a new
  deployment steered to v0.7+, not a claim that v0.6 is broken. Skill vendored
  at skills/wallets (source ethskills.com/wallets/SKILL.md, skill source @
  191dcc1). Bare workspace, answer is a file. Awaiting human sanity-check before
  the first recorded benchmark.
