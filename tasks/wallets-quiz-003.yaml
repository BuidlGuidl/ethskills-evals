skill: skills/wallets
input: |
  Our ERC-4337 paymaster has been live on Ethereum mainnet for a week and it is
  broken. The symptom: users' UserOperations keep getting rejected at validation
  with an error that the paymaster has no deposit — even though we ran the
  deposit-and-stake step, that transaction succeeded, and a block explorer shows
  our ETH sitting in the EntryPoint under the paymaster right now.

  What the deploy actually did: the paymaster contract was constructed with,
  deposits to, and validates against this EntryPoint singleton:

    0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

  The smart accounts our users hold are current-generation accounts built
  against EntryPoint v0.7 and v0.8, and our bundlers (Pimlico, Alchemy) submit
  each account's UserOperations to the EntryPoint that account is bound to.

  The deposit is provably on-chain, yet every UserOperation fails as if it were
  missing. Explain what is actually mismatched here and give the one change that
  fixes it. Be concrete about what has to line up for the deposit to be seen.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md diagnoses the root cause as an EntryPoint-version MISMATCH: the paymaster deposits to and validates against one EntryPoint singleton, while the users' accounts submit their UserOperations to a DIFFERENT EntryPoint — so validation runs on an EntryPoint where the paymaster has no balance, and the real deposit sitting in the other EntryPoint is invisible to it. It does NOT attribute the failure to an unrelated cause (too little deposit, missing stake, a bad signature, gas, or the paymaster contract logic)."
  - "It identifies 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789 as EntryPoint v0.6 and recognizes that it is a different singleton from the v0.7/v0.8 EntryPoints the users' accounts are bound to — which is why the deposit and the validation land on different EntryPoints. Naming it as v0.6 is sufficient; it does not need to claim bundlers have dropped v0.6 support."
  - "The fix is to move the paymaster onto the EntryPoint the users' accounts actually use — deposit to and validate against v0.7 or v0.8 rather than v0.6. Naming the version is sufficient; giving a matching address (v0.7 0x0000000071727De22E5E9d8BAf0edAc6f37da032, v0.8 0x4337084D9E255Ff0702461CF8895CE9E3b5Ff108) confirms it but is not required, and a version named with a mismatched address fails. NOT 'add more deposit' or 're-stake' on the v0.6 EntryPoint."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's current-EntryPoint reference (v0.7
  0x0000000071727De22E5E9d8BAf0edAc6f37da032, SKILL.md L12).

  The claim is buried inside a diagnosis rather than asked for by name: a
  paymaster whose UserOperations fail at validation despite a provably on-chain
  deposit. Passing requires the 4337-architecture insight that a paymaster's
  deposit lives inside one specific EntryPoint singleton and bundlers submit to
  one specific EntryPoint, so if the paymaster deposited to v0.6 while today's
  accounts/bundlers run on v0.7+, the EntryPoint doing validation looks for the
  deposit in its own ledger, finds nothing, and rejects. Recognizing 0x5FF... as
  v0.6 is necessary but not sufficient — the reasoning about WHY the deposit is
  invisible is the discriminator, and a bare address recall does not produce it.

  EntryPoint version landscape as of this eval (checked against
  eth-infinitism/account-abstraction releases and Pimlico/Alchemy bundler docs):
    v0.6  0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789  deprecated — the deposit lands here
    v0.7  0x0000000071727De22E5E9d8BAf0edAc6f37da032  what the skill teaches
    v0.8  0x4337084D9E255Ff0702461CF8895CE9E3b5Ff108  native EIP-7702 support
    v0.9  0x433709009B8330FDa32311DF1C2AFA402eD8D009  "latest" on GitHub
  The input pins the users' accounts to v0.7/v0.8, so the fix is to move the
  paymaster's deposit onto v0.7 or v0.8 — either passes. Bundlers still accept
  v0.6 (Alchemy runs v0.6/v0.7/v0.8, Pimlico v0.6/v0.7 + the 7702 hybrid), so the
  diagnosis is NOT "bundlers dropped v0.6"; it is that the deposit and the
  accounts sit in different EntryPoint singletons. An answer that says v0.6 is
  still supported is fine and should not be marked wrong. Addresses in expect_3
  confirm the version but are not required to pass. Re-check the version table on
  a re-run — bundler v0.9 adoption is the thing most likely to have moved.

  Skill-staleness note: SKILL.md L12 names only v0.7. That is still a passing fix
  target here (bundlers support it), so this quiz does not fail the skill — but
  the skill is now one to two EntryPoint versions behind the deployed set, a
  candidate skill edit. File it as a mistake record if a with_skill run parrots
  v0.7 as "the current EntryPoint" while missing that v0.8/v0.9 shipped; do not
  bake it into this task's grading.

  Caveat: the EntryPoint addresses are web-searchable, so a no_skill run with
  live search can recall them. But the pass here hinges on the deposit-namespace
  diagnosis, not the address — mine each run's transcript.md for whether the run
  reasoned to the mismatch or merely swapped an address it looked up, and report
  it. Also flag any run that "fixes" it by topping up the v0.6 deposit, which is
  prior-preserving and should fail expect_3. Skill vendored at skills/wallets
  (source ethskills.com/wallets/SKILL.md, skill source @ 191dcc1). Bare
  workspace, answer is a file.
