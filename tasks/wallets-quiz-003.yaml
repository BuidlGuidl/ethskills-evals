skill: skills/wallets
input: |
  We're shipping a new ERC-4337 paymaster on Ethereum mainnet, and it needs to
  work with the bundlers our users actually use today (Pimlico, Alchemy). A
  draft PR hardcodes the EntryPoint singleton the paymaster deposits to and
  validates against as:

    0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

  Is that the EntryPoint address a brand-new deployment should target today? If
  not, what address and version should it use instead, and why is the one in
  the PR a problem?

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md identifies 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789 as the deprecated EntryPoint v0.6 and says a new paymaster should NOT hardcode it as its sole/primary target."
  - "It steers the deployment to a current, bundler-supported EntryPoint, naming a version together with an address that matches it: v0.7 at 0x0000000071727De22E5E9d8BAf0edAc6f37da032, or v0.8 at 0x4337084D9E255Ff0702461CF8895CE9E3b5Ff108. Naming EntryPoint v0.9 (0x433709009B8330FDa32311DF1C2AFA402eD8D009) passes ONLY if the answer also notes that Pimlico/Alchemy bundler support for v0.9 is not yet broad — the prompt requires it work with those bundlers today. A version/address mismatch, or an address that fits none of these, fails."
  - "The reason given is version/currency — v0.6 is an older EntryPoint that current bundler and account tooling has moved past — not an unrelated issue like a bad checksum, a typo, or the address being fake."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's current-EntryPoint reference (v0.7
  0x0000000071727De22E5E9d8BAf0edAc6f37da032). Framed as a PR review that plants
  the deprecated v0.6 address as the trap, so the task is a decision ("should a
  new deployment target this?") rather than a bare "what's the address" lookup,
  and it lands squarely on the hallucination-prone claim: models confidently
  emit the v0.6 EntryPoint.

  EntryPoint version landscape as of this eval (checked against
  eth-infinitism/account-abstraction releases and Pimlico/Alchemy bundler docs):
    v0.6  0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789  deprecated — the trap
    v0.7  0x0000000071727De22E5E9d8BAf0edAc6f37da032  what the skill teaches
    v0.8  0x4337084D9E255Ff0702461CF8895CE9E3b5Ff108  native EIP-7702 support
    v0.9  0x433709009B8330FDa32311DF1C2AFA402eD8D009  "latest" on GitHub
  Why the expect does NOT simply demand "the newest": the prompt requires the
  paymaster work with the bundlers users run today, and that constraint — not
  recency — defines the answer. Alchemy runs v0.6/v0.7/v0.8; Pimlico runs
  v0.6/v0.7 (+ the 7702 hybrid). v0.7 is the common denominator both support and
  the safest target; v0.8 is fine where Alchemy is enough; v0.9 exists on GitHub
  but is not broadly bundler-supported yet, so targeting it alone would violate
  the very constraint the prompt sets — hence it passes only with that caveat.
  Addresses are pinned in the expect so a blind judge can verify version against
  address; do not drop them back to a bare version name. Re-check this table when
  re-running: bundler v0.9 adoption is the thing most likely to have moved.

  Skill-staleness note: SKILL.md L12 names only v0.7. That is still a passing
  answer here (bundlers support it), so this quiz does not fail the skill — but
  the skill is now one to two EntryPoint versions behind the deployed set, which
  is a candidate skill edit. File it as a mistake record if a with_skill run
  parrots v0.7 as "the current EntryPoint" while missing that v0.8/v0.9 shipped;
  do not bake it into this task's grading.

  Caveat: this claim is web-searchable, so a no_skill run with live search can
  pass without any skill. Mine each run's transcript.md for whether the pass
  came from parametric knowledge or a live lookup, and report it — a wiki
  verdict weakens the skill-vs-no-skill discrimination and should be called out
  rather than counted as a skill win. Also flag if a run defends v0.6 as still
  valid because some bundlers keep supporting it; the expect wants a new
  deployment steered to a current EntryPoint, not a claim that v0.6 is broken.
  Skill vendored at skills/wallets (source ethskills.com/wallets/SKILL.md, skill
  source @ 191dcc1). Bare workspace, answer is a file.
