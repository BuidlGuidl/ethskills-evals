skill: skills/security
input: |
  We're building the onchain piece of a "save any token" product for Ethereum
  mainnet. Anyone can spin up a vault for any ERC-20 — listing is
  permissionless, whatever token someone proposes gets a vault. Depositors
  receive a transferable receipt token representing their pro-rata claim on
  that vault, so they can move it around or use it elsewhere. Yield arrives as
  more of the same underlying token: a keeper bot periodically transfers tokens
  into the vault, which lifts every holder's claim. Deposits and withdrawals
  are open at any time, with no lockup.

  Work in this directory:
    - set up a foundry project and implement the contracts we would deploy
    - the yield source is not the point — the keeper just sends tokens in;
      assume that part already works
    - make sure it compiles with forge build
    - leave a NOTES.md covering how a depositor's claim is computed, and what
      an operator has to get right when they list a token and run the keeper
expect:
  - "The share/claim math is protected against a first depositor manipulating the share price by transferring tokens straight to the vault. Any of these passes: inheriting OpenZeppelin's ERC4626, whose conversion carries virtual assets and shares (with or without a raised _decimalsOffset), a hand-rolled virtual offset, or a dead first deposit whose shares are burned to an unrecoverable address. Hand-rolled math that mints assets * totalSupply / token.balanceOf(vault) with a 1:1 path for the first depositor and no mitigation FAILS this check."
  - "The vault does not silently credit a depositor with tokens it never received. Any of these passes: measuring the vault's token balance before and after the incoming transfer and using the difference for the accounting, or refusing a deposit (or a listing) whose received amount does not match the amount sent. Crediting the caller's requested amount with nothing in the code that detects the mismatch fails — listing is permissionless, so fee-on-transfer tokens will be listed. A NOTES.md line calling such tokens unsupported does not pass on its own if nothing in the code enforces it; note it in the report."
  - "Every token movement goes through a call that tolerates non-standard ERC-20s — OpenZeppelin's SafeERC20 (safeTransfer / safeTransferFrom) or an equivalent low-level call with an explicit success-and-returndata check. A bare token.transfer(...) or token.transferFrom(...) whose return value is ignored or assumed to be a bool fails this check."
  - "Withdrawal follows checks-effects-interactions: the depositor's shares are burned and the vault's accounting is updated BEFORE the token is transferred out. A reentrancy guard in addition is fine; a guard wrapped around code that still transfers before updating state does not pass."
  - "NOTES.md explains how a depositor's claim is computed concretely enough to follow the arithmetic (the conversion between shares and underlying, and what happens to the claim when the keeper sends yield in), rather than describing it in general terms."
runs: 3
notes: |
  Goal task for skills/security per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Mirrors
  security-quiz-001 (vault share-price manipulation), security-quiz-003
  (credit the received amount, not the requested one) and security-quiz-004
  (non-standard ERC-20s). Nothing in the input names a vulnerability, a
  security property, or a token quirk — the habits have to show up in the code
  on their own. Read it against those quizzes: they measure knows-when-asked,
  this measures applies-unprompted, and only that split reaches a verdict in the
  issue's table.

  Two clauses in the scenario are load-bearing and should not be softened:
    - permissionless listing of any ERC-20 — this is what puts fee-on-transfer
      and non-standard tokens in scope without mentioning either
    - yield arriving as a plain transfer from a keeper — this closes the escape
      where a vault ignores its raw token balance entirely, since donated
      balance is how yield reaches holders; a mitigation has to survive that

  Bare workspace, no template on purpose: a scaffold would pre-pick the base
  contracts and kill the signal about what the model reaches for. The executor
  sets up foundry and installs dependencies itself, so the run needs network
  access.

  expect_1 and expect_2 are written so one implementation can satisfy both.
  Inheriting OpenZeppelin's ERC4626 passes expect_1 on its own — its conversion
  already carries virtual assets and shares — but its deposit path mints on the
  amount the caller asked for, so a run that stops there still has to add a
  received-amount check somewhere to pass expect_2. Keep both lines satisfiable
  by the same vault if either is ever retuned; a pass requires every expect, so
  two lines pulling opposite ways would zero out both variants and leave the
  task unable to produce a delta.

  Report from each transcript: whether forge build was actually run and passed
  (the judge reads code but cannot execute it), and whether the run built on
  OpenZeppelin's ERC4626 or hand-rolled the share math. Nothing is broadcast;
  the artifact is a compiled project, not a deployment. Skill vendored at
  skills/security (source ethskills.com/security/SKILL.md, skill source @
  191dcc1).
