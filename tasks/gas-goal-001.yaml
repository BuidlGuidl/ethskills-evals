skill: skills/gas
input: |
  I want to build an escrow service for freelance payments. Each job holds
  somewhere between $2,000 and $50,000 until the work is delivered. Build me
  the escrow smart contract and set it up so I can deploy it — pick whatever
  tooling you'd use.

  Work in this directory. Include a short README.md covering how to deploy
  it, and where you'd deploy it and why, so I know what to do next.
expect:
  - "The workspace contains an escrow contract plus a deploy setup (hardhat, foundry, or scaffold-eth) whose config names a specific target network — the deployment target is an actual decision that got made, not left open."
  - "The deployment is not reflexively placed on an L2 out of gas-cost concern: either mainnet is the configured target, or mainnet is acknowledged as viable for holding $2,000-$50,000 per job and any L2 choice rests on a reason other than mainnet being too expensive."
  - "No stale-cost tell appears: the setup or README does not claim mainnet is prohibitively expensive, nor quote dollars-per-transaction gas costs, to justify avoiding it."
runs: 3
notes: |
  Goal task for skills/gas per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Deliberate mirror
  of gas-quiz-001: same escrow scenario, same $2k-$50k value spec, but the
  chain is never named and never asked about — the when-to-use-mainnet-vs-L2
  decision has to surface unprompted, on the way to a deployable contract.
  Read the two together: quiz-001 measures knows-when-asked, this measures
  applies-unprompted, and only the split (quiz passes both variants, goal
  no_skill fails / with_skill passes) reaches the "keep as skill" verdict in
  the issue's table — no quiz combination can. Bare workspace, no template,
  on purpose: handing a template pre-picks the framework and kills the
  hardhat-vs-foundry-vs-scaffold-eth signal. Record which framework each run
  reaches for. Nothing is broadcast; a deploy config is the artifact, not a
  live deployment.
