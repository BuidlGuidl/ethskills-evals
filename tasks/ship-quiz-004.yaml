skill: skills/ship
input: |
  We publish a newsletter about our city's restaurants — around 200,000
  subscribers, almost none of whom have ever used a crypto wallet, though a
  large share of them already have a Coinbase account they signed up for years
  ago. We want readers to be able to tip a line cook directly: a reader taps a
  tip under a dish we wrote about, the cook gets the money. Tips run $1-$5 and
  we expect a few thousand a week, most of them in the two days after an issue
  goes out.

  Two things before we commit to a build. Write the walkthrough of a first-time
  reader's first tip — every screen, and everything they have to install, sign
  up for, or fund before the money reaches the cook. Then tell me what would
  have to change about this product for that setup to be the wrong one.

  Write your answer to plan.md in this directory.
expect:
  - "plan.md commits to one specific chain as the deployment target for the tipping flow — a named chain, not 'any EVM chain', 'an L2', or a decision deferred to later."
  - "The reason given for that chain is a capability of that chain that matches this product — the readers' existing Coinbase accounts and the distribution/onboarding path they open, native smart-wallet / account-abstraction onboarding, or sponsored gas for users holding no ETH. A pick justified only or primarily by transactions being cheap fails, and so does a pick with no stated reason. A chain other than Base passes only if the stated reason is a real capability of that chain matching this product, not a generic 'it's a popular L2'."
  - "The first-time reader's walkthrough does not require them to install a browser-extension or seed-phrase wallet, buy or bridge ETH for gas, or learn what a network is before their first tip lands; onboarding runs through an embedded/smart wallet, passkey or exchange-linked sign-in, with gas sponsored or paid out of the tip."
  - "The answer to what would make this setup wrong turns on the product changing shape — needing composability with mainnet DeFi, higher-value or lower-frequency transfers, a different audience — rather than on gas prices moving. A run that says the choice would flip if fees rose has keyed it to cost, not to fit, and fails this check."
runs: 3
notes: |
  Quiz task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets one claim:
  pick a chain for its superpower, not because mainnet is expensive — each L2
  has a distinct one (SKILL.md "You skip chain selection" and the "Chain
  Selection" table).

  Load-bearing in the scenario, don't soften: the readers' existing Coinbase
  accounts (without it the right chain is under-determined and the grading is a
  coin flip), and that the readers hold no crypto, which is what makes an
  install-a-wallet-and-fund-it walkthrough a visible failure. The chain question
  is never asked — it surfaces because the walkthrough has to say where the
  money lands and how the reader funds gas, and the what-would-make-this-wrong
  question forces the reason for the pick into the open where it can be graded.

  Record per run: which chain each run picks and which capability it names,
  whether the walkthrough reaches for a specific onboarding product, and whether
  the run fetched any other ethskills SKILL.md over the network — ship routes to
  other skills by URL, and a with_skill run that pulls them makes the delta about
  the bundle rather than this skill.

  Bare workspace, answer is a file. Skill vendored at skills/ship (source
  ethskills.com/ship/SKILL.md, skill source @ 191dcc1).
