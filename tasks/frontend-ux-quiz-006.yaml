skill: skills/frontend-ux
input: |
  A Scaffold-ETH 2 dApp (Next.js App Router, wagmi v2, viem). Ops report:
  our free-tier RPC plan (20
  requests/second) starts returning 429s whenever someone leaves the
  positions dashboard open for ten minutes or so — and it gets worse the
  longer the tab stays alive. The dashboard's balance polling looks like
  this:

      const { data: blockNumber } = useBlockNumber({ watch: true });

      useEffect(() => {
        const id = setInterval(refreshBalances, 3000);
      }, [address, blockNumber]);

  refreshBalances fires one RPC request per call, and the app runs on
  Ethereum mainnet (12s blocks). Derive the dashboard's request rate over
  its first ten minutes on screen — numbers, not vibes — and explain why
  it keeps climbing. Then write the healthy version: cleanup, dependency
  array, and the polling cadence appropriate for an interactive app.
  Write your answer to answer.md in this directory.
expect:
  - "answer.md derives the rate quantitatively: the blockNumber dependency re-runs the effect every ~12s and no cleanup is returned, so intervals accumulate — roughly 50 live intervals after ten minutes firing ~17 req/s (vs ~0.33 req/s for a single interval), which is why 429s appear and keep worsening."
  - "The fix returns clearInterval cleanup from the effect and drops blockNumber from the dependency array — poll on one interval or refetch per new block, not both multiplied."
  - "The recommended cadence lands in the ~2-5s responsive range for an interactive app, with the runaway pattern (duplicate watchers / unbounded polling) named as the thing to guard against."
runs: 3
notes: |
  Quiz task for skills/frontend-ux per issue #1 (skill vendored at 191dcc1,
  verified byte-identical to live ethskills.com/frontend-ux/SKILL.md on
  2026-07-15). One claim per quiz; this one targets Rule 5 — runaway
  request patterns (render loops, duplicate watchers, unbounded polling)
  and the ~2-5s responsive polling range. The arithmetic buries the claim:
  a new block every ~12s re-runs the effect, the missing cleanup leaves
  every interval alive, ~51 intervals x 1 req/3s = ~17 req/s after ten
  minutes and climbing. No goal mirror —
  the goal build rarely exercises polling config, so this quiz is Rule 5's
  only coverage. After runs, mine transcript.md for whether the executor
  derived the accumulation numerically or only spotted the missing cleanup
  qualitatively (the expect requires numbers), and whether the 2-5s range
  came from the skill. Bare workspace, answer is a file.
