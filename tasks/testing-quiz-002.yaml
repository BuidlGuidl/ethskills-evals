skill: skills/testing
input: |
  Our vault charges a deposit fee in basis points. The owner retunes it through:

      function setDepositFee(uint256 newFeeBps) external onlyOwner {
          uint256 previousFeeBps = depositFeeBps;
          depositFeeBps = newFeeBps;
          emit DepositFeeUpdated(previousFeeBps, newFeeBps);
      }

  and deposit() does the obvious thing with it:

      uint256 fee = (amount * depositFeeBps) / BPS_DENOMINATOR;   // BPS_DENOMINATOR = 10_000
      uint256 netAmount = amount - fee;
      shares = convertToShares(netAmount);
      if (shares == 0) revert NoSharesMinted();

  The suite covers this: the fee maths asserted at 0, 10 and 25 bps, the event, and the
  only-owner check. Green, and `forge coverage` reports 100% of the lines in both
  functions.

  Last week ops retuned the fee for a promotion and the vault stopped accepting
  deposits completely — every single deposit reverted until we redeployed. The setter
  has no bug in the sense that it does exactly what it says: it stores the number it
  was given.

  Explain how a suite with 100% coverage of both of those functions missed this, what
  class of input it never tried and why the four values above could never have found
  it, and the specific testing technique that would have caught it before ops did.
  Show the arithmetic for the input that breaks it.

  Write your answer to answer.md in this directory.
expect:
  - "answer.md identifies the breaking input class as a fee at or above the 100% bound — newFeeBps >= 10_000 — and shows the arithmetic: at 10_000 the fee equals the full amount so netAmount is 0 and the deposit reverts (no shares minted), and above 10_000 fee exceeds amount so `amount - fee` underflows and reverts."
  - "It explains that 100% coverage only proves the lines executed, not that the input space was explored: the four hand-picked values are all far below the bound, so every test walks the same branch and the assertion can never fail."
  - "The technique named is fuzz testing the fee maths over the full input range (bound() over newFeeBps rather than hand-picked values), asserting a property — deposits still succeed / the fee never exceeds the amount — instead of checking specific expected numbers."
  - "It notes the underlying defect is the missing input validation in the setter (require/revert unless newFeeBps <= BPS_DENOMINATOR), not just the gap in the tests."
runs: 3
notes: |
  Quiz task for skills/testing per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1 (skill vendored at
  191dcc1, verified byte-identical to live ethskills.com/testing/SKILL.md on
  2026-07-16).

  One claim per quiz; this one targets the skill's "You don't fuzz" bullet and its
  Fuzz Testing section (whose own example is testFuzz_Fee(amount, feeBps) with
  bound() — precisely the test that finds this). Derivation is forced by burying the
  claim inside a proxy: the question never asks "what does fuzzing do", it hands over
  a green 100%-covered suite plus a production incident and asks for the input class
  and the arithmetic.

  Expected to pass both variants. That is the point, not a flaw: paired with
  testing-goal-001 expect 1, a double-pass here plus a no_skill fail there is the
  issue's "keep as skill" verdict (knows-when-asked but does not apply unprompted),
  and neither half reaches it alone.

  Both code snippets are verbatim from testing-goal-001's fixture — the same unbounded
  setDepositFee and the same deposit() fee maths live in
  fixtures/testing-vault-001/src/UsdtYieldVault.sol — and the three fee values quoted
  (0, 10, 25 bps) are the ones that fixture's suite actually asserts. The fuzz detector
  run while drafting shrank to exactly newFeeBps = 10_000. Mirror pair with
  testing-goal-001 expect 1. Bare workspace, answer is a file.
