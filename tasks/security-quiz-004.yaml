skill: skills/security
input: |
  Our treasury router on Ethereum mainnet pulls stablecoins in and forwards
  them to a strategy contract, which it has to approve before each run. The
  repo is on @openzeppelin/contracts v5 and Solidity 0.8.26.

  The approval step is a low-level call, because an earlier version reverted
  while decoding the return value of some tokens:

    (bool ok, ) = token.call(abi.encodeWithSelector(0x095ea7b3, strategy, amount));
    require(ok, "approve failed");

  Three weeks of runs:

    - USDC (0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48): every run succeeds
    - USDT (0xdAC17F958D2ee523a2206206994597C13D831ec7): the FIRST run
      succeeded. Every run since reverts, always at that require, before any
      transfer happens
    - the strategy frequently spends less than it was approved for, so a
      leftover allowance from the previous run is normally still sitting there
    - the router holds enough ETH for gas, is not paused, is not on any
      blocklist, and the amounts are ordinary five-figure sums

  Why does this fail only for USDT, and only after the first run? Give the
  minimal change to the router that fixes it, and say what it should do about
  the leftover allowance in general.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md diagnoses the token-side guard: USDT's approve reverts when it is called to set a NON-ZERO allowance while a non-zero allowance from before is still outstanding (the anti-front-running approve-race check in its implementation), which is exactly why the first run — with a zero starting allowance — worked, why the later runs fail, and why USDC, which has no such restriction, is unaffected. It does NOT attribute the failure to gas, a paused or blocklisted token, the missing return value (already handled by the low-level call), an allowance overflow, or the strategy contract."
  - "The prescribed fix zeroes the allowance before setting a new non-zero one — SafeERC20.forceApprove from OpenZeppelin v5, or an explicit approve(0) followed by approve(amount). It FAILS if it prescribes safeApprove: that function was removed in OpenZeppelin Contracts v5, which the repo is pinned to, so the suggested code would not compile."
  - "On the leftover allowance it recommends bounding the exposure — approve only what the run needs and reset the remainder to zero once the strategy has run. It FAILS if an unlimited (type(uint256).max) approval is offered as the way to avoid re-approving; mentioning unlimited approval is acceptable only if it is rejected or flagged as putting the router's whole balance at risk if the strategy is ever compromised."
runs: 3
notes: |
  Quiz task for skills/security per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  the SafeERC20 / non-standard-token section plus the no-infinite-approvals rule
  (SKILL.md "SafeERC20" and "Infinite Approvals").

  The quirk is never named; the model has to derive it from the asymmetry
  (USDT vs USDC) and the timing (first run only). The "strategy frequently
  spends less than it was approved for" clause is load-bearing — it is what
  leaves a non-zero allowance in place — and so is the low-level call, which
  removes the missing-return-value explanation and keeps the scenario coherent
  with USDT's non-standard approve signature.

  This is also the file that catches the skill going stale on the reader:
  SKILL.md's SafeERC20 example prescribes safeApprove, which OpenZeppelin
  removed in v5. expect_2 fails that answer. A with_skill run that fails
  expect_2 by repeating the skill's own line is the fix-the-skill verdict from
  the issue's table, not a model failure — say so explicitly in the report and
  file a mistake record with skill_section "SafeERC20".

  expect_3 is a genuine judgement call, not a formality: an unlimited approval
  to a trusted in-house strategy is common in production, and the skill argues
  against it. Report which variants take which side.

  Skill vendored at skills/security (source ethskills.com/security/SKILL.md,
  skill source @ 191dcc1). Bare workspace, answer is a file.
