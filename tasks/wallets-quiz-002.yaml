skill: skills/wallets
input: |
  I'm a solo builder. An automated agent I run will custody about $250k of
  treasury funds and operate unattended for weeks at a time. A teammate says:
  "Just keep it all on one Ledger — a hardware wallet is the gold standard,
  nothing is more secure." I have no second person available to co-sign
  anything.

  Is a single hardware wallet actually the most secure option here, or is there
  a strictly more secure setup I can run entirely by myself? If something beats
  it, say what it is and explain the difference in terms of what an attacker
  has to compromise.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md rejects 'a single hardware wallet is the most secure option' and does not endorse the lone-Ledger recommendation as best."
  - "It names an audited multisig smart-contract wallet (e.g. Safe) requiring multiple signatures as strictly more secure, and makes clear a SINGLE user can run it alone — holding the several signer keys across separate devices (e.g. hardware wallet + phone + laptop), with no second person required."
  - "The security argument is that a lone hardware wallet is a single point of failure whereas the multisig forces an attacker to compromise several keys/devices at once — not merely that a hardware wallet 'could be lost, damaged, or phished.'"
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's "most secure storage" claim — an audited multisig beats a
  lone hardware wallet, and a single user can run the multisig by holding the
  keys across separate devices. Framed as a custody decision so the model has
  to reason to it, not recite it. Two stale priors to beat: (a) "hardware wallet
  is the gold standard / most secure," and (b) "multisig needs multiple people,"
  which the solo-builder framing is built to expose.

  This claim is a judgement, not a lookup, so it is the least web-searchable of
  the wallets quizzes and should discriminate on reasoning. Skill vendored at
  skills/wallets (source ethskills.com/wallets/SKILL.md, skill source @
  191dcc1). Bare workspace, answer is a file. Awaiting human sanity-check before
  the first recorded benchmark.
