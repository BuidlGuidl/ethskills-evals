skill: skills/wallets
input: |
  I'm a solo builder and I need to custody about $250k of treasury funds for the
  long haul — held securely, moved only occasionally and always by me. A
  teammate says: "Just keep it all on one Ledger — a hardware wallet is the gold
  standard, nothing is more secure." I have no second person available to
  co-sign anything and I'm not going to bring one in.

  Is a single hardware wallet actually the most secure way to hold this, or is
  there a strictly more secure setup I can run entirely by myself? If something
  beats it, say what it is and explain the difference in terms of what an
  attacker has to compromise.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md rejects 'a single hardware wallet is the most secure option' and does not endorse the lone-Ledger recommendation as best."
  - "It names an audited multisig smart-contract wallet (e.g. Safe) requiring multiple signatures as strictly more secure, and makes clear the SOLO builder can operate it alone — meeting the signing threshold with several keys they personally hold across separate devices (e.g. hardware wallet + phone + laptop). An optional extra signer used only for recovery (a trusted contact) is fine and does NOT count as requiring a second person; what fails is claiming a multisig inherently needs another person to operate."
  - "The security argument is that a lone hardware wallet is a single point of failure whereas the multisig forces an attacker to compromise several keys/devices at once — not merely that a hardware wallet 'could be lost, damaged, or phished.'"
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's "most secure storage" claim (SKILL.md L14) — an audited
  multisig beats a lone hardware wallet, and a single user can run the multisig
  by holding the keys across separate devices. Framed as a custody decision so
  the model has to reason to it, not recite it. Two stale priors to beat: (a)
  "hardware wallet is the gold standard / most secure," and (b) "multisig needs
  multiple people," which the solo-builder framing is built to expose.

  Framing decision — this is a STORAGE-security task, not an agent-execution
  one. An earlier draft framed it as "an automated agent that operates unattended
  for weeks." That premise fought its own answer: a multisig requiring multiple
  signatures cannot execute unattended, so demanding true unattended operation
  would make the expected answer unreachable — the same trap quiz-006's notes
  call out and deliberately avoid. It also collided with quiz-006, which owns the
  agent-custody topology (who holds which key, what the threshold buys under
  compromise). This task is now a plain "how do I hold a large treasury" decision
  with occasional, manual, self-initiated moves, so the multisig answer is fully
  compatible with the scenario and the two tasks stay distinct: 002 = multisig >
  lone hardware wallet for a solo holder; 006 = the 2-of-3 agent topology.

  expect_2 wording — the claim is that a multisig does not REQUIRE multiple
  people to operate, not that it forbids any additional signer. SKILL.md L14's
  own topology is a 2-of-4 where three signers are the user's own devices and the
  fourth is a trusted contact for recovery. A faithful with_skill answer may
  propose exactly that, so the check must not read the recovery contact as "a
  second person" and fail it. What fails is the stale prior that a multisig is
  inherently multi-person; an optional recovery signer is fine.

  This claim is a judgement, not a lookup, so alongside quiz-006 it is the least
  web-searchable of the wallets quizzes and should discriminate on reasoning.
  Skill vendored at skills/wallets (source ethskills.com/wallets/SKILL.md, skill
  source @ 191dcc1). Bare workspace, answer is a file.
