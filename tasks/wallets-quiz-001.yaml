skill: skills/wallets
input: |
  A user holds USDC in the MetaMask account they have used for two years — a
  normal externally-owned account with an ENS name and on-chain history they
  refuse to abandon. They want to approve Aave V3's Pool to spend 5,000 USDC
  AND supply that 5,000 USDC to Aave in ONE atomic transaction on Ethereum
  mainnet — either both legs land or neither does — without deploying a
  smart-contract wallet or moving their funds to a new address.

  As of today, is this possible from that exact same account? If so, name the
  precise transaction mechanism that makes it possible and the mainnet upgrade
  (with its date) that shipped it.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md says YES: the approve + supply can be batched into a single atomic transaction from the same existing EOA, keeping its address — not that it is impossible."
  - "It identifies the mechanism as an EIP-7702 set-code transaction (transaction type 0x04, i.e. an authorization the EOA signs delegating it to smart-contract code), and treats it as LIVE on Ethereum mainnet — shipped by the Pectra upgrade on May 7 2025 — not as a proposal, a testnet-only feature, or something 'coming soon'."
  - "It does NOT fall back to the stale answer that an EOA fundamentally cannot batch and therefore needs a deployed smart-contract / ERC-4337 account or a migration to a new address."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  this targets the skill's flagship stale claim — EIP-7702 is live on mainnet
  (Pectra, May 7 2025), so an existing EOA can execute batched contract logic
  atomically without becoming a smart-contract wallet. The stale prior either
  calls 7702 a future proposal or insists an EOA can't batch and reaches for a
  4337/Safe account or a new address.

  Deliberately mirrors wallets-goal-001: same Aave approve+supply scenario and
  the same "keep the same EOA, no new wallet, one atomic action" constraints.
  Read the two together — this quiz measures knows-when-asked, the goal measures
  applies-unprompted, and only that split reaches the issue's "keep the skill"
  verdict. Skill vendored at skills/wallets (source ethskills.com/wallets/
  SKILL.md, skill source @ 191dcc1). Bare workspace, answer is a file. Awaiting
  human sanity-check before the first recorded benchmark.
