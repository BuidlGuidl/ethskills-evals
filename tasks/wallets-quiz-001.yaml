skill: skills/wallets
input: |
  A teammate has left this verdict on our "one-click entry" design PR:

    "This can't work from a plain EOA. An EOA does one call per transaction —
    that is what an EOA IS. If they want the swap and the deposit to land
    together or not at all, they need a smart-contract wallet: deploy a Safe
    (or a 4337 account), move the WETH into it, and batch from there. Tell the
    user to accept the new address. There is no way around it."

  The setup they are reviewing: the user holds 2 WETH in the MetaMask account
  they have used for two years — an ENS name and on-chain history they refuse to
  abandon. That account has no token approvals to anything, and holds only
  enough ETH to pay gas. In a single confirmation they want to swap all 2 WETH
  to USDC on Uniswap V3 and supply every USDC that swap returns to Aave V3 —
  both legs or neither. The supplied amount is whatever the swap actually
  returns; it is not known before the transaction runs.

  Is the teammate right that the user has to accept a new address? Answer their
  verdict directly and say what you would actually ship.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md rejects the teammate's verdict: the swap + supply CAN be done as one atomic transaction from the user's existing EOA, keeping its exact address — the user does not have to deploy a smart-contract wallet or accept a new address."
  - "It identifies the mechanism as EIP-7702 — a set-code transaction (type 0x04) carrying an authorization the EOA signs, delegating the account to batch-executor contract code — and treats it as LIVE on Ethereum mainnet today (shipped by the Pectra upgrade, May 2025), not as a proposal, a testnet-only feature, or something 'coming soon'. An exact Pectra date is not required; presenting the mechanism as usable on mainnet now is."
  - "It does NOT ship an off-chain-signature workaround as the answer — EIP-2612 permit, Aave's supplyWithPermit, or Uniswap's Permit2. If any of these is discussed, it is correctly ruled out for THIS setup rather than proposed: WETH exposes no EIP-2612 permit, Permit2 needs a prior on-chain approval the account does not have, and the USDC amount cannot be signed for in advance because it does not exist until the swap executes."
  - "It does NOT fall back to the stale claim that an EOA fundamentally cannot execute batched contract logic and therefore needs a deployed smart-contract / ERC-4337 / Safe account or a migration to a new address."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  this targets the skill's flagship stale claim — EIP-7702 is live on mainnet
  (Pectra, May 7 2025), so an existing EOA can execute batched contract logic
  atomically without becoming a smart-contract wallet.

  Framed as a PR review that plants the stale prior as the teammate's verdict,
  matching the quiz-003 / quiz-004 / quiz-006 pattern. The mechanism is never
  named and never asked for by name — the model has to surface it to justify
  rejecting the verdict. An earlier draft asked outright to "name the precise
  transaction mechanism and the mainnet upgrade (with its date)", which is the
  retrieval shape issue #1 argues against; the claim is now buried behind a
  decision.

  The scenario is built so every non-7702 route is structurally dead, which is
  what makes a wrong answer a real failure rather than a defensible alternative:
    - a new smart account / Safe / 4337 -> new address, which the user refuses
    - two sequential transactions -> breaks atomicity
    - EIP-2612 permit / Aave supplyWithPermit -> WETH exposes no permit, and the
      USDC amount is not known until the swap runs, so it cannot be pre-signed
    - Uniswap Permit2 -> needs a one-time on-chain approve per token first, and
      the account is stated to have no approvals to anything
    - a payable "zap" contract -> the user holds WETH (an ERC-20), not ETH, so
      value cannot be attached in place of an approval
  The "no approvals to anything", "only enough ETH for gas", and "amount not
  known before the transaction runs" clauses are each load-bearing. Do not
  soften them without re-checking which escape reopens.

  Deliberately mirrors wallets-goal-001: same WETH -> USDC -> Aave scenario and
  the same "keep the same EOA, no new wallet, one atomic action" constraints.
  Read the two together — this quiz measures knows-when-asked, the goal measures
  applies-unprompted, and only that split reaches the issue's "keep the skill"
  verdict.

  Scenario history: the pre-split bundled quiz used 8 tokens + swaps through a
  DEX router; the split moved this file onto an Aave approve+supply pair to
  mirror the goal, which imported the goal's supplyWithPermit escape and left
  this file protected only by its retrieval-shaped phrasing. Both are fixed here.
  Skill vendored at skills/wallets (source ethskills.com/wallets/SKILL.md, skill
  source @ 191dcc1). Bare workspace, answer is a file.
