skill: skills/wallets
input: |
  Answer the four questions below. Write your answers to answer.md in this
  directory, one section per question, showing the reasoning and any concrete
  addresses, versions, or dates you rely on.

  1. A user holds 8 different ERC-20 tokens in the MetaMask account they have
     used for two years (address 0xAbC0000000000000000000000000000000000123,
     with an ENS name and history they refuse to abandon). They want to approve
     a DEX router and swap all 8 tokens in ONE atomic on-chain transaction on
     Ethereum mainnet — either every leg lands or none does — without deploying
     a smart-contract wallet or moving the tokens to a new address. As of today,
     is this possible from that exact same account? If so, name the precise
     transaction mechanism that makes it possible and the mainnet upgrade (with
     its date) that shipped it.

  2. An agent will custody roughly $250k of treasury funds and run unattended.
     A teammate says: "Just keep it all on one Ledger — a hardware wallet is the
     gold standard, nothing is more secure." For a SINGLE user (no second person
     available to co-sign), is a lone hardware wallet actually the most secure
     option, or is there a strictly more secure setup? If something beats it,
     say what, and explain the difference in terms of what an attacker has to
     compromise.

  3. You are deploying a paymaster that must reference the canonical ERC-4337
     EntryPoint singleton that today's mainstream bundlers (Pimlico, Alchemy)
     actually submit UserOperations to on Ethereum mainnet. What EntryPoint
     address do you hardcode, and which version is it? If the first address that
     comes to mind is an older, deprecated one, flag that explicitly.

  4. A recovery script hardcodes the Safe singleton (mastercopy) address for a
     user's 2-of-3 Safe on Ethereum mainnet. The user is now creating "the same"
     Safe on Base and on Arbitrum. Does the script need a different singleton
     address per chain? State the singleton address and Safe version you would
     use, and whether it is identical across mainnet, Base, and Arbitrum.
expect:
  - "Q1: answer.md says YES, the 8 approvals+swaps can be batched into one atomic transaction from the same existing EOA, and identifies the mechanism as an EIP-7702 set-code transaction (type 0x04 / an authorization signed by the EOA that delegates it to contract code) — treating it as LIVE on mainnet, shipped by the Pectra upgrade on May 7 2025, not as a proposal or future feature."
  - "Q1 rejects the stale answer that an EOA fundamentally cannot batch and therefore needs a deployed smart-contract / ERC-4337 account or a new address."
  - "Q2: answer.md rejects 'a lone hardware wallet is most secure' and names an audited multisig smart-contract wallet (e.g. Safe) as strictly more secure — explicitly noting one user can hold the multiple signer keys across separate devices, so an attacker must compromise several keys/devices instead of one single point of failure."
  - "Q3: answer.md hardcodes the current EntryPoint 0x0000000071727De22E5E9d8BAf0edAc6f37da032 (v0.7) — a correctly-named later v0.8 EntryPoint is also acceptable — and explicitly does NOT use the deprecated v0.6 EntryPoint 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789."
  - "Q4: answer.md states the Safe singleton is identical across mainnet, Base, and Arbitrum (deterministic deployment, no per-chain address) and gives the current v1.4.1 singleton 0x41675C099F32341bf84BFc5382aF534df5C7461a, not a per-chain value and not the older v1.3.0 singleton."
runs: 3
