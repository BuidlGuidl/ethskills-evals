skill: skills/frontend-playbook
input: |
  Our team scaffolded a Scaffold-ETH 2 project (foundry flavor) for a
  vault that integrates Aave V3 and USDC on Base. Local setup so far:
  `yarn chain` in one terminal, `yarn deploy` in another, and the app
  starts fine. But every integration call reverts, and a quick probe

      cast call 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913 \
        "balanceOf(address)(uint256)" <any address> \
        --rpc-url http://localhost:8545

  fails outright — while our mock-based forge tests all pass. Explain
  what that local chain actually contains and why the probe fails, then
  give the local setup where the exact same calls hit real Aave and real
  USDC — including what stays local (no real funds at risk) and how a
  test account ends up with six figures of USDC to play with. Write your
  answer to answer.md in this directory.
expect:
  - "answer.md reasons from the symptoms: the yarn chain node is an empty local chain with no deployed protocols or tokens, the USDC address has no code there, so the probe and every integration call fail — and passing mock-based tests say nothing about integration."
  - "The fix is fork mode — yarn fork --network base (an anvil fork of real Base) — after which the same addresses serve real Aave and real USDC state locally."
  - "It stays risk-free because the fork is a local copy (free test ETH, nothing broadcast), and the USDC funding comes from fork powers: impersonating or draining a whale balance that exists in the forked state."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the skill's headline "fork, not chain" prior:
  agents reflexively run yarn chain / a bare local node and then wonder
  why protocol integrations revert. The broken-probe framing forces
  derivation — the model must connect empty-chain state to the failing
  call and produce the fork workflow, not recite a command. After runs,
  mine transcript.md for whether the executor opened the skill and
  whether fork mode came from it, from parametric memory, or from a web
  search. Mirror pair with frontend-playbook-goal-001 expect 1 (same
  decision, applied unprompted). Bare workspace, answer is a file.
