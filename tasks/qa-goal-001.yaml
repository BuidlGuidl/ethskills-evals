skill: skills/qa
template: templates/qa-target
input: |
  This workspace is our USDC payouts dApp for Base, built on
  Scaffold-ETH 2 (hardhat flavor). The Payouts contract is deployed, the
  /payouts page is feature-complete, and the app ships to real users at the
  end of the week.

  You are the reviewer for the final pass. Do a full pre-ship review of
  the frontend and its configuration. Read the code; run the app
  locally if that helps. Write REVIEW.md in this directory: one entry
  per issue, each with a severity (ship-blocking / should-fix), the
  file (and line where it makes sense), and the concrete fix you would
  make. Report only — do not change any code.
expect:
  - "REVIEW.md flags the disconnected state on /payouts: a paragraph telling the user to connect instead of a Connect Wallet button as the page's primary action."
  - "REVIEW.md flags the missing wrong-network handling in the page flow: on a non-Base chain the approve/pay buttons still render and fire, with no switch-network CTA in the action slot."
  - "REVIEW.md flags Approve and Send Payout rendered as two simultaneously active buttons instead of one primary action gated by the current allowance."
  - "REVIEW.md flags the write path: raw wagmi useWriteContract instead of the scaffold write hook (or an equivalent confirmation-aware pattern)."
  - "REVIEW.md flags the button locking: disabled={isPending} alone — one shared pending flag across both buttons and a re-clickable window before confirmation (double-approve/double-payout)."
  - "REVIEW.md flags the hand-added USDC entry inside autogenerated deployedContracts.ts — wiped on the next deploy — and calls for the entry to live in externalContracts.ts."
  - "REVIEW.md flags the raw text input for the creator address and calls for AddressInput (ENS resolution, validation) instead."
  - "REVIEW.md flags silent error handling: catch blocks that only console.error, with no user-facing message near the action."
  - "REVIEW.md flags the hardcoded dark wrapper on /payouts (bg-black text-white) that ignores the DaisyUI theme and breaks the header's theme switcher for that page."
  - "REVIEW.md flags the DaisyUI loading class applied to the buttons' className (full-button spinner swallowing the label) and calls for an inline loading-spinner span."
  - "REVIEW.md flags --radius-field: 9999rem in globals.css (pill-shaped inputs/textarea), with the fix at theme level in both theme blocks."
  - "REVIEW.md flags pollingInterval: 30000 as too slow for a live L2 app, recommending the responsive ~3s range or event-driven refresh."
  - "REVIEW.md flags the production RPC posture: shipping on the default Alchemy key and/or the bare public-RPC fallback transport in wagmiConfig."
  - "REVIEW.md flags SE-2 template branding still in place — at least two of: the Scaffold-ETH 2 tab title/title template, the template README, the default footer links, the default favicon."
  - "REVIEW.md flags at least one mobile-wallet gap the code never addresses: no deep-link handling for WalletConnect flows (tapping a tx button opens nothing) or Phantom missing from the wallet list."
runs: 3
notes: |
  Goal task for skills/qa per issue #1 (skill vendored at 191dcc1,
  source ethskills.com/qa/SKILL.md). Audit-shaped: the skill's designed
  usage is a reviewer pass over a finished build, so the goal hands the
  executor a feature-complete dApp seeded with checklist violations and
  never names a single check — what gets flagged unprompted is the
  measurement. One condition per expect line; each maps to one seeded
  (or deliberately-left-default) violation in templates/qa-target.
  Seeded by hand: connect-text instead of button, no network gating,
  simultaneous Approve+Pay, raw useWriteContract with one shared
  isPending, USDC hand-added to deployedContracts.ts, raw address
  input, console.error-only catches, bg-black wrapper, loading class on
  buttons, --radius-field: 9999rem, pollingInterval: 30000. Left as
  template defaults on purpose: SE-2 branding (title/README/footer/
  favicon), default Alchemy key, bare http() fallback transport, no
  Phantom, no deep-linking. Also present but deliberately ungraded (weak
  signal): missing USD context on amounts, relative OG image against the
  localhost metadataBase fallback, and the fromBlock: 0n full-chain scan
  in useScaffoldEventHistory (the seeded deployedOnBlock in
  deployedContracts.ts is the ready fix). Expects 1-5 and 8 overlap frontend-ux
  ground (connect flow, pending states, error surfacing) — kept because
  they are this skill's ship-blocking checklist core; expects 6, 10, 11,
  13, 15 are qa-only claims, mirror pairs: expect 6 <-> qa-quiz-001,
  expect 10 <-> qa-quiz-002, expect 11 <-> qa-quiz-003, expect 15 <->
  qa-quiz-004, expect 13 <-> qa-quiz-005. Expects 4-5 (write hook and
  button lock) have no quiz mirror — the wagmi-level form is quizzed in
  the frontend-ux benchmark, so a qa quiz would duplicate it; the goals
  carry the claim here. Note for reading results: the template
  ships SE-2's own AGENTS.md, which teaches scaffold hooks, AddressInput
  and notification/getParsedError — a no_skill run reading it can catch
  several expects; the qa delta rides on checklist discipline and the
  claims AGENTS.md does not carry (loading class, radius, deep link,
  Phantom, env-var verification, branding, OG). Contract verification
  and the vercel env check are left untestable here (no real deploy).
  Template templates/qa-target: copy of templates/se-2 with the seeded
  Payouts app (Payouts.sol + deploy script + hand-edited
  deployedContracts.ts + app/payouts/page.tsx + config/css edits above);
  nextjs typechecks and the contract compiles. Regenerate by re-copying
  templates/se-2 and reapplying those files.
