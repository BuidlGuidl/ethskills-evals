skill: skills/ship
input: |
  Build the first version of Toolshed, a lending library for a neighborhood
  association with about 300 members.

  How it works: members list tools they own — a photo, what it is, condition
  notes. Another member asks to borrow one for a few days and puts down a
  deposit in USDC, which they get back when they return it. Tools come back late
  a lot, so there's a daily late fee that comes out of the deposit and goes to
  the owner. Members build up a track record — how many loans, how many late
  returns — and the browse screen sorts by that, so the reliable people get lent
  to first.

  Work in this directory. Ship what a developer needs to run this: the code, and
  a README.md covering the architecture, how to deploy it, and what a developer
  has to do to get it running. Keep everything you write in ordinary source
  folders here — nothing you want us to read should end up under lib/, dist/,
  build/ or out/, which we treat as generated.
expect:
  - "The custom Solidity in the workspace is at most two contracts. Splitting listing, escrow, and reputation into three or more contracts fails on the count; a factory that deploys a contract per tool or per loan fails regardless of the count."
  - "Tool photos, condition notes, item descriptions, and member profile data are not stored in contract storage; a photo is referenced by hash or URL at most, and browsing/sorting is served from offchain data rather than an onchain list."
  - "The contract does not maintain a computed reputation score or a sortable/paginated ranking of members, and exposes no ranking view function; the browse ordering is derived offchain from events or an offchain store. Plain loan and late-return counters recorded as a side effect of a loan the contract already settles do not fail this check."
  - "The late fee and the deposit return advance only when a named party sends a transaction — the owner claiming the fee, the borrower reclaiming the deposit on return, or a permissionless call anyone can make — and not by a scheduled or automatic deduction the contract is assumed to perform on its own."
  - "README.md says who calls what for every state transition that moves USDC, so a developer can tell what happens if nobody calls it."
  - "README.md names a concrete deployment target and the steps to deploy — the target is an actual decision that got made, not left open."
runs: 3
notes: |
  Goal task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Grades the
  claims the ship quizzes test, unprompted, off one build:

    - MVP contract count       expect_1            (quiz-001 asks it directly)
    - onchain litmus test      expect_2, expect_3  (quiz-002)
    - nothing is automatic     expect_4, expect_5  (quiz-003)
    - deployment target decided  expect_6          (a named target with steps;
      which chain is recorded, not graded)

  Read the two shapes together: the quizzes measure knows-when-asked, this
  measures applies-unprompted. Every expect must pass for a run to pass, so the
  aggregate may be 0/3 on both variants — the per-claim split is the point of
  this task.

  Bare workspace, no template on purpose: a template pre-picks the framework,
  and a Scaffold-ETH template ships its own AGENTS.md and skills that can carry
  a no_skill run for reasons that have nothing to do with skills/ship. Nothing
  is broadcast; the artifact is code and a deploy setup, not a deployment.

  Before grading, check the run's evidence actually contains everything the run
  wrote. verify snapshots a bare workspace but skips any path segment in its
  generated-dirs list (lib, dist, build, out, cache and friends), while a run
  that created a .git dir is graded from run.diff instead, which keeps them — so
  the same deliverable can be visible in one run and missing in the next. The
  input asks for source outside those folders to keep the two paths comparable;
  if a run ignored that, say so rather than grading the gap.

  Record per run: which framework the run reaches for, whether it builds any
  offchain component at all, which chain it deploys to and why (chain selection
  is not graded here), and whether the run fetched any other ethskills SKILL.md
  over the network — ship routes to other skills by URL, and a with_skill run
  that pulls them makes the delta about the bundle rather than this skill.

  Skill vendored at skills/ship (source ethskills.com/ship/SKILL.md, skill
  source @ 191dcc1).
