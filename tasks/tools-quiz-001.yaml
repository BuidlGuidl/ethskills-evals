skill: skills/tools
input: |
  I'm building a paid API for AI agents. I want an agent to pay me a few cents
  per call, settled on-chain (Base is fine), with the payment happening inline in
  the HTTP request — no accounts, no API keys, no invoicing. So my server should
  gate the endpoint behind payment, and the agent's TypeScript client should pay
  and retry the call automatically. What's the standard way to build both sides
  today, and what exactly do I install?

  Write your answer to answer.md in this directory. Show the client code, name
  the packages, and confirm anything you install actually resolves today.
expect:
  - "answer.md identifies x402 as the standard for this HTTP-native, pay-per-call, on-chain-settled flow — not a bespoke paywall, an API-key/JWT scheme, Stripe, or L402/Lightning."
  - "It names concrete, installable package(s) — an actual `npm install …` line — for both the TypeScript server gate and the client, not a vague reference to 'the x402 library'."
  - "It shows client code that pays and retries the 402-gated request automatically via that library, rather than a hand-rolled signing/settlement flow."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the skill's
  x402 claim — the most hallucination-prone thing in the skill, because the
  failure mode isn't ignorance, it's invented package names (`@x402/fetch` and
  friends). The scenario buries the claim: it describes x402's exact niche
  (HTTP-native, pay-per-call, on-chain-settled, no keys) without saying "x402"
  or "402", so the model has to recognise the pattern, not read the label.

  Resolvability is NOT a graded expect, on purpose. The judge is blind to the
  transcript and has no live npm/web access (see lib/judge.ts: the claude judge
  runs without --dangerously-skip-permissions, the codex judge runs -s
  read-only), and it sees only answer.md — so it cannot observe whether the run
  actually checked npm vs asserted from memory, and cannot itself confirm a name
  resolves today. Baking "checked against npm" into an expect would collapse to
  "did answer.md *claim* it verified", which a hallucinating run games by writing
  "verified ✓" next to a fake name. The input still tells the executor to confirm
  resolvability and show it, because that lands in the transcript. Mine each
  transcript.md in the report for whether the pass came from parametric memory, a
  web/npm check, or the skill text, and whether the named packages actually
  resolve — the skill's own names (`@x402/fetch` and friends) may be stale/wrong,
  and a with_skill run that parrots a dead name is the "skill is wrong, fix and
  re-evaluate" verdict from the issue, caught at report time, not by the judge.
  Bare workspace, answer is a file. Mirrored by tools-goal-001 (same x402 claim,
  applied unprompted).
