skill: skills/tools
input: |
  I'm building a paid API for AI agents. I want an agent to pay me a few cents
  per call, settled on-chain (Base is fine), with the payment happening inline in
  the HTTP request — no accounts, no API keys, no invoicing. So my server should
  gate the endpoint behind payment, and the agent's TypeScript client should pay
  and retry the call automatically. What's the standard way to build both sides
  today, and what exactly do I install?

  Write your answer to answer.md in this directory. Show the client code, name
  the packages, and confirm anything you install actually resolves today.
expect:
  - "answer.md identifies x402 as the standard for this HTTP-native, pay-per-call, on-chain-settled flow — not a bespoke paywall, an API-key/JWT scheme, Stripe, or L402/Lightning."
  - "It names concrete, installable package(s) — an actual `npm install …` line — for both the TypeScript server gate and the client, not a vague reference to 'the x402 library'."
  - "It shows client code that pays and retries the 402-gated request automatically via that library, rather than a hand-rolled signing/settlement flow."
runs: 3
notes: |
  Quiz task for skills/tools per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the skill's
  x402 claim — the most version-sensitive thing in the skill. The failure mode
  isn't ignorance; it's a frozen prior reaching for the stalled unscoped line
  (`x402` / `x402-fetch`, both stuck at 1.2.0 since April 2026) instead of the
  current scoped packages (`@x402/*`; `@x402/fetch@2.19.0`, published July 2026),
  or reproducing an out-of-date call shape. The scenario buries the claim: it
  describes x402's exact niche (HTTP-native, pay-per-call, on-chain-settled, no
  keys) without saying "x402" or "402", so the model has to recognise the
  pattern, not read the label.

  Resolvability is NOT a graded expect, on purpose: expects grade only the
  artifact fact (the package name in answer.md is a current, correct one).
  Whether the run actually resolved it against npm vs asserted it from memory is
  a transcript step — check each transcript.md in the report for whether the pass
  came from parametric memory, a web/npm check, or the skill text. The genuinely
  stale bits to watch for in a with_skill run are the skill's own example API
  (`x402Fetch` / `createWallet`, vs the current `wrapFetchWithPayment`) and its
  Go path (`coinbase/x402/go` → `x402-foundation/x402/go/v2`) — the package scope
  `@x402/fetch` itself is current and correct. A run that parrots one of those
  stale bits from the skill is the "skill is wrong, fix and re-evaluate" verdict,
  caught at report time.
  Bare workspace, answer is a file. Mirrored by tools-goal-001 (same x402 claim,
  applied unprompted).
