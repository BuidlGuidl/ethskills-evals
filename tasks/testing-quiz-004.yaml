skill: skills/testing
input: |
  Our fork tests have been green in CI on every PR for four months. This morning three
  of them went red — the ones that assert on a Chainlink price and on a Uniswap pool's
  reserves. Nobody touched the code, the dependencies, or the CI config. Re-running the
  job turns them green again sometimes; the same commit passes and fails.

  Two other things we had been ignoring, in case they are related: the fork tests have
  been getting steadily slower over those four months, and last week we started seeing
  sporadic HTTP 429s from our RPC provider.

  setUp does exactly this:

      vm.createSelectFork(vm.envString("MAINNET_RPC_URL"));

  Explain what ties all four symptoms together — the sudden reds, the flakiness on
  re-run, the slowdown, and the 429s — and give the change that makes these tests
  deterministic.

  One constraint on your answer: MAINNET_RPC_URL is a free-tier endpoint. Say plainly
  whether your fix works against it, and if it needs something that endpoint may not
  provide, name what and say how we'd tell.

  Write your answer to answer.md in this directory.
expect:
  - "answer.md ties the symptoms to one cause: createSelectFork without a block number forks at the chain head, so every CI run tests against different live state — a Chainlink price and pool reserves that move between runs, which makes assertions on them drift into failure and flake on re-run."
  - "It connects the slowdown and the 429s to the same cause: a fork pinned to a fixed block lets Foundry serve state from its local RPC cache, while an unpinned fork keeps moving to new blocks so the cache never hits and every run re-fetches state over the network, growing RPC load until the provider rate-limits."
  - "The fix given is pinning the fork to a fixed block — vm.createSelectFork(rpc, BLOCK_NUMBER), or the --fork-block-number flag / foundry.toml equivalent — and, for the assertions themselves, treating the pinned block's values as the fixtures they now are."
  - "On the free-tier constraint, it states that serving state at a pinned historical block is an archive request: a full/non-archive node keeps only recent state (on the order of the last ~128 blocks) and will reject or error on older ones, so the fix needs archive access — and it says how to tell, e.g. the endpoint erroring on a historical eth_getBalance/eth_call, or a provider error explicitly demanding an archive plan."
runs: 3
notes: |
  Quiz task for skills/testing per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1 (skill vendored at
  191dcc1, verified byte-identical to live ethskills.com/testing/SKILL.md on
  2026-07-16).

  One claim per quiz; this one targets the skill's Fork Testing section, whose example
  pins the block and whose comment claims pinning buys reproducibility
  (vm.createSelectFork("mainnet", 19_000_000)). With 001, one of only two quizzes here
  where a direct question may genuinely trip a strong model. Derivation is forced by
  giving four unexplained symptoms instead of asking "should you pin the fork block":
  the reds and the flakiness point at state drift, but the slowdown and the 429s only
  resolve once the model reasons about the RPC cache, which the skill never mentions.

  Expect 4 is deliberately outside what the skill covers, and is the most valuable line
  in this quiz. The skill tells you to pin an old block but never says that doing so
  requires an archive endpoint — which was not a theoretical concern while drafting:
  forking at the skill's own suggested vintage against a free public RPC
  (ethereum-rpc.publicnode.com) fails outright with "Archive requests require a personal
  token", and the fork detector only ran once it stopped pinning. So the skill's headline
  fork example, followed literally on a free endpoint, does not run.

  Read expect 4 per-check rather than through the aggregate. A with_skill run that
  passes 1-3 and fails 4 is not a model failure, it is a content gap in the skill:
  file it as a mistake against the Fork Testing section and recommend the skill state
  the archive requirement next to its pinning advice. A with_skill run that fails 1-3
  is the real skill failure.

  No mirror in testing-goal-001 — the fixture's fork bug (expect 3) reverts identically
  at any block, so nothing there depends on pinning. Whether runs pin their fork block
  anyway, and what happens to them when they do, is worth recording as an observation.
  Bare workspace, answer is a file.
