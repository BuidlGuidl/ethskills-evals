skill: skills/protocol
input: |
  I run infrastructure for a mid-size Ethereum data company. We operate our own fleet
  of full and archive nodes on mainnet, and our single biggest operational pain is
  state growth: disk usage on archive nodes keeps climbing, sync times get worse every
  year, and our capacity planning for the next ~18-24 months hinges on guessing how bad
  this gets.

  I need a technical brief I can hand to my team and to finance, covering:
    - what is actually driving this at the protocol level (how Ethereum stores its state),
    - what changes, if any, are coming to Ethereum itself that would relieve it, and how
      much we can realistically bank on them landing inside our planning window,
    - and what we should do in the meantime given that uncertainty.

  Be concrete and current — this drives real budget and hardware decisions, so I need to
  know what's genuinely on the way versus what's only aspirational. Write the brief to
  brief.md in this directory.
expect:
  - "brief.md does NOT present Verkle trees as an upcoming Ethereum change to plan capacity around. If Verkle is named at all, it is framed as a design Ethereum deprioritized in favor of binary trees (ZK-compat / post-quantum), not as the coming relief to bank on. It never tells the reader to size hardware/budget on Verkle landing."
  - "For whatever protocol-level relief it points to (statelessness / stateless clients / state expiry / the state-tree migration), it separates what is actually scheduled or shipping from what is only a direction or research, and explicitly warns against banking the 18-24 month plan on an unscheduled feature landing on any particular timeline."
  - "It grounds the recommendation in current protocol status rather than an old roadmap, and its dependable near-term levers actually address state-trie growth: a more disk-efficient archive client (e.g. Erigon/Reth flat storage) / path-based state storage, full-vs-archive split, and hardware scaling. Longer-horizon statelessness is treated as not-yet-bankable rather than dated."
  - "It does NOT lean on history expiry / EIP-4444 as the fix for state growth: that relieves historical chain data (headers, bodies, receipts), not the state trie."
  - "The 'meantime' recommendation is concrete and does not rest on an unshipped protocol feature — i.e. a plan that stands even if statelessness never lands inside the planning window."
runs: 3
notes: |
  Same claim as protocol-quiz-001 (Verkle deprioritized in favor of binary trees;
  statelessness not scheduled for any confirmed fork), but the prompt never names
  Verkle, statelessness, binary trees, or any fork. The state-growth / archive-disk
  framing pulls a competent model toward the statelessness / state-tree-migration story
  on its own; the "how much can we bank on it landing in our planning window" clause is
  what forces the skill's habit (scheduled vs aspirational, don't hard-depend). Don't
  soften that clause or name the mechanism — that is what keeps the decision unprompted.

  Ground truth as of 2026-07: no confirmed fork schedules a binary-tree / stateless
  state migration, and history expiry (EIP-4444) relieves historical chain data, not
  state-trie growth. Revalidate the scheduling status before re-running.

  A run that never raises the state-tree path still grades fairly: expect_1 passes
  trivially (no stale prior surfaced) and the rest grade the levers the run did choose.
  Bare workspace, no template on purpose — a template would pre-frame the answer.

  Pairs with protocol-quiz-001: the quiz measures knows-when-asked, this measures
  applies-unprompted. The evidence that the skill adds value beyond what the model
  already knows is the split — quiz passing while the goal's no_skill fails and
  with_skill passes.

  Record whether each run checked current fork status (forkcast / EIPs / eth R&D) or
  recited a remembered roadmap, and whether Verkle surfaced at all.

  Skill vendored at skills/protocol (source ethskills.com/protocol/SKILL.md, @ 191dcc1).
