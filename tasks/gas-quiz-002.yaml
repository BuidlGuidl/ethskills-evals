skill: skills/gas
input: |
  A teammate estimated our Uniswap swap on Base at $0.0003 by pricing the
  swap's execution gas over RPC. But the actual charge per swap showing up
  in the wallet is roughly 10x that. Where is the rest of the money going,
  and how can we make it cheaper?

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md explains the ~10x gap and gives at least one concrete way to reduce it."
  - "The gap is identified as the L1 data-availability component — posting the batch to Ethereum as blobs — i.e. an L2 fee = L2 execution + L1 data, with execution the minor share."
  - "The explanation is not sequencer profit margin, network congestion, slippage, or a wrong per-swap gas estimate."
runs: 3
notes: |
  Quiz task for skills/gas per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets the L2
  cost-components claim via diagnosis framing: the executor has to name the
  L1 blob/data-availability share unprompted rather than read it off the
  skill. Split from gas-quiz-001 so a two-question quiz can't prime the model
  to check gas defensively and lift the no_skill variant for the wrong
  reason. Record whether a pass came from parametric knowledge or a web
  search — the question is somewhat searchable, so the transcript is what
  separates a wiki verdict from a skill win. Bare workspace, answer is a
  file.
