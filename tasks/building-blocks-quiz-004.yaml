skill: skills/building-blocks
input: |
  We're building a yield vault on Arbitrum that deposits user funds into
  GMX, with a keeper compounding rewards periodically. Before any code,
  let's write design.md in this directory covering:

  - which pool(s) the vault deposits into
  - a realistic breakdown of what the position earns
  - the risks the position carries
expect:
  - "The design deposits into GMX V2's per-market GM pools (e.g. an ETH/USD market backed by ETH + USDC), not the old single GLP index pool."
  - "The earnings breakdown is the market's fees (trading, borrowing, liquidation, swap), not a share of one global platform pool."
  - "The risks include being the counterparty to trader PnL (and ADL for synthetic markets), not just token price exposure."
runs: 3
notes: |
  The prior under test: whether the model's GMX picture is still V1's
  single GLP index pool. GMX V2 has been live since August 2023: isolated
  per-market GM pools, LPs earn that market's fees and take the other side
  of trader PnL, synthetic markets use ADL. In the report, note from each
  transcript where the GM-pool picture came from: stated from prior
  knowledge, read from the skill, or checked live. Bare workspace, the
  answer is a file, no template.
