skill: skills/building-blocks
input: |
  We're building a two-tranche yield vault on Arbitrum. Users pick a
  tranche when they deposit: tranche A promises a fixed rate, locked at
  deposit time and paid out at a maturity date. Tranche B earns the fees
  that leveraged traders pay on the chain, accepting more risk for it. A
  keeper compounds both. Before any code, let's write design.md in this
  directory covering:

  - which protocol each tranche deploys into
  - how each position actually earns
  - the risks each tranche carries
expect:
  - "Tranche A is built on Pendle (or another yield-tokenization protocol with the same mechanism): buying PT at a discount and holding to maturity is what locks the fixed rate — not a variable-rate protocol like Aave presented as fixed, and not a hand-rolled rate mechanism."
  - "Tranche B deposits into a perps protocol's LP pool, on Arbitrum canonically GMX V2's per-market GM pools earning that market's trading/borrowing/liquidation fees — not the old single GLP index pool."
  - "Tranche B's risks include being the counterparty to trader PnL (and ADL on synthetic markets), not just token price exposure."
runs: 3
notes: |
  The prior under test: whether the model knows the Arbitrum-native yield
  stack unprompted — Pendle for fixed yield (PT trades at a discount,
  discount = implied yield, redeems 1:1 at maturity) and GMX for
  trader-fee yield, where V2 has been per-market GM pools since August
  2023 (the old single GLP index pool is the stale picture). In the
  report, note from each transcript where each protocol pick came from:
  stated from prior knowledge, read from the skill, or looked up live.
  Bare workspace, the answer is a file, no template.
