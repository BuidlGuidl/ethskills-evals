skill: skills/frontend-ux
input: |
  Launch day for a Scaffold-ETH 2 dApp. It is deployed at
  https://stake.example.com on our own server (no Vercel). The Next.js
  root layout exports:

      export const metadata = {
        title: "Stake",
        openGraph: { images: ["/og.png"] },
      };

  public/og.png exists and renders fine in a browser at
  https://stake.example.com/og.png — yet links shared in Telegram and on X
  show no preview image on either platform. Work out the exact og:image
  URL the crawlers received and why, then give the fix and how you would
  verify it before announcing the launch. Write your answer to answer.md
  in this directory.
expect:
  - "answer.md derives the actual og:image URL the crawlers saw, not just generic OG advice."
  - "The cause is the missing metadataBase: Next.js resolves the relative image path against its fallback base (localhost), so the rendered og:image points off the live domain and crawlers cannot fetch it — even though the file opens fine in a browser."
  - "The fix ships an absolute, reachable https URL on the production domain (set metadataBase to the live origin or an absolute image URL), plus a concrete pre-launch re-check of the rendered tag or a platform preview/validator."
runs: 3
notes: |
  Quiz task for skills/frontend-ux per issue #1 (skill vendored at 191dcc1,
  verified byte-identical to live ethskills.com/frontend-ux/SKILL.md on
  2026-07-15). One claim per quiz; this one targets Rule 8 — the OG image
  must be an absolute URL reachable on the live domain. The
  hallucination-prone detail is Next.js's metadataBase fallback: without it
  a relative path renders as a localhost URL in the tag while the file
  still opens fine in a browser, so the debug framing forces the model to
  derive the crawler's view instead of reciting an OG checklist ("no
  Vercel" pins the fallback and rules out the auto-derived deployment URL).
  Mirror pair with frontend-ux-goal-001 expect 6 (metadata/identity handled unprompted pre-launch). After runs,
  mine transcript.md for whether the metadataBase behavior came from
  memory, a docs search, or the skill. Bare workspace, answer is a file.
