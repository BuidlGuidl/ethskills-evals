skill: skills/building-blocks
input: |
  We're launching a token on Ethereum mainnet and we want its main Uniswap
  pool to charge a higher swap fee during volatile periods and a lower one
  during calm periods, adjusted automatically on every swap, without
  migrating liquidity or redeploying anything once it's live. Let's build
  the onchain piece that makes this work:

  - set up a foundry project in this directory and implement the
    contract(s) we would deploy
  - the volatility signal itself isn't the point — stub it behind a
    function or interface we can wire up later
  - make sure it compiles with forge build
  - leave a NOTES.md covering how the fee gets decided and applied
    on each swap, and what deploying this correctly involves
expect:
  - "The solution is built on Uniswap V4: a hook contract (inheriting BaseHook / implementing IHooks) attached to a pool — not a custom AMM, and not a V2/V3 workaround like multiple fee-tier pools or keeper-driven migration."
  - "The hook's declared permissions match what it uses: beforeSwap enabled, and the fee logic runs in beforeSwap (or via updateDynamicLPFee from a hook callback)."
  - "The per-swap fee override mechanism is one V4 actually supports: beforeSwap returning the fee with the override flag 0x400000 (LPFeeLibrary.OVERRIDE_FEE_FLAG), or calling poolManager.updateDynamicLPFee — not returning fee | 0x800000, which is the pool-level dynamic-fee sentinel and silently no-ops as a return flag."
  - "The pool setup (code or NOTES.md) uses a dynamic-fee pool — DYNAMIC_FEE_FLAG (0x800000) as the PoolKey fee — rather than a fixed fee tier."
  - "The deployment story (code or NOTES.md) accounts for V4's hook-address requirement: the hook must live at an address whose flag bits encode its permissions (mined CREATE2 salt / HookMiner)."
runs: 3
notes: |
  The prior under test: Uniswap V4 (live on mainnet since January 2025) and
  its hooks system — a dynamic per-swap fee is a beforeSwap hook. Uniswap
  is named in the input, the version is not.

  - common drift points the expects target: the 0x400000 override flag vs
    the 0x800000 pool-level sentinel, fixed-fee pool keys, and hook
    address permission bits
  - in the report, note from each transcript whether V4 came from prior
    knowledge, the skill, or a live search, and which docs the run
    consulted while wiring the hook
  - also note whether the run ran forge build / compile and it passed, the judge
    reads code but can't execute it, so the transcript is the only place
    this is visible
  - the last expect (hook-address flag bits) is deliberately beyond the
    skill's content: it checks whether the skill's V4 context pushes the
    model to dig into the docs and land the unknowns next to it — compare
    it across variants rather than reading a with_skill fail as skill
    failure
  - bare workspace: the executor scaffolds foundry and installs
    dependencies itself (network required)
