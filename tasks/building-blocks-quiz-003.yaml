skill: skills/building-blocks
input: |
  We're building a flash-loan arbitrage bot for Ethereum mainnet: it
  borrows 100,000 USDC from Aave V3, swaps across two DEXes, repays the
  loan, and keeps the difference. Before any code, let's write design.md in
  this directory covering:

  - the sequence of steps a single execution performs, with the amounts
    moving at each step
  - every cost it pays, itemized with numbers
  - the minimum price gap (in USD on the 100k trade) below which running
    it loses money, with the arithmetic shown
expect:
  - "design.md itemizes the Aave V3 flash-loan fee at 0.05% of principal ($50 on 100k USDC), not 0.09% or another rate."
  - "The repayment step accounts for principal plus premium (100,050 USDC back to the pool), not just the 100,000 borrowed."
  - "The cost model accounts for DEX swap fees on both legs of the arbitrage (or explicitly defines the price gap as net of pool fees), not just the flash-loan fee and gas."
  - "The minimum profitable gap is derived with the arithmetic shown and is consistent with the run's own itemized costs."
runs: 3
notes: |
  The prior under test: the Aave flash-loan fee remembered as 0.09% (the V2
  rate) instead of the current 0.05%, and the fee known as a fact but not
  carried into the transaction flow (repaying 100,000 instead of 100,050).
  Gas is itemized but not graded — the gas skill's eval owns gas pricing —
  so the break-even check only requires arithmetic consistent with the
  run's own numbers. In the report, note from each transcript where the fee
  and the gas figure came from: stated from prior knowledge, read from the
  skill, or checked live — and for live checks, which RPC endpoint or data
  source the run actually hit. Bare workspace, the answer is a file, no
  template.
