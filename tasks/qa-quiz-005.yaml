skill: skills/qa
input: |
  A Scaffold-ETH 2 dApp live on Base. Ops report: production traffic is
  getting rate-limited on public endpoints — 429s from
  mainnet.base.org — even though the config looks right:

      // scaffold.config.ts
      rpcOverrides: {
        [chains.base.id]: process.env.NEXT_PUBLIC_RPC_URL,
      },

  On developer machines everything goes through the paid RPC and no
  429s appear. The deploy is a static Next.js build on generic hosting.

  Walk the exact chain that lands production requests on a public RPC —
  including where NEXT_PUBLIC_* variables get their values in a Next.js
  build and what the transport does when the override is missing. Then
  name the one operational check that settles whether the fix is real,
  and the second, transport-level trap in
  packages/nextjs/services/web3/wagmiConfig.tsx that keeps some requests
  going to public RPCs even after the env var is fixed. Write your
  answer to answer.md in this directory.
expect:
  - "answer.md derives the failure chain: NEXT_PUBLIC_* values are inlined at build time, the variable is set locally (.env.local) but not on the hosting platform, so the production bundle bakes in undefined, the override is skipped, and the transport falls through to default/public RPC endpoints — which is why only production sees 429s."
  - "The check is operational, not code-level: confirm the variable is actually set in the hosting platform's environment for the production build (e.g. vercel env ls or the host's equivalent), rather than trusting that the code references process.env."
  - "The second trap is the fallback transport list in wagmiConfig.tsx: a bare http() (public RPC) entry remains in the fallbacks, so requests can still hit rate-limited public endpoints; the fix removes it so only intended transports remain."
runs: 3
notes: |
  Quiz task for skills/qa per issue #1 (skill vendored at 191dcc1,
  source ethskills.com/qa/SKILL.md). One claim per quiz; this one
  targets the referenced-but-not-set env-var trap — the skill's point
  that agents change code to match the PASS pattern and never verify the
  variable exists on the hosting platform — plus the bare http()
  fallback in the transport list. The local-vs-prod asymmetry buries the
  claim: deriving it requires knowing NEXT_PUBLIC_* inlining happens at
  build time. Mirror pair with qa-goal-001 (the goal template ships the
  default Alchemy key and the stock fallback transport; flagging the RPC
  posture is the applied form). Bare workspace, answer is a file.
