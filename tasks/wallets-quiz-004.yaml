skill: skills/wallets
input: |
  Our deploy script computes the counterfactual address of a user's 2-of-3 Safe
  before deploying it, using the standard Safe deployment — same owners, same
  threshold, same salt every time. It produces one address on Ethereum mainnet
  and a DIFFERENT address when we point it at Base and at Arbitrum. A teammate
  wants to give up and store a separate Safe address per chain.

  Is a different address per chain expected here, or does that signal a bug in
  how we're deploying? Walk me through what is actually causing the divergence
  and what we should standardize on so the address comes out identical on every
  chain — then tell me whether to keep one address everywhere or store one per
  chain.

  Write your answer to answer.md in this directory, showing your reasoning.
expect:
  - "answer.md says the counterfactual Safe address SHOULD be identical across mainnet, Base, and Arbitrum given the same owners/threshold/salt and the same Safe contracts — so a differing address signals a bug (e.g. a different singleton/factory version or a per-chain salt/initializer), not something to store per-chain."
  - "It attributes the determinism to the standard CREATE2 deployment with the same singleton + proxy factory deployed at the same addresses on every chain, and pins the divergence on those inputs differing across chains (mismatched Safe contract version/factory, or a per-chain salt/initializer)."
  - "Where it names a Safe version to standardize on, it is the current v1.4.1, not the older v1.3.0. Giving the v1.4.1 singleton 0x41675C099F32341bf84BFc5382aF534df5C7461a is expected and confirms it; naming v1.4.1 without the exact hex still passes, but naming v1.3.0 (or its singleton) as the version to use fails."
runs: 3
notes: |
  Quiz task for skills/wallets per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. One claim per file:
  targets the skill's "Safe v1.4.1 addresses are deterministic across chains"
  claim. Framed as a diagnosis — a differing per-chain address that the model
  must call a bug and explain via CREATE2 determinism — so it exercises
  reasoning about why the address is the same, not just an address lookup. Two
  stale tells to catch: accepting per-chain addresses as normal, and reaching
  for the older v1.3.0 singleton.

  Framing decision — the input no longer says "State the Safe singleton address
  and version you would use." That was a bare retrieval ask (the shape issue #1
  warns against) bolted onto an otherwise good diagnosis, and the address is the
  least discriminating part here — it is web-searchable, as the caveat below
  notes. The version claim is now buried inside the fix: a divergent per-chain
  address usually IS a Safe-version/factory mismatch across chains, so "what
  should we standardize on so the address matches everywhere" makes the version
  call diagnostic rather than a lookup. expect_3 follows suit — version-currency
  (v1.4.1 not v1.3.0) is the load-bearing check; the exact singleton hex confirms
  it but a correct diagnosis that names v1.4.1 without reciting the address is
  not failed for it. Reaching for v1.3.0 as the version to use still fails.

  Caveat: the singleton address is web-searchable, so a no_skill run with live
  search can pass on the address alone. Mine each run's transcript.md for
  whether the determinism claim came from reasoning or a lookup and report it;
  the discriminating part is the CREATE2/same-address-across-chains reasoning,
  which the diagnosis framing is meant to force. Skill vendored at
  skills/wallets (source ethskills.com/wallets/SKILL.md, skill source @
  191dcc1). Bare workspace, answer is a file.
