skill: skills/ship
input: |
  We're building a directory for our city's live music scene. Bands get a
  profile — photo, bio, links — and fans follow them. There's a feed of upcoming
  gigs, fans rate gigs they went to out of 5, and the home screen ranks the
  best-rated bands this month. Fans can also buy a "supporter badge" for a band:
  it costs 0.01 ETH, goes straight to the band, and stays as proof they backed
  that band early.

  Two things will decide how we build this, so I need them answered before we
  start: what does the app have to load when a fan opens the home screen, and
  what does it cost us to change the leaderboard formula — we'll be tweaking
  that most weeks until it feels fair.

  Write your answer to plan.md in this directory: the architecture, plus the
  answer to both questions.
expect:
  - "plan.md places band profiles, photos, bios, links, follows, gig listings, and the individual 1-5 ratings outside contract storage — a conventional database or API, with photos on IPFS or object storage — rather than in Solidity. An onchain hash or attestation committing to offchain-computed results does not fail this check; storing the raw profile, listing or rating data onchain does."
  - "The leaderboard is computed offchain from that data, and changing the formula is described as a server-side change that needs no contract deployment and no migration of onchain state."
  - "The home-screen read path for profiles, gigs, ratings and the ranking is answered as offchain queries against an indexed store or API, not as per-band contract reads, RPC calls, or an onchain view function returning the ranked feed. Reading badge ownership from chain, directly or through an indexer, does not fail this check."
  - "The supporter badge is the onchain component — an onchain ownership record such as ERC-721/ERC-1155 with the 0.01 ETH routed to the band — rather than a database row with an offchain receipt."
runs: 3
notes: |
  Quiz task for skills/ship per issue
  https://github.com/BuidlGuidl/ethskills-evals/issues/1. Targets one claim:
  the onchain litmus test — ownership and commitments go onchain; profiles,
  content, search and frequently-changing business logic stay offchain; and
  reputation is offchain compute with an onchain commitment at most (SKILL.md
  "The Onchain Litmus Test" and the "Onchain everything" anti-pattern).

  Reputation is the app's centerpiece on purpose: "don't store photos in
  Solidity" is something a model already knows, so grading only that direction
  produces no delta. The badge check grades the opposite error — a plan that
  pushes everything offchain and leaves nothing onchain has also failed the
  litmus.

  Record per run: where the per-gig ratings end up specifically, whether any run
  reaches for an attestation or hash commitment rather than raw onchain scores,
  and whether the run fetched any other ethskills SKILL.md over the network —
  ship routes to other skills by URL, and a with_skill run that pulls them makes
  the delta about the bundle rather than this skill.

  Bare workspace, answer is a file. Skill vendored at skills/ship (source
  ethskills.com/ship/SKILL.md, skill source @ 191dcc1).
