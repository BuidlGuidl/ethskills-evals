skill: skills/frontend-playbook
input: |
  We shipped our Scaffold-ETH 2 app as a static export to IPFS. The home
  page loads fine through the gateway, but /debug — and every route
  except / — returns 404. The uploaded directory looks like:

      out/index.html
      out/debug.html
      out/404.html
      out/_next/...

  Explain the gateway mechanics that turn exactly this file layout into
  404s (and why the home page still works), the next.config change that
  fixes it, what out/ looks like after that change, and how to verify
  the routes from the command line before re-uploading. Write your
  answer to answer.md in this directory.
expect:
  - "answer.md derives the mechanism: IPFS gateways serve static files with no server-side routing — a directory resolves to its index.html but a bare filename is never implied, so /debug looks for a debug/ directory that does not exist while debug.html sits unreachable; / works only because index.html exists at the root."
  - "The fix is trailingSlash: true in next.config (alongside output: 'export' and unoptimized images for an IPFS build), after which each route emits its own directory with an index.html (debug/index.html) and /debug/ resolves."
  - "Verification is concrete: ls out/*/index.html to confirm the per-route directories, and a curl of the gateway route expecting 200 instead of 404."
runs: 3
notes: |
  Quiz task for skills/frontend-playbook per issue #1 (skill vendored at
  191dcc1, verified byte-identical to live
  ethskills.com/frontend-playbook/SKILL.md on 2026-07-16). One claim per
  quiz; this one targets the trailingSlash claim — the skill calls it
  the number-one reason IPFS routes break. The file listing in the
  prompt is the evidence: the model must connect gateway
  directory-resolution rules to the debug.html-vs-debug/index.html
  layout, not recite an IPFS checklist. After runs, mine transcript.md
  for whether the mechanism was derived or the model jumped straight to
  the config flag without explaining why. Mirror pair with
  frontend-playbook-goal-001 expect 3 (same config decision, applied
  unprompted). Bare workspace, answer is a file.
