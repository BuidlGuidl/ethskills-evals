skill: skills/frontend-ux
input: |
  A Scaffold-ETH 2 dApp (Next.js App Router, wagmi v2, viem). A support
  ticket just came in: a user holding 400 USDC typed "250" into the deposit
  form and the transaction reverted with "transfer amount exceeds balance".
  The deposit handler reads:

      import { parseEther } from "viem";
      ...
      const amount = parseEther(depositInput); // depositInput = "250"
      writeContract({ ...vaultConfig, functionName: "deposit", args: [amount] });

  A teammate insists the code is fine because "viem handles the units".
  Work out the exact uint256 the contract was asked to move, the value the
  user intended, and the factor between the two — that settles whether the
  teammate is right. Then give the correct conversion for this form, and
  what the balance display side must use so a 250 USDC position never
  renders as anything else. Write your answer to answer.md in this
  directory, showing the arithmetic.
expect:
  - "answer.md derives the numbers with the arithmetic shown, not a bare 'use parseUnits'."
  - "The contract was asked to move 250 * 10^18 base units while the user meant 250 * 10^6 — USDC has 6 decimals — an overshoot factor of 10^12, which is why a 400 USDC balance reverts."
  - "The fix is parseUnits(depositInput, 6) (or an equivalent 6-decimal conversion) on the input side and formatUnits(value, 6) on the display side; parseEther/formatEther are identified as wrong for USDC."
runs: 3
notes: |
  Quiz task for skills/frontend-ux per issue #1 (skill vendored at 191dcc1,
  verified byte-identical to live ethskills.com/frontend-ux/SKILL.md on
  2026-07-15). One claim per quiz; this one targets Rule 9 — token amounts
  convert at the token's own decimals, and USDC-style 6-decimal tokens make
  parseEther/formatEther silently wrong by 10^12. The revert-despite-balance
  framing buries the claim in a diagnosis: the model must produce the
  factor, not recall the fee line. Covers both conversion directions
  (parseUnits in, formatUnits out) — still one claim. Mirror pair with
  frontend-ux-goal-001 expect 3
  (same decimals decision, applied unprompted while building). The fact is
  searchable, so after runs mine transcript.md for whether 6 decimals came
  from parametric memory, a web search, or the skill — that separates a
  wiki verdict from a skill win. Bare workspace, answer is a file.
